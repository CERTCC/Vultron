name: Docs Build and Link Check
on:
  pull_request:
    paths:
      - 'docs/**'
      - 'overrides/**'
      - 'references.bib'
      - 'mkdocs.yml'
      - 'mkdocs.dev.yml'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'CONTRIBUTING.md'
      - 'ContributionInstructions.md'
      - 'LICENSE.md'
      - 'Acknowledgements.md'
      - '.github/workflows/docs-build-check.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docs-build-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Check if docs/ changed
        id: filter
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "docs_changed=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only "origin/$BASE_REF"...HEAD \
               | grep -q '^docs/'; then
            echo "docs_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python and uv
        uses: ./.github/actions/setup-python-uv
        with:
          uv-sync-args: "--dev"

      - name: Build Site
        run: |
          uv run mkdocs build --verbose --clean --config-file mkdocs.yml

      - name: Check links
        if: steps.filter.outputs.docs_changed == 'true'
        run: |
          uv run linkchecker site/index.html

      - name: Build Developer Docs Overlay
        run: |
          uv run mkdocs build --verbose --clean --config-file mkdocs.dev.yml
