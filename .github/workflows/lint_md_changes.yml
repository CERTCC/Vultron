name: "Lint Markdown (Changes)"
on:
  push:
    paths:
      - '**/*.md'
      - .github/workflows/lint_md_changes.yml
  pull_request:
    paths:
      - '**/*.md'
      - .github/workflows/lint_md_changes.yml

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 0
    - uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323
      id: changed-files
      with:
        files: '**/*.md'
        separator: ","
    - uses: DavidAnson/markdownlint-cli2-action@07035fd053f7be764496c0f8d8f9f41f98305101
      if: steps.changed-files.outputs.any_changed == 'true'
      with:
        globs: ${{ steps.changed-files.outputs.all_changed_files }}
        separator: ","
        config: .markdownlint-cli2.yaml
        
