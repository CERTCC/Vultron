# Demo Integration — build and run the two-actor Vultron demo on PRs.
#
# Kept separate from python-app.yml so that the Docker-compose build time
# does not block the unit-test and lint pipeline; both workflows run
# concurrently on PRs.  See specs/demo-ci.yaml DEMOCI-02-001.
#
# Triggers: PRs to main (path-filtered) and workflow_dispatch.
# Dependabot PRs are skipped — python-app.yml still guards broken deps.
# See DEMOCI-02-002, DEMOCI-02-003, DEMOCI-02-004.
#
# Job structure per matrix entry (DEMOCI-04-001 through DEMOCI-04-003):
#   demo           — builds images, runs docker-compose, uploads JSONL artifacts
#   invariant-harness  — downloads JSONL, runs pytest; needs: demo, if: always()
#
# This gives each scenario two independent pass/fail statuses on the PR so
# invariant failures are visible even when the demo job itself fails.

name: Demo Integration

on:
  pull_request:
    branches: ["main"]
    paths:
      - "vultron/**"
      - "docker/**"
      - "integration_tests/**"
      # Invariant harness / CI test changes must re-run the demos that feed
      # them, else a broken assertion merges untested (see #1602 regression).
      - "test/ci/**"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:

permissions:
  contents: read
  actions: write  # needed for docker buildx bake cache-to: type=gha

jobs:
  demo:
    name: "${{ matrix.demo }} Demo Integration"
    runs-on: ubuntu-latest
    # DEMOCI-02-009: 15-minute cap to prevent indefinite hangs.
    timeout-minutes: 15
    # DEMOCI-02-004: skip Dependabot PRs; python-app.yml guards broken deps.
    if: "!startsWith(github.head_ref, 'dependabot/')"
    # DEMOCI-03-003, DEMOCI-03-004, DEMOCI-03-005: matrix over scenarios so
    # failures are independently reported and each entry declares its test_file.
    strategy:
      fail-fast: false
      matrix:
        include:
          - demo: fv
            test_file: test/ci/invariants/test_fv_invariants.py
          - demo: fvv
            test_file: test/ci/invariants/test_fvv_invariants.py
          - demo: fvcv-extension
            test_file: test/ci/invariants/test_fvcv_extension_invariants.py
          - demo: fvcv-handoff
            test_file: test/ci/invariants/test_fvcv_handoff_invariants.py
          - demo: fccv-handoff
            test_file: test/ci/invariants/test_fccv_handoff_invariants.py
          - demo: fcv
            test_file: test/ci/invariants/test_fcv_invariants.py

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      # DEMOCI-02-007: Docker layer caching via Buildx GHA cache.
      # This workflow only triggers on pull_request, so a cache it writes
      # (scope=demo-integration) is only visible to that same PR branch —
      # GitHub Actions cache entries from a branch aren't visible to other
      # branches. cache-from-extra-scope reads the cache written by
      # demo-image-cache-warm.yml on pushes to main, so a brand-new PR
      # branch still gets a warm cache instead of starting fully cold.
      - name: Build Docker images
        uses: ./.github/actions/build-demo-images
        with:
          cache-scope: demo-integration
          cache-from-extra-scope: demo-integration-main

      # DEMOCI-02-005, DEMOCI-02-006: run demo; detect failure via
      # exit code of the demo-runner container.
      # DEMOCI-02-008: set DEBUG log level at CI runtime so actor containers
      # emit full tracebacks and state-machine detail.
      - name: Create devlogs directory
        run: mkdir -p devlogs

      - name: Run ${{ matrix.demo }} demo
        env:
          DEMO: ${{ matrix.demo }}
        run: |
          VULTRON_SERVER__LOG_LEVEL=DEBUG \
            docker compose -f docker/docker-compose-multi-actor.yml \
            up --abort-on-container-exit --exit-code-from demo-runner

      - name: Upload case log JSONL files
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ matrix.demo }}-case-logs
          path: devlogs/
          retention-days: 30

      # DEMOCI-02-008: collect combined stream and per-service logs on failure.
      - name: Collect container logs
        if: failure()
        run: |
          COMPOSE_FILE=docker/docker-compose-multi-actor.yml
          mkdir -p /tmp/demo-logs
          docker compose -f "$COMPOSE_FILE" logs \
            > /tmp/demo-logs/combined.log 2>&1
          for svc in finder vendor coordinator case-actor actor5 demo-runner; do
            docker compose -f "$COMPOSE_FILE" logs "$svc" \
              > "/tmp/demo-logs/${svc}.log" 2>&1 || true
          done

      - name: Upload container logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ matrix.demo }}-container-logs
          path: /tmp/demo-logs/
          retention-days: 7

      # DEMOCI-02-010: always tear down containers and volumes.
      - name: Tear down containers and volumes
        if: always()
        run: |
          docker compose -f docker/docker-compose-multi-actor.yml down -v

  # DEMOCI-04-001, DEMOCI-04-002, DEMOCI-04-003: separate invariant-harness job
  # so invariant failures produce an independent pass/fail status on the PR even
  # when the demo job itself fails.
  invariant-harness:
    name: "${{ matrix.demo }} Invariant Harness"
    runs-on: ubuntu-latest
    # DEMOCI-04-002: always run after the demo job, even on demo failure.
    # DEMOCI-02-004: skip Dependabot PRs (demo is skipped, no artifact exists).
    needs: demo
    if: always() && !startsWith(github.head_ref, 'dependabot/')
    strategy:
      fail-fast: false
      matrix:
        include:
          - demo: fv
            test_file: test/ci/invariants/test_fv_invariants.py
          - demo: fvv
            test_file: test/ci/invariants/test_fvv_invariants.py
          - demo: fvcv-extension
            test_file: test/ci/invariants/test_fvcv_extension_invariants.py
          - demo: fvcv-handoff
            test_file: test/ci/invariants/test_fvcv_handoff_invariants.py
          - demo: fccv-handoff
            test_file: test/ci/invariants/test_fccv_handoff_invariants.py
          - demo: fcv
            test_file: test/ci/invariants/test_fcv_invariants.py

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      # DEMOCI-04-003: download the JSONL artifact produced by the demo job.
      - name: Download case log JSONL files
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc889  # v4.2.1
        with:
          name: ${{ matrix.demo }}-case-logs
          path: devlogs/

      # AC-925-1: run canonical-log invariant harness against JSONL artifacts.
      # Invariants not yet passing are marked xfail so the build stays green;
      # unexpected passes appear as XPASS (visible but not failing).
      # See test/ci/README-case-log-ratchet.md for the ratchet workflow.
      - name: Set up Python and uv
        uses: ./.github/actions/setup-python-uv

      - name: Run case-ledger invariant harness
        env:
          TEST_FILE: ${{ matrix.test_file }}
        run: uv run pytest "$TEST_FILE" -v --tb=short

# Future scenarios to add when stable:
#   - three-actor  (multi-coordinator; add as matrix entry per DEMOCI-03-003)
#   - multi-vendor (add as matrix entry per DEMOCI-03-003)
