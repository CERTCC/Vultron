name: "Convert idea label to Idea issue type"

on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  convert-idea-label:
    if: github.event.label.name == 'idea'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      IDEA_TYPE_ID: "IT_kwDOAjf0s84B_EoA"
    steps:
      - name: Set issue type to Idea
        run: |
          ISSUE_NODE_ID="${{ github.event.issue.node_id }}"
          gh api graphql -f query="
          mutation {
            updateIssue(input: {
              id: \"${ISSUE_NODE_ID}\"
              issueTypeId: \"${IDEA_TYPE_ID}\"
            }) {
              issue { number issueType { name } }
            }
          }"

      - name: Remove idea label
        run: |
          gh issue edit "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --remove-label "idea"
