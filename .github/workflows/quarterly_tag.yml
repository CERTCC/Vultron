# Creates a quarterly snapshot tag on the default branch.
# Tags are named snapshot/QN-YYYY (e.g., snapshot/Q2-2026).
# Runs at 00:00 UTC on the 1st of January, April, July, and October.

name: Quarterly snapshot tag

on:
  schedule:
    - cron: '0 0 1 1,4,7,10 *'
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  tag:
    name: Create quarterly tag
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Compute quarter
        id: quarter
        run: |
          MONTH=$(date +%-m)
          YEAR=$(date +%Y)
          QUARTER=$(( (MONTH - 1) / 3 + 1 ))
          echo "tag=snapshot/Q${QUARTER}-${YEAR}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        env:
          TAG: ${{ steps.quarter.outputs.tag }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — skipping."
          else
            git tag "$TAG"
            git push origin "$TAG"
            echo "Created and pushed tag: $TAG"
          fi
