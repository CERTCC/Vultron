repos:
  - repo: https://github.com/psf/black
    rev: 26.1.0  # Use the latest stable version
    hooks:
      - id: black
        language_version: py313
        args: ["."]

  - repo: local
    hooks:
      - id: markdownlint-cli2
        name: markdownlint-cli2 (direct invocation)
        entry: markdownlint-cli2
        # Use the system language so pre-commit resolves the executable via PATH
        language: system
        args: ["--fix", "--config", ".markdownlint-cli2.yaml", "**/*.md"]
        files: \.(md|markdown)$

      - id: validate-notes-frontmatter
        name: Validate notes frontmatter
        entry: uv run python -c "from vultron.metadata.notes.loader import load_notes_registry; load_notes_registry()"
        language: system
        files: ^notes/.*\.md$
        exclude: ^notes/README\.md$
        pass_filenames: false

      - id: spec-lint
        name: Spec registry linter
        entry: uv run python -m vultron.metadata.specs.lint specs/
        language: system
        files: ^specs/.*\.yaml$
        pass_filenames: false
