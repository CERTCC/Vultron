repos:
  - repo: https://github.com/psf/black
    rev: 26.1.0  # Use the latest stable version
    hooks:
      - id: black
        language_version: py313
        args: ["."]

  - repo: local
    hooks:
      - id: markdownlint-cli2
        name: markdownlint-cli2 (direct invocation)
        entry: markdownlint-cli2
        # Use the system language so pre-commit resolves the executable via PATH
        language: system
        args: ["--fix", "--config", ".markdownlint-cli2.yaml", "**/*.md"]
        files: \.(md|markdown)$

