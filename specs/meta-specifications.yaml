id: MS
title: Meta-Specification Style Guide
description: Normative rules for authoring specification files in this project. Converted from specs/meta-specifications.md.
version: 1.0.0
kind: general
scope:
- prototype
- production
groups:
- id: MS-01
  title: File Structure
  specs:
  - id: MS-01-001
    priority: MUST
    statement: Each spec file MUST focus on a single topic of concern and be largely independent of other spec files.
    rationale: Focused files are easier to navigate and maintain.
    tags:
    - documentation
  - id: MS-01-002
    priority: MUST
    statement: Requirements MUST be grouped by category and priority within each spec file.
    rationale: Grouping improves scannability and traceability.
    tags:
    - documentation
  - id: MS-01-003
    priority: MUST
    statement: Each spec file MUST have a single divider (`---`) between the file header and the requirements groups.
    rationale: Consistent structure enables automated parsing.
    tags:
    - documentation
- id: MS-02
  title: Priority Levels
  specs:
  - id: MS-02-001
    priority: MUST
    statement: Each requirement statement MUST include an RFC 2119 strength keyword inline (MUST, MUST NOT, SHOULD, SHOULD
      NOT, MAY).
    rationale: Inline keywords enable automated extraction and filtering.
    tags:
    - documentation
  - id: MS-02-002
    priority: MUST
    statement: 'Strength keywords MUST be drawn from the RFC 2119 vocabulary: MUST, SHALL, MUST NOT, SHALL NOT, SHOULD, SHOULD
      NOT, MAY, OPTIONAL.'
    rationale: Standardized vocabulary ensures unambiguous interpretation.
    tags:
    - documentation
- id: MS-03
  title: Requirement Format
  specs:
  - id: MS-03-001
    priority: MUST
    statement: Each requirement MUST be expressed as a single bullet point containing one imperative sentence.
    rationale: Atomic requirements are independently testable.
    tags:
    - documentation
  - id: MS-03-002
    priority: MUST
    statement: Every requirement MUST have a unique ID.
    rationale: IDs enable stable cross-referencing.
    tags:
    - documentation
  - id: MS-03-003
    priority: SHOULD
    statement: Sub-bullets SHOULD be used only for constraints, thresholds, exceptions, or conditional applicability; nesting
      SHOULD be limited to 2-3 levels.
    rationale: Shallow nesting keeps requirements scannable.
    tags:
    - documentation
- id: MS-04
  title: Requirement IDs
  specs:
  - id: MS-04-001
    priority: MUST
    statement: Requirement IDs MUST follow the format `PREFIX-NN-NNN` where PREFIX is the file-level prefix, NN is a two-digit
      group number, and NNN is a three-digit requirement number.
    rationale: Consistent format enables automated validation.
    tags:
    - documentation
  - id: MS-04-002
    priority: MUST
    statement: Requirement IDs MUST be globally unique across all spec files.
    rationale: Uniqueness prevents ambiguous cross-references.
    tags:
    - documentation
    relationships:
    - rel_type: implements
      spec_id: SR-01-006
  - id: MS-04-003
    priority: MUST
    statement: Requirement IDs MUST be stable; once assigned, an ID MUST NOT be renumbered. Superseded requirements MUST be
      removed entirely rather than left in place as deprecated.
    rationale: Stable IDs preserve traceability in git history; deprecated-but-present requirements create confusion for agents.
    tags:
    - documentation
  - id: MS-04-004
    priority: MUST
    statement: The group ID prefix of a spec ID MUST match the group it lives in (e.g., spec `HP-01-001` MUST live in group
      `HP-01`).
    rationale: Mismatched prefixes break navigability and cross-reference accuracy.
    tags:
    - documentation
    relationships:
    - rel_type: implements
      spec_id: SR-01-013
- id: MS-05
  title: Writing Rules
  specs:
  - id: MS-05-001
    priority: MUST
    statement: Requirements MUST be concise; prose explanations MUST NOT appear inline in requirement statements.
    rationale: Concise statements reduce ambiguity.
    tags:
    - documentation
  - id: MS-05-002
    priority: MUST
    statement: Requirements MUST be specific; vague terms such as 'appropriate' or 'robust' MUST NOT be used unless explicitly
      defined.
    rationale: Specificity makes requirements testable.
    tags:
    - documentation
  - id: MS-05-003
    priority: MUST
    statement: Requirements MUST be testable; measurable acceptance criteria MUST be provided where applicable.
    rationale: Untestable requirements cannot be verified.
    tags:
    - documentation
  - id: MS-05-004
    priority: MUST
    statement: Requirements MUST be declarative; they MUST state what the system must do, not how, unless the how is itself
      normative.
    rationale: Declarative requirements avoid constraining implementation unnecessarily.
    tags:
    - documentation
- id: MS-06
  title: Organization Patterns
  specs:
  - id: MS-06-001
    priority: SHOULD
    statement: Requirements SHOULD be grouped by domain concern first, then by priority (MUST before SHOULD before MAY).
    rationale: Domain grouping makes related requirements easy to find.
    tags:
    - documentation
- id: MS-07
  title: Cross-References and Sources
  specs:
  - id: MS-07-001
    priority: MUST
    statement: Cross-references between specs MUST use the format `ID-1 relationship-type ID-2` where relationship-type is
      one of the defined relationship vocabulary terms.
    rationale: Structured cross-references enable automated graph analysis.
    tags:
    - documentation
  - id: MS-07-002
    priority: MUST
    statement: Cross-references MUST be placed as a sub-bullet of the requirement that bears the relationship.
    rationale: Co-location with the requirement makes traceability obvious.
    tags:
    - documentation
  - id: MS-07-003
    priority: SHOULD
    statement: Cross-references SHOULD be placed in both source and target requirements using the corresponding inverse relationship
      for bidirectional traceability.
    rationale: Bidirectional links enable impact analysis from either end.
    tags:
    - documentation
  - id: MS-07-004
    priority: MUST
    statement: Source attribution MUST appear only in the file header, not repeated on individual requirements.
    rationale: Per-requirement sources create maintenance overhead.
    tags:
    - documentation
- id: MS-08
  title: File Naming
  specs:
  - id: MS-08-001
    priority: MUST
    statement: Spec files MUST use `kebab-case.yaml` naming; `specs/README.md` is the sole exception and MUST remain Markdown.
    rationale: Consistent naming enables glob patterns and automated tooling.
    tags:
    - documentation
    relationships:
    - rel_type: implements
      spec_id: SR-01-001
- id: MS-09
  title: Lifecycle of Requirements
  specs:
  - id: MS-09-001
    priority: MUST
    statement: Superseded requirements MUST be removed from spec files rather than marked deprecated or left in place with
      an annotation.
    rationale: Deprecated-but-present requirements are agent noise and may cause incorrect behaviour.
    tags:
    - documentation
  - id: MS-09-002
    priority: MUST
    statement: The removal of a requirement MUST be recorded in the implementation history so there is an audit trail.
    rationale: Audit trail preserves context for future maintainers.
    tags:
    - documentation
  - id: MS-09-003
    priority: MUST
    statement: Cross-references to a removed requirement MUST be updated to point to the replacement requirement.
    rationale: Dangling cross-references break traceability.
    tags:
    - documentation
- id: MS-10
  title: Quality Criteria
  specs:
  - id: MS-10-001
    priority: SHOULD
    statement: Spec files SHOULD be scannable via priority-grouped layout.
    rationale: Priority grouping lets readers quickly find the most critical requirements.
    tags:
    - documentation
  - id: MS-10-002
    priority: SHOULD
    statement: Spec files SHOULD be traceable via stable IDs and bidirectional cross-references.
    rationale: Traceability supports change impact analysis.
    tags:
    - documentation
  - id: MS-10-003
    priority: SHOULD
    statement: Spec files SHOULD be testable with verifiable acceptance criteria per requirement.
    rationale: Untestable specs cannot be reliably implemented.
    tags:
    - documentation
  - id: MS-10-004
    priority: SHOULD
    statement: Spec files SHOULD minimize formatting overhead so that adding or updating requirements requires minimal boilerplate.
    rationale: Low overhead encourages keeping specs current.
    tags:
    - documentation
