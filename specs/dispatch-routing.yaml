id: DR
title: Dispatch Routing
description: >-
  After semantic extraction, the dispatcher routes `VultronEvent` domain objects to the appropriate
  use-case class. The dispatcher may execute use cases synchronously (DirectActivityDispatcher)
  or asynchronously (queue-based).
version: 1.0.0
kind: domain
scope:
- prototype
- production
groups:
- id: DR-01
  title: Dispatcher Protocol
  specs:
  - id: DR-01-001
    priority: MUST
    statement: All dispatcher implementations MUST implement ActivityDispatcher protocol
  - id: DR-01-002
    priority: MUST
    statement: >-
      Dispatchers MUST construct use-case instances with the complete `VultronEvent` and `DataLayer`
      before calling `execute()`, so that `execute()` takes no arguments
  - id: DR-01-003
    priority: MUST
    statement: >-
      Dispatchers MUST perform semantic type validation at dispatch time using the configured
      semantics-to-use-case mapping
- id: DR-02
  title: Handler Lookup
  kind: implementation
  specs:
  - id: DR-02-001
    priority: MUST
    statement: The system MUST look up use-case classes by semantic type using `USE_CASE_MAP`
    relationships:
    - rel_type: derives_from
      spec_id: HP-03-001
  - id: DR-02-002
    priority: MUST
    statement: '`USE_CASE_MAP` MUST contain entries for all MessageSemantics values'
    relationships:
    - rel_type: derives_from
      spec_id: SE-05-002
- id: DR-03
  title: Direct Dispatch Implementation
  kind: implementation
  specs:
  - id: DR-03-001
    priority: MUST
    statement: The DirectActivityDispatcher MUST execute handlers synchronously
  - id: DR-03-002
    priority: MUST
    statement: >-
      The DirectActivityDispatcher MUST catch and log handler exceptions at ERROR level
    relationships:
    - rel_type: depends_on
      spec_id: SL-03-001
    - rel_type: depends_on
      spec_id: EH-06-001
- id: DR-04
  title: Async Dispatch Implementation
  specs:
  - id: DR-04-001
    priority: SHOULD
    statement: An async dispatcher SHOULD queue activities for processing
  - id: DR-04-002
    priority: SHOULD
    statement: An async dispatcher SHOULD process activities in FIFO order
