id: BTND
title: Behavior Tree Node Design
description: >-
  Formal requirements for BT node parameterization, composability, and reuse in `vultron/core/behaviors/`.
  These requirements operationalize the fractal composability pattern described in `notes/bt-reusability.md`.
  *when-to-use BTs* and *execution model* requirements live in `specs/behavior-tree-integration.md`.
version: 1.0.0
kind: pattern
scope:

- prototype
- production
groups:
- id: BTND-01
  title: Node Parameterization
  specs:
  - id: BTND-01-001
    priority: MUST_NOT
    statement: >-
      BT nodes MUST NOT hard-code actor identities, CVD roles, case IDs, or any context that
      varies by usage site; these values MUST be constructor parameters.
    rationale: >-
      Hard-coded context values prevent reuse across actors or scenarios and couple the node
      to a single workflow.
    relationships:
    - rel_type: refines
      spec_id: BT-06-004
  - id: BTND-01-002
    priority: MUST_NOT
    statement: >-
      BT nodes MUST NOT read actor identity, case ID, or CVD role from environment variables,
      module-level globals, or any implicit ambient context. All variable inputs MUST arrive
      via constructor parameters or the documented blackboard interface.
  - id: BTND-01-003
    priority: MUST
    statement: >-
      When a BT node name is derived from a parameterized value (e.g., role or actor ID),
      the name MUST be constructed from that parameter at instantiation time, not hard-coded
      as a string literal.
    relationships:
    - rel_type: refines
      spec_id: BT-06-004
- id: BTND-02
  title: Composability and Reuse
  specs:
  - id: BTND-02-001
    priority: MUST
    statement: >-
      Logic that appears in two or more BT nodes or subtrees MUST be extracted into a shared,
      parameterized node or factory function in a neutral shared module (see `BTND-04-001`).
    relationships:
    - rel_type: refines
      spec_id: BT-06-004
  - id: BTND-02-002
    priority: SHOULD
    statement: >-
      Each BT subtree SHOULD be independently triggerable as a use-case entry point AND composable
      as a child of a larger subtree.
    rationale: >-
      This is the "fractal composability" pattern. Subtrees that can only be used one way
      are candidates for refactoring.
    relationships:
    - rel_type: refines
      spec_id: BT-06-002
  - id: BTND-02-003
    priority: SHOULD
    statement: >-
      New BT subtrees SHOULD be verified against `notes/vultron-bt.txt` (the canonical simulation
      BT structure) to confirm structural correspondence before committing.
    relationships:
    - rel_type: refines
      spec_id: BT-06-002
  - id: BTND-02-004
    priority: SHOULD
    statement: >-
      A shared BT node or subtree that models a generic operation (e.g., "create a case participant
      with any role") SHOULD replace all role-specific one-off variants (e.g., `CreateFinderParticipantNode`,
      `CreateVendorParticipantNode`) once the shared version is available.
    rationale: >-
      Reduces maintenance surface; fixes and improvements apply consistently across all use
      sites.
- id: BTND-03
  title: Blackboard Interface Contracts
  kind: language
  specs:
  - id: BTND-03-001
    priority: MUST
    statement: >-
      Each BT node that reads from or writes to the py_trees blackboard MUST declare all blackboard
      keys it uses in its `setup()` method via `register_key()`.
    rationale: >-
      Undeclared blackboard reads create hidden dependencies that break composability and
      make tests fragile.
    relationships:
    - rel_type: refines
      spec_id: BT-03-003
  - id: BTND-03-002
    priority: MUST_NOT
    statement: >-
      A BT node MUST NOT read a blackboard key that was not registered with at least `READ`
      access in `setup()`.
    relationships:
    - rel_type: refines
      spec_id: BT-03-003
  - id: BTND-03-003
    priority: SHOULD
    statement: >-
      A BT node's docstring SHOULD document all blackboard keys it reads and writes, including
      the expected type and the node that produces the value for each READ key.
- id: BTND-04
  title: Module Ownership
  kind: implementation
  specs:
  - id: BTND-04-001
    priority: MUST_NOT
    statement: >-
      BT nodes or subtrees that are used by more than one domain module (e.g., by both `case/`
      and `report/`) MUST be defined in the shared `vultron/core/behaviors/helpers.py` module
      or a purpose-built shared module within `vultron/core/behaviors/`. Domain-specific modules
      MUST NOT import BT nodes from sibling domain modules.
    rationale: >-
      Cross-domain node imports create tight coupling and circular-import risk. Neutral shared
      ownership makes the dependency structure explicit.
    relationships:
    - rel_type: refines
      spec_id: ARCH-04-001
  - id: BTND-04-002
    priority: MUST_NOT
    statement: >-
      BT nodes MUST NOT import from `vultron/demo/` or any other demo-layer module. Demo-specific
      context (step descriptions, demo loggers, demo flags) belongs in demo scripts, not in
      BT nodes.
- id: BTND-05
  title: Actor Configuration for Participant Nodes
  kind: domain
  specs:
  - id: BTND-05-001
    priority: MUST
    statement: >-
      The `CVDRoles` enum MUST include a `CASE_OWNER` flag value representing the actor who
      owns and manages a `VulnerabilityCase`.
    rationale: >-
      Case ownership is a protocol-significant relationship distinct from the CVD roles (VENDOR,
      COORDINATOR, etc.). When a vendor or coordinator receives a report and creates a case,
      they are both the receiving CVD actor (VENDOR or COORDINATOR) and the case owner. Representing
      this explicitly avoids hardcoding the assumption that the case creator is always a vendor.
  - id: BTND-05-002
    priority: MUST
    statement: >-
      `CreateInitialVendorParticipant` MUST be replaced by a `CreateCaseOwnerParticipant`
      node that:
    rationale: >-
      "Vendor" is a demo-specific assumption. In the general protocol a coordinator, deployer,
      or other role may equally receive a report and become the case owner. The node MUST
      NOT know or care which CVD role the actor plays — only that they are the case owner.
    relationships:
    - rel_type: refines
      spec_id: BTND-01-001
  - id: BTND-05-003
    priority: MUST
    statement: >-
      The `CreateFinderParticipantNode` backward-compatibility alias (currently `CreateFinderParticipantNode
      = CreateCaseParticipantNode`) MUST be removed. All call sites MUST use `CreateCaseParticipantNode`
      directly with an explicit `roles` parameter.
    rationale: >-
      Alias names carry the old "finder-specific" framing and mislead readers about the node's
      actual generality.
  - id: BTND-05-004
    priority: MUST
    statement: >-
      The `CVDRole` enum MUST include a `CVE_NUMBERING_AUTHORITY` value representing a
      participant that holds CVE Numbering Authority (CNA) status.
    rationale: >-
      Multiple participants in an MPCVD case may independently be CNAs (e.g., a vendor CNA and
      a coordinator CNA). The `IsIDAssignmentAuthority` BT node checks whether a participant
      holds this role as a static capability check; `IdAssignable` evaluates whether the CNA's
      scope rules cover the specific vulnerability. Without a `CVE_NUMBERING_AUTHORITY` role in
      `CVDRole`, the protocol has no way to represent CNA status, route ID-assignment decision
      nodes to the correct participant(s), or distinguish CNA participants from non-CNA
      participants in case actor lists. `CVE_NUMBERING_AUTHORITY` is orthogonal to all other
      CVD roles — a VENDOR, COORDINATOR, or any participant may independently hold it.
    relationships:
    - rel_type: refines
      spec_id: BTND-05-001
- id: BTND-06
  title: Idiomatic BT Construction Patterns
  kind: language
  specs:
  - id: BTND-06-001
    priority: SHOULD
    statement: >-
      (**SHOULD**) Stateful BT nodes SHOULD use the **implicit sequence** pattern: a Fallback
      whose first child checks whether the goal is already achieved (the postcondition), and
      whose remaining children perform the work only when the goal has not yet been reached.
    rationale: >-
      Automatically makes nodes idempotent and reactive. Re-ticking a satisfied node costs
      only a cheap condition check. This is the dominant pattern throughout `vultron/bt/`.
    relationships:
    - rel_type: refines
      spec_id: BT-06-003
  - id: BTND-06-002
    priority: SHOULD
    statement: >-
      (**SHOULD**) When a Sequence contains multiple actions, each action that may already
      be complete SHOULD be paired with its success condition via a Fallback, making the **explicit
      success condition** visible in the tree.
    rationale: >-
      Improves readability and correctness. Readers can determine the success criterion of
      each step from the tree alone, without reading action implementations.
    relationships:
    - rel_type: refines
      spec_id: BT-06-004
  - id: BTND-06-003
    priority: SHOULD
    statement: >-
      (**SHOULD**) Every BT node that performs a protocol state transition (RM/EM/CS state
      machine update, emitting an AS2 activity, or creating/updating a domain object) SHOULD
      follow the **PPA (Postcondition–Precondition–Action)** structure: `Fallback(Postcondition,
      Sequence(Precondition1, …, PreconditionN, Action))`.
    rationale: >-
      PPA is the canonical "unit cell" of idiomatic BT design. It makes the node's contract
      (what it requires and what it guarantees) explicit and machine-readable from the tree
      structure.
    relationships:
    - rel_type: refines
      spec_id: BT-06-004
  - id: BTND-06-004
    priority: MAY
    statement: >-
      (**MAY**) Multi-step workflows where each step has its own preconditions that may need
      to be achieved MAY be constructed using **back-chaining**: start with the goal condition,
      find the PPA whose postcondition matches, and recursively substitute failing preconditions
      with their own PPAs.
    rationale: >-
      Back-chaining produces fully reactive, goal-directed trees where intermediate states
      are automatically recovered on failure.
    relationships:
    - rel_type: refines
      spec_id: BT-06-002
  - id: BTND-06-005
    priority: MUST
    statement: >-
      (**SHOULD**) Before any irreversible or protocol-significant action, a **safety guard
      condition** MUST be the first child of the enclosing Sequence, so that the action is
      skipped when the guard fails.
    rationale: >-
      Prevents unsafe state transitions when the world changes between ticks. In a multi-party
      protocol, another actor may change shared state at any time.
    relationships:
    - rel_type: refines
      spec_id: BT-06-003
  - id: BTND-06-006
    priority: MAY
    statement: >-
      (**MAY**) Memory composites (`memory=True` in py_trees) MAY be used **only** in contexts
      that are fully deterministic and non-reactive: no external actor can undo a child's
      outcome between ticks, and the agent operates in a closed-loop, human-supervised environment.
    relationships:
    - rel_type: refines
      spec_id: BT-06-003
  - id: BTND-06-007
    priority: SHOULD
    statement: >-
      (**SHOULD**) Use the following **granularity guidelines** when deciding whether a behavior
      should be a leaf node or a subtree:
    relationships:
    - rel_type: refines
      spec_id: BT-06-004
- id: BTND-07
  title: BT Node Module Organization
  kind: pattern
  specs:
  - id: BTND-07-001
    priority: MUST
    statement: >-
      BT node classes for a given protocol step MUST be organized into a `nodes/`
      subpackage rather than a single flat `nodes.py` module. This applies to all
      BT-bearing process areas in `vultron/core/behaviors/` regardless of current node
      count or file size — the `nodes/` subpackage is the standard organizational unit
      for leaf node implementations. Submodules MUST be grouped by semantic concern
      (e.g., `conditions.py`, `case_setup.py`, `participant.py`, `embargo.py`,
      `communication.py`, `lifecycle.py`). The package `__init__.py` MUST re-export all
      public node names to preserve import compatibility with callers.
    rationale: >-
      A flat `nodes.py` becomes a high-churn, high-blast-radius file where every change
      — regardless of which workflow step it touches — modifies the same module. This
      makes code review shallow, increases the risk of duplicate method definitions
      silently shadowing correct logic, and degrades test maintainability. Applying the
      `nodes/` subpackage pattern uniformly (not just when a file grows large) keeps the
      hierarchy consistent across all process areas and prevents gradual accumulation that
      creates a large-file problem later. Grouping by semantic concern reduces diff scope,
      improves discoverability, and lets reviewers focus on the affected concern in
      isolation.
    relationships:
    - rel_type: refines
      spec_id: BT-06-004
    verification: >-
      Every BT-bearing process area under `vultron/core/behaviors/` has a `nodes/`
      subpackage and does not retain a flat `nodes.py` module at the area root.
      Helper-only areas that do not define BT tree composition or BT leaf nodes are
      exempt.
  - id: BTND-07-002
    priority: SHOULD
    statement: >-
      (**SHOULD**) The test suite for a `nodes/` subpackage SHOULD mirror the subpackage
      structure: a `test/…/nodes/` directory with one `test_<submodule>.py` per submodule,
      so that each concern's tests are co-located and independently runnable.
    rationale: >-
      A monolithic `test_nodes.py` grows in parallel with the flat `nodes.py` and
      inherits the same blast-radius problem. Mirrored test files scope test failures to
      the affected concern and make it easier to add focused per-node unit tests.
    relationships:
    - rel_type: refines
      spec_id: BTND-07-001
    verification: >-
      For any `nodes/` subpackage, confirm that a matching `test/…/nodes/` directory
      exists with per-submodule test files.
  - id: BTND-07-003
    priority: MUST
    statement: >-
      Each BT-bearing process area directory under `vultron/core/behaviors/` MUST
      maintain a clear structural split between tree factory modules and leaf node
      modules. Tree factory modules (files named `*_tree.py` at the area root) define
      BT composition and structure. Leaf node modules (files in the `nodes/`
      subpackage) define BT `Behaviour` subclasses. Supporting files (e.g., `policy.py`,
      `update_support.py`) MAY exist at the area root alongside tree modules. This
      two-level hierarchy MAY be deepened further: a `nodes/` subpackage MAY itself
      contain sub-subpackages when a semantic concern grows large, following the same
      split pattern recursively.
    rationale: >-
      Mixing tree factory functions and leaf node class definitions in the same module
      conflates two separate concerns: composition/structure (how the tree is assembled)
      and implementation/detail (what each leaf node does). Keeping them in separate
      modules makes the tree structure immediately readable without navigating past
      implementation details, and lets each concern evolve independently without
      cross-contaminating diffs.
    relationships:
    - rel_type: refines
      spec_id: BTND-07-001
    verification: >-
      For each BT-bearing process area under `vultron/core/behaviors/`, confirm that
      `*_tree.py` modules do not define `Behaviour` subclasses inline (except trivial
      one-off composites), and that `nodes/` submodules do not define top-level tree
      factory functions.
  - id: BTND-07-004
    priority: MUST
    statement: >-
      BT leaf node modules under `vultron/core/behaviors/**/nodes/` MUST stay under
      500 lines each. A leaf module that exceeds 500 lines MUST be further decomposed
      into concern-focused modules or subpackages.
    rationale: >-
      Subpackage splits fail when they recreate the same god-module risk in a new file.
      A hard per-module cap keeps decomposition recursive and auditable.
    relationships:
    - rel_type: refines
      spec_id: CS-18-002
    verification: >-
      For each BT-bearing area, scan `nodes/` modules and fail compliance when any leaf
      module exceeds 500 lines.
