id: DC
title: Demo CLI
description: >-
  Requirements for a unified demo command-line interface that aggregates all individual Vultron
  demo scripts into a single invokable entry point. Covers CLI structure, demo isolation,
  Docker packaging, and test requirements. (PRIORITY 10) `prototype-shortcuts.md`
version: 1.0.0
groups:
- id: DC-01
  title: CLI Interface
  specs:
  - id: DC-01-001
    priority: MUST
    statement: >-
      The unified demo MUST be implemented as a `click`-based CLI script at `vultron/demo/cli.py`
  - id: DC-01-002
    priority: MUST
    statement: The CLI MUST provide a sub-command for each individual demo
  - id: DC-01-003
    priority: MUST
    statement: The CLI MUST provide an `all` sub-command that runs every demo in sequence
  - id: DC-01-004
    priority: MUST
    statement: >-
      The CLI MUST print a human-readable summary on completion of the `all` sub-command indicating
      which demos passed and which failed
  - id: DC-01-005
    priority: MUST
    statement: >-
      Individual demo scripts MUST retain their existing `if __name__ == "__main__"` entry
      points so they remain directly invokable
- id: DC-02
  title: Demo Utilities
  specs:
  - id: DC-02-001
    priority: MUST
    statement: >-
      Shared demo utilities (`demo_step`, `demo_check` context managers and HTTP client helpers)
      MUST be extracted to `vultron/demo/utils.py`
  - id: DC-02-002
    priority: MUST
    statement: >-
      Demo scripts MUST be relocated to `vultron/demo/` and MUST be importable as `vultron.demo.<script_name>`
- id: DC-03
  title: Demo Isolation
  specs:
  - id: DC-03-001
    priority: MUST
    statement: >-
      Each demo MUST include setup and teardown logic that leaves the DataLayer in a clean
      state after the demo completes
  - id: DC-03-002
    priority: MUST_NOT
    statement: >-
      Demos run in sequence (via the `all` sub-command) MUST NOT share mutable state; each
      demo MUST operate on a freshly initialized DataLayer context
  - id: DC-03-003
    priority: MUST_NOT
    statement: >-
      The CLI MUST NOT assume a globally pre-initialized DataLayer; each demo invocation MUST
      create and clean up its own context
- id: DC-04
  title: Docker Packaging
  specs:
  - id: DC-04-001
    priority: MUST
    statement: >-
      The unified demo MUST be packaged as a Docker service (`demo` service in `docker/docker-compose.yml`)
  - id: DC-04-002
    priority: MUST
    statement: >-
      The Docker entry point MUST launch the unified CLI so that the container runs interactively
      and prompts the user to select a demo
  - id: DC-04-003
    priority: MUST
    statement: >-
      Individual per-demo Docker services (one service per demo script) MUST be removed from
      `docker-compose.yml` once the unified demo service is operational
- id: DC-05
  title: Unit Testing
  specs:
  - id: DC-05-001
    priority: MUST
    statement: The unified CLI MUST have unit tests in `test/demo/test_cli.py`
  - id: DC-05-002
    priority: MUST
    statement: >-
      Unit tests for the `all` sub-command MUST mock or stub the individual demo functions
      and verify that every registered demo is invoked exactly once in the expected order
  - id: DC-05-003
    priority: MUST
    statement: >-
      Unit tests MUST verify that the CLI exits with a non-zero status code when any demo
      sub-command raises an exception
  - id: DC-05-004
    priority: MUST
    statement: >-
      Unit tests for each sub-command MUST verify the sub-command invokes the correct underlying
      demo function
- id: DC-06
  title: Integration Testing
  specs:
  - id: DC-06-001
    priority: SHOULD
    statement: >-
      An integration test script SHOULD exist at `integration_tests/demo/run_demo_integration_test.sh`
      (or equivalent Python script) that: 1. Starts the `api-dev` service and waits for it
      to be healthy 2. Runs the unified demo `all` sub-command inside the `demo` container
      3. Verifies all demos complete without errors
  - id: DC-06-002
    priority: MUST
    statement: >-
      A `integration_tests/README.md` MUST document how to run the integration tests and what
      success looks like
  - id: DC-06-003
    priority: SHOULD
    statement: >-
      The integration test SHOULD be runnable via a `Makefile` target (e.g., `make integration-test`)
