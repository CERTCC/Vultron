id: DEMOMA
title: Multi-Actor Demo
description: >-
  Requirements for multi-actor demo scenarios, Docker Compose orchestration, actor isolation,
  acceptance testing, and reproducibility. `plan/PRIORITIES.md` PRIORITY 300 `specs/case-management.md`,
  `specs/observability.md`
version: 1.0.0
kind: implementation
scope:
- prototype
- production
groups:
- id: DEMOMA-00
  title: Cross-Actor Communication
  specs:
  - id: DEMOMA-00-001
    priority: MUST
    statement: >-
      Cross-actor communication MUST occur exclusively via HTTP using the ActivityStreams
      inbox endpoint
- id: DEMOMA-01
  title: Actor Isolation
  specs:
  - id: DEMOMA-01-001
    priority: MUST
    statement: >-
      Each actor in a multi-actor demo MUST run in a separate container with its own DataLayer
      instance
  - id: DEMOMA-01-002
    priority: MUST
    statement: >-
      Each actor container MUST expose the actor's identity via its `/actors/{actor_id}` profile
      endpoint so that other containers can discover it at startup
  - id: DEMOMA-01-003
    priority: MUST
    statement: >-
      Demo startup MUST automatically reset all actor state to a known clean baseline before
      the scenario executes, without requiring manual user intervention
- id: DEMOMA-02
  title: Container Orchestration
  specs:
  - id: DEMOMA-02-001
    priority: MUST
    statement: >-
      Docker Compose configurations for multi-actor demos MUST include a `healthcheck` for
      each actor service that probes the `/health/ready` endpoint
    relationships:
    - rel_type: refines
      spec_id: IMPLTS-05-002
      note: tech-stack.md
    - rel_type: depends_on
      spec_id: OB-05-002
      note: observability.md
  - id: DEMOMA-02-002
    priority: MUST
    statement: >-
      Dependent services (e.g., a demo orchestration container) MUST use `condition: service_healthy`
      for all actor service dependencies
  - id: DEMOMA-02-003
    priority: MUST
    statement: >-
      Port mappings, network names, and required environment variables MUST be documented
      in the `docker-compose.yml` file or an accompanying `README.md`
- id: DEMOMA-03
  title: Acceptance Tests
  specs:
  - id: DEMOMA-03-001
    priority: MUST
    statement: >-
      Each multi-actor demo scenario MUST include an acceptance test that validates the end-to-end
      workflow deterministically
  - id: DEMOMA-03-002
    priority: MUST
    statement: >-
      Acceptance tests MUST assert final state for each actor (e.g., correct RM/EM/CS state,
      expected case log entries)
  - id: DEMOMA-03-003
    priority: MUST
    statement: >-
      Acceptance tests MUST be reproducible: the same test on the same codebase MUST produce
      the same result on successive runs
- id: DEMOMA-04
  title: Scenario Coverage
  specs:
  - id: DEMOMA-04-001
    priority: SHOULD
    statement: 'Multi-actor demo scenarios SHOULD be implemented progressively:'
  - id: DEMOMA-04-002
    priority: SHOULD
    statement: >-
      Each scenario SHOULD include a summary of the expected CVD workflow steps and the expected
      final RM/EM/CS state for each actor
- id: DEMOMA-05
  title: Demo Trigger Protocol
  specs:
  - id: DEMOMA-05-001
    priority: MUST
    statement: >-
      All actor-initiated actions in scenario demos MUST be driven through the trigger API
      (`POST /actors/{actor_id}/trigger/{behavior-name}`), not by direct inbox injection or
      other mechanisms that bypass the actor's own protocol logic
    rationale: >-
      Using trigger endpoints ensures that the demo exercises the same code paths that a real
      actor would use, including BT execution, outbox queuing, and downstream cascading behaviors.
      Direct inbox injection spoofs protocol messages and does not validate that the initiating
      actor's behavior is correctly implemented.
    relationships:
    - rel_type: depends_on
      spec_id: TRIG-01-001
      note: trigger endpoint format
  - id: DEMOMA-05-002
    priority: MUST_NOT
    statement: >-
      Scenario demo scripts MUST NOT construct and POST raw ActivityStreams JSON directly
      to an actor's inbox as a substitute for calling that actor's trigger endpoint
    relationships:
    - rel_type: refines
      spec_id: DEMOMA-00-001
- id: DEMOMA-06
  title: Two-Actor Scenario Workflow
  specs:
  - id: DEMOMA-06-001
    priority: MUST
    statement: >-
      The two-actor (Reporter + Vendor) demo scenario MUST execute a complete CVD lifecycle
      ending in final case state VFDPxa (Vendor aware, Fix ready, Fix Deployed, Public aware,
      no exploit public, no active attacks)
  - id: DEMOMA-06-002
    priority: MUST
    statement: >-
      The two-actor demo MUST verify the following milestones, checking both the Vendor and
      Finder DataLayers at each checkpoint: M1 (case + 3 participants + EM.ACTIVE),
      M2 (Finder has case replica), M4 (CS.VF on all replicas),
      M5 (CS.VFD on all replicas), M6 (CS.VFDPxa + EM terminated on all replicas),
      M7 (all participants RM.CLOSED, case closed)
  - id: DEMOMA-06-003
    priority: MUST
    statement: >-
      Milestone verification MUST read both the Vendor DataLayer and the Finder DataLayer
      directly; direct DataLayer reads are acceptable in demo scripts for verification
      (read-only assertions), but MUST NOT be used to write or manipulate actor state
  - id: DEMOMA-06-004
    priority: MUST
    statement: >-
      The two-actor demo Docker topology MUST use exactly two containers (finder and vendor);
      the Case Actor MUST be an actor record co-located in the vendor container with its own
      actor ID and inbox URL, not a separate container
- id: DEMOMA-07
  title: ParticipantStatus Trigger Pattern
  specs:
  - id: DEMOMA-07-001
    priority: MUST
    statement: >-
      CS state transitions (fix-ready, fix-deployed, published) and RM case closure MUST
      all be driven through participant status updates via
      Add(ParticipantStatus, target=Case) sent to the Case Actor inbox, not through dedicated
      low-level state-machine endpoints
  - id: DEMOMA-07-002
    priority: MUST
    statement: >-
      Demo trigger endpoints for participant status transitions MUST use the "notify" naming
      convention (e.g., notify-fix-ready, notify-fix-deployed, notify-published, close-case)
      to avoid semantic collision with the ActivityStreams Announce verb
  - id: DEMOMA-07-003
    priority: MUST
    statement: >-
      The Case Actor received handler for ADD_PARTICIPANT_STATUS_TO_PARTICIPANT MUST:
      (1) verify the activity actor is a known case participant,
      (2) update the participant status record,
      (3) announce the update to all other case participants,
      (4) if CS.P is newly set by the Case Owner, trigger embargo teardown automatically,
      (5) if all participants are RM.CLOSED, close the case automatically
  - id: DEMOMA-07-004
    priority: SHOULD
    statement: >-
      The participant status trigger implementation SHOULD be layered: SvcAddObjectToCaseUseCase
      (generic Add(object, target=Case)) as the base, SvcAddParticipantStatusUseCase (new core
      use case) above it, and demo-specific endpoints in demo_triggers.py at the top
- id: DEMOMA-08
  title: Case Actor Bootstrap and CASE_MANAGER Role
  specs:
  - id: DEMOMA-08-001
    priority: MUST
    statement: >-
      The vendor MUST send Create(VulnerabilityCase) (not Announce) to the Reporter as the
      trust bootstrap after case initialization; only the Case Actor uses Announce for
      subsequent case updates; the bootstrap payload MUST include all three participants
      (Vendor, Reporter, Case Actor) so the Reporter can bind the Case Actor identity to
      this case
    relationships:
    - rel_type: refines
      spec_id: CBT-01-001
      note: original report submission path bootstrap
  - id: DEMOMA-08-002
    priority: MUST
    statement: >-
      The CASE_MANAGER role delegation (Vendor hands operational management to Case Actor)
      MUST be implemented as a distinct protocol mechanism from OFFER_CASE_OWNERSHIP_TRANSFER;
      CASE_MANAGER delegation allows the Vendor to retain CASE_OWNER while delegating
      operational authority, and requires new MessageSemantics values:
      OFFER_CASE_MANAGER_ROLE and ACCEPT_CASE_MANAGER_ROLE
  - id: DEMOMA-08-003
    priority: MUST_NOT
    statement: >-
      CASE_MANAGER role delegation MUST NOT reuse or adapt the existing
      OFFER_CASE_OWNERSHIP_TRANSFER, ACCEPT_CASE_OWNERSHIP_TRANSFER, or
      REJECT_CASE_OWNERSHIP_TRANSFER message semantics; these are distinct protocol operations
      with different semantics and different effects on case ownership
  - id: DEMOMA-08-004
    priority: MUST
    statement: >-
      When the Case Actor accepts the CASE_MANAGER delegation, it MUST run the case
      initialization BT: establish the default embargo with both Vendor and Reporter
      immediately as SIGNATORY (no invite/accept round-trip), and set EM state to ACTIVE
      before the trust bootstrap is sent to the Reporter
