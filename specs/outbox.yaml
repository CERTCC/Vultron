id: OX
title: Outbox
description: >-
  Actor outboxes hold response activities generated by handlers. The outbox processor delivers
  queued activities to the appropriate recipient inboxes. is deferred to future work.
version: 1.0.0
kind: domain
scope:
- prototype
- production
groups:
- id: OX-01
  title: Outbox Structure
  specs:
  - id: OX-01-001
    priority: MUST
    statement: Each actor MUST have an outbox collection
  - id: OX-01-002
    priority: MUST
    statement: Outbox MUST preserve insertion order (FIFO)
  - id: OX-01-003
    priority: MUST
    statement: Activities added to outbox MUST be persisted to DataLayer immediately
- id: OX-02
  title: Outbox Population
  specs:
  - id: OX-02-001
    priority: MUST
    statement: Handlers that generate response activities MUST add them to the actor's outbox
  - id: OX-02-002
    priority: MUST
    statement: Each outbox activity MUST conform to ActivityStreams 2.0 structure
- id: OX-03
  title: Outbox Delivery
  kind: language
  specs:
  - id: OX-03-001
    priority: MUST
    statement: Activities in an actor's outbox MUST be delivered to recipient inboxes
  - id: OX-03-002
    priority: MUST
    statement: Delivery MUST occur after the generating handler completes
  - id: OX-03-003
    priority: MUST_NOT
    statement: Delivery MUST NOT block inbox HTTP response
- id: OX-04
  title: Local Delivery
  specs:
  - id: OX-04-001
    priority: MUST
    statement: >-
      For actors on the same server, delivery MUST write directly to the recipient actor's
      inbox collection in the DataLayer
  - id: OX-04-002
    priority: MUST
    statement: Local delivery MUST persist the inbox update immediately
- id: OX-05
  title: Federation Delivery
  specs:
  - id: OX-05-001
    priority: MAY
    statement: >-
      For remote actors, the system MAY deliver via HTTP POST to the remote actor's inbox
      URL
    scope:
    - production
  - id: OX-05-002
    priority: SHOULD
    statement: Remote delivery failures SHOULD be logged at WARNING level and retried
    scope:
    - production
- id: OX-06
  title: Delivery Idempotency
  specs:
  - id: OX-06-001
    priority: MUST
    statement: Outbox delivery MUST be idempotent
    relationships:
    - rel_type: depends_on
      spec_id: ID-02-001
- id: OX-07
  title: Outbound Reference Dehydration
  specs:
  - id: OX-07-001
    priority: MUST
    statement: >-
      The outbox handler MUST dehydrate the following ActivityStreams reference fields to
      URI strings before wire delivery: `actor`, `target`, `to`, `cc`, `bto`, `bcc`, `origin`,
      `result`, `instrument`
    rationale: >-
      Core and BT nodes construct activities using full domain objects for type safety and
      convenience; wire delivery requires URI strings in peripheral reference fields (ActivityPub
      federation convention)
  - id: OX-07-002
    priority: MUST_NOT
    statement: The `object_` field of outbound activities MUST NOT be dehydrated
    relationships:
    - rel_type: depends_on
      spec_id: MV-09-001
- id: OX-08
  title: Outbox Addressing
  specs:
  - id: OX-08-001
    priority: MUST
    statement: Every activity posted to an actor's outbox MUST have a non-empty `to:` field
    rationale: >-
      Vultron exchanges are direct messages; there are no public or broadcast activities in
      the protocol
  - id: OX-08-002
    priority: MUST
    statement: >-
      The `to:` field on outbound activities MUST be a list containing at least one URI string
  - id: OX-08-003
    priority: MUST
    statement: >-
      `handle_outbox_item` MUST raise `VultronOutboxToFieldMissingError` when it detects a
      missing or empty `to:` field
  - id: OX-08-004
    priority: SHOULD
    statement: >-
      If an outbound activity carries non-empty `cc:`, `bto:`, or `bcc:` fields, the outbox
      handler SHOULD log a WARNING
- id: OX-09
  title: Outbox Monitor Efficiency
  rationale: >-
    Fixed-interval polling grows O(N) with actor count: every tick iterates all registered
    actor DataLayers regardless of queue depth. Event-driven wakeup eliminates idle
    iteration cost and scales to large deployments.
  specs:
  - id: OX-09-001
    priority: SHOULD
    statement: >-
      The outbox monitor SHOULD use event-driven wakeup so that it drains actor outboxes
      immediately when an activity is enqueued, rather than waiting for the next fixed
      polling interval
    rationale: >-
      Reduces median delivery latency from up to poll_interval to near-zero at no extra
      CPU cost
  - id: OX-09-002
    priority: MUST
    statement: >-
      Even when event-driven wakeup is enabled, the outbox monitor MUST retain a
      safety-net polling interval so that outbox items are eventually delivered even if
      an enqueue notification is missed
  - id: OX-09-003
    priority: SHOULD
    statement: >-
      The enqueue notification mechanism SHOULD be injected into the DataLayer adapter as
      a callback so that the DataLayer does not import from the monitor layer
    rationale: Preserves the hexagonal architecture boundary between driven adapters
  - id: OX-09-004
    priority: SHOULD
    statement: >-
      The outbox monitor SHOULD log the total number of pending outbox items across all
      actors at DEBUG level on each drain pass
  - id: OX-09-005
    priority: SHOULD
    statement: >-
      If any single actor's outbox depth exceeds a configurable threshold, the outbox
      monitor SHOULD emit a WARNING-level log entry identifying the actor and depth
- id: OX-10
  title: Signed Remote Delivery
  scope:
  - production
  rationale: >-
    Plain unauthenticated HTTP POST (current DemoHttpDeliveryAdapter) is acceptable for
    prototype use. Production federation requires HTTP Message Signatures so recipient
    actors can verify the sender's identity and reject spoofed activities.
    vultron/adapters/driven/prod_http_delivery.py is a documented stub for this capability.
  specs:
  - id: OX-10-001
    priority: SHOULD
    statement: >-
      For remote actor delivery, the outgoing HTTP POST SHOULD be signed using HTTP
      Message Signatures (RFC 9421) with the sending actor's private key
    scope:
    - production
  - id: OX-10-002
    priority: MUST
    statement: >-
      The signing key pair MUST be per-actor and MUST NOT be shared across actors
    scope:
    - production
    relationships:
    - rel_type: depends_on
      spec_id: OX-10-001
  - id: OX-10-003
    priority: MUST
    statement: >-
      The signed delivery adapter MUST be transport-only: it MUST NOT construct or
      inspect ActivityStreams objects; serialization happens before the payload reaches
      the adapter
    rationale: Preserves the hexagonal layer boundary
    relationships:
    - rel_type: depends_on
      spec_id: OX-10-001
  - id: OX-10-004
    priority: MUST
    statement: >-
      Until signed delivery is implemented, adapters/driven/prod_http_delivery.py MUST
      raise NotImplementedError if instantiated, so that callers receive an explicit
      signal rather than a silent no-op
    scope:
    - prototype
- id: OX-11
  title: Shared-Inbox Fan-Out
  scope:
  - production
  rationale: >-
    ActivityPub shared-inbox delivers a single activity addressed to multiple local
    actors via one HTTP POST, avoiding N separate deliveries for large groups. This
    reduces network overhead for multi-party cases with many co-located participants.
    vultron/adapters/driving/shared_inbox.py is a documented stub for this capability.
  specs:
  - id: OX-11-001
    priority: MAY
    statement: >-
      The system MAY expose a shared inbox endpoint that accepts activities addressed
      to multiple local actors in a single HTTP request
    scope:
    - production
  - id: OX-11-002
    priority: MUST
    statement: >-
      If a shared inbox is implemented, it MUST validate the HTTP Signature on the
      inbound request before any fan-out processing
    scope:
    - production
    relationships:
    - rel_type: depends_on
      spec_id: OX-11-001
  - id: OX-11-003
    priority: MUST
    statement: >-
      If a shared inbox is implemented, it MUST enqueue one per-actor inbox delivery
      for each addressed local actor identified in the activity to/cc fields
    scope:
    - production
    relationships:
    - rel_type: depends_on
      spec_id: OX-11-001
  - id: OX-11-004
    priority: MUST
    statement: >-
      Until shared-inbox is implemented, adapters/driving/shared_inbox.py MUST raise
      NotImplementedError if instantiated, so that callers receive an explicit signal
      rather than a silent no-op
    scope:
    - prototype
