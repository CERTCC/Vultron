id: OX
title: Outbox
description: >-
  Actor outboxes hold response activities generated by handlers. The outbox processor delivers
  queued activities to the appropriate recipient inboxes. is deferred to future work.
version: 1.0.0
kind: domain
scope:
- prototype
- production
groups:
- id: OX-01
  title: Outbox Structure
  specs:
  - id: OX-01-001
    priority: MUST
    statement: Each actor MUST have an outbox collection
  - id: OX-01-002
    priority: MUST
    statement: Outbox MUST preserve insertion order (FIFO)
  - id: OX-01-003
    priority: MUST
    statement: Activities added to outbox MUST be persisted to DataLayer immediately
- id: OX-02
  title: Outbox Population
  specs:
  - id: OX-02-001
    priority: MUST
    statement: Handlers that generate response activities MUST add them to the actor's outbox
  - id: OX-02-002
    priority: MUST
    statement: Each outbox activity MUST conform to ActivityStreams 2.0 structure
- id: OX-03
  title: Outbox Delivery
  kind: language
  specs:
  - id: OX-03-001
    priority: MUST
    statement: Activities in an actor's outbox MUST be delivered to recipient inboxes
  - id: OX-03-002
    priority: MUST
    statement: Delivery MUST occur after the generating handler completes
  - id: OX-03-003
    priority: MUST_NOT
    statement: Delivery MUST NOT block inbox HTTP response
- id: OX-04
  title: Local Delivery
  specs:
  - id: OX-04-001
    priority: MUST
    statement: >-
      For actors on the same server, delivery MUST write directly to the recipient actor's
      inbox collection in the DataLayer
  - id: OX-04-002
    priority: MUST
    statement: Local delivery MUST persist the inbox update immediately
- id: OX-05
  title: Federation Delivery
  specs:
  - id: OX-05-001
    priority: MAY
    statement: >-
      For remote actors, the system MAY deliver via HTTP POST to the remote actor's inbox
      URL
    scope:
    - production
  - id: OX-05-002
    priority: SHOULD
    statement: Remote delivery failures SHOULD be logged at WARNING level and retried
    scope:
    - production
- id: OX-06
  title: Delivery Idempotency
  specs:
  - id: OX-06-001
    priority: MUST
    statement: Outbox delivery MUST be idempotent
    relationships:
    - rel_type: depends_on
      spec_id: ID-02-001
- id: OX-07
  title: Outbound Reference Dehydration
  specs:
  - id: OX-07-001
    priority: MUST
    statement: >-
      The outbox handler MUST dehydrate the following ActivityStreams reference fields to
      URI strings before wire delivery: `actor`, `target`, `to`, `cc`, `bto`, `bcc`, `origin`,
      `result`, `instrument`
    rationale: >-
      Core and BT nodes construct activities using full domain objects for type safety and
      convenience; wire delivery requires URI strings in peripheral reference fields (ActivityPub
      federation convention)
  - id: OX-07-002
    priority: MUST_NOT
    statement: The `object_` field of outbound activities MUST NOT be dehydrated
    relationships:
    - rel_type: depends_on
      spec_id: MV-09-001
- id: OX-08
  title: Outbox Addressing
  specs:
  - id: OX-08-001
    priority: MUST
    statement: Every activity posted to an actor's outbox MUST have a non-empty `to:` field
    rationale: >-
      Vultron exchanges are direct messages; there are no public or broadcast activities in
      the protocol
  - id: OX-08-002
    priority: MUST
    statement: >-
      The `to:` field on outbound activities MUST be a list containing at least one URI string
  - id: OX-08-003
    priority: MUST
    statement: >-
      `handle_outbox_item` MUST raise `VultronOutboxToFieldMissingError` when it detects a
      missing or empty `to:` field
  - id: OX-08-004
    priority: SHOULD
    statement: >-
      If an outbound activity carries non-empty `cc:`, `bto:`, or `bcc:` fields, the outbox
      handler SHOULD log a WARNING
