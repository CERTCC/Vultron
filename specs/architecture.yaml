id: ARCH
title: Architecture
description: >-
  Defines the architectural constraints for the Vultron codebase. The system follows hexagonal
  architecture (Ports and Adapters): the core domain is isolated from all external systems,
  which interact through defined ports via thin adapters. Covers layer separation rules,
  the shared-base object hierarchy, domain model richness, and the fail-fast validation
  boundary.
version: 1.0.0
scope:
- prototype
- production
tags:
- code-style
groups:
- id: ARCH-01
  title: Layer Separation
  specs:
  - id: ARCH-01-001
    priority: MUST_NOT
    kind: pattern
    statement: The `core/` package (or equivalent domain layer) MUST NOT import from `wire/`, `adapters/`, or any external
      framework
    rationale: Keeps domain logic replaceable without touching the wire or transport layer
    relationships:
    - rel_type: derives_from
      spec_id: CS-05-001
  - id: ARCH-01-002
    priority: MUST
    kind: pattern
    statement: Core functions MUST accept and return domain types only
  - id: ARCH-01-003
    priority: MUST_NOT
    kind: pattern
    statement: The `wire/` layer (AS2 parser, semantic extractor) MUST NOT contain handler logic, case management, or journal
      management
    rationale: Wire format concerns are structurally distinct from domain concerns; mixing them prevents future wire format
      substitution

  - id: ARCH-01-004
    priority: MUST
    kind: pattern
    statement: >-
      All ARCH-01-001 violations in `vultron/core/` MUST be remediated via
      dedicated driven ports. Each file with a core→wire import MUST be given
      a narrow driven port (following the `SyncActivityPort` or
      `TriggerActivityPort` pattern) or folded under an expanded shared port.
    rationale: >-
      Leaving core→wire import violations unfixed undermines the hexagonal
      boundary and prevents clean unit testing of core logic with mock adapters.
      See tracking issues for the current set of known violations.
    relationships:
      - rel_type: refines
        spec_id: ARCH-01-001
        note: >-
          ARCH-01-001 is the general constraint; ARCH-01-004 requires that
          all violations be systematically remediated via driven ports.
  - id: ARCH-01-005
    priority: MUST_NOT
    kind: implementation
    statement: >-
      Production adapters (HTTP routes, CLI commands, MCP server, background workers)
      MUST NOT import from `vultron/demo/`. Demo-layer modules are not part of the
      production dependency graph and MUST be treated as test-only code for runtime
      purposes.
    rationale: >-
      The demo layer contains simplified, non-production implementations of actors and
      data handling. Importing it in production adapters silently pulls in demo behaviour
      and dummy data, and couples production code to a layer with no stability guarantees.
    relationships:
    - rel_type: refines
      spec_id: ARCH-01-001
  - id: ARCH-01-006
    priority: MUST_NOT
    kind: pattern
    statement: >-
      Demo-layer modules (`vultron/demo/**`) MUST NOT import from the legacy
      simulator package (`vultron/bt/**`). The sole permitted exception is the
      unified demo CLI aggregator (`vultron/demo/cli.py`, mandated by DC-01-001),
      which surfaces the standalone `vultron/bt/`-based behaviour-tree demos
      (pacman, robot, cvd) as a sub-group. Demo *logic* modules
      (`vultron/demo/scenario/`, `vultron/demo/exchange/`, `vultron/demo/helpers/`,
      `vultron/demo/fuzzer/`) MUST remain free of any `vultron/bt/` import.
    rationale: >-
      `vultron/demo/` demonstrates the production protocol; `vultron/bt/` is the
      frozen legacy custom-engine simulator slated for retirement (see
      `notes/codebase-structure.md` "Module Boundary"). Coupling demo logic to the
      legacy simulator undermines the decoupling `vultron/demo/fuzzer/` was created
      to achieve. `cli.py` is exempt as a thin aggregator entry point — the single
      documented bridge to the bt-tree demos. Derives from ADR-0009 (hexagonal).
    relationships:
    - rel_type: refines
      spec_id: ARCH-01-001
- id: ARCH-02
  title: SemanticIntent Enum
  specs:
  - id: ARCH-02-001
    priority: MUST
    kind: domain
    statement: The `MessageSemantics` enum (`SemanticIntent`) MUST be defined in the domain layer, not in the wire layer
- id: ARCH-03
  title: Semantic Extractor
  specs:
  - id: ARCH-03-001
    priority: MUST
    kind: domain
    statement: 'AS2 vocabulary MUST be mapped to domain concepts in exactly one location: the semantic extractor'
    rationale: Isolates the single seam where wire format changes are absorbed
- id: ARCH-04
  title: Driven Adapter Injection
  specs:
  - id: ARCH-04-001
    priority: MUST
    kind: pattern
    statement: Driven adapters (persistence, delivery queue, DNS resolver, HTTP delivery) MUST be injected into core services
      via port interfaces
    rationale: Enables testing core logic with in-memory ports and swapping production backends without touching domain code

  - id: ARCH-04-002
    priority: MUST
    kind: implementation
    statement: >-
      `SyncActivityPort` MUST be defined as a `typing.Protocol` in
      `vultron/core/ports/sync_activity_port.py` with two fire-and-forget
      methods:
        - `send_reject_log_entry(entry: VultronCaseLedgerEntry, tail_hash: str, actor_id: str, to: str) -> None`
        - `send_announce_log_entry(entry: VultronCaseLedgerEntry, actor_id: str, to: str) -> None`
      The concrete adapter (`SyncActivityAdapter`) MUST be implemented in
      `vultron/adapters/driven/sync_activity_adapter.py` and own the full
      domain → wire → persist → outbox pipeline. Core use cases and BT nodes
      MUST call only the port methods and MUST NOT import wire types
      (`CaseLedgerEntry`, `WireCaseLedgerEntry`) or wire factory functions
      (`announce_log_entry_activity`, `reject_log_entry_activity`).
    rationale: >-
      The incremental fix for ARCH-01-001 violations in `received/sync.py`
      and `triggers/sync.py`. The "baton-pass" pattern: core hands domain
      objects to the port; the adapter handles wire conversion unidirectionally.
    relationships:
      - rel_type: refines
        spec_id: ARCH-04-001
        note: SyncActivityPort is the specific driven port for sync outbound activities
      - rel_type: implements
        spec_id: ARCH-01-001
        note: Eliminates wire imports from core sync use cases

- id: ARCH-05
  title: Connector Plugins
  specs:
  - id: ARCH-05-001
    priority: MUST_NOT
    kind: language
    statement: Connector plugins (tracker integrations) MUST be discovered via Python entry points (`importlib.metadata`);
      the core MUST NOT import them directly
  - id: ARCH-05-002
    priority: MUST
    kind: language
    statement: Connector plugins MUST translate only — no case handling logic, authorization, or journal management belongs
      in a connector
- id: ARCH-06
  title: Wire Layer Replaceability
  specs:
  - id: ARCH-06-001
    priority: SHOULD
    kind: pattern
    statement: The wire layer (`wire/as2/`) SHOULD be replaceable as a unit without touching the core or adapter layers
- id: ARCH-07
  title: Handler Isolation
  specs:
  - id: ARCH-07-001
    priority: MUST_NOT
    kind: pattern
    statement: Handler functions MUST NOT re-invoke semantic extraction
- id: ARCH-08
  title: Driving Adapter Boundary
  specs:
  - id: ARCH-08-001
    priority: MUST
    kind: pattern
    statement: Driving adapters (HTTP inbox, CLI, MCP server) MUST invoke the wire pipeline before calling into the core
    rationale: Any driving adapter that needs to ingest AS2 can reuse the wire pipeline; there is no duplication
  - id: ARCH-08-002
    priority: MUST
    kind: pattern
    statement: >-
      A driving adapter MUST promote an incoming wire object to its most-specific domain
      type at the adapter boundary, before passing the object into the core. The core
      MUST NOT receive a bare `BaseObject` or generic `BaseModel` when a more specific
      type is determinable from the wire payload.
    rationale: >-
      Promoting at the boundary ("validate at edge") ensures that core handlers receive
      fully typed objects and never need to downcast or call `isinstance()` to recover
      type information that was present on the wire. Deferring promotion into the core
      violates the hexagonal principle that adapters adapt, cores compute.
    relationships:
    - rel_type: refines
      spec_id: ARCH-08-001
    - rel_type: implements
      spec_id: CS-10-001
- id: ARCH-12
  title: Shared-Base Object Hierarchy
  rationale: >-
    The from_core()/to_core() translation protocol (the original ARCH-12
    design) was a workaround for independent parallel hierarchies. A
    shared-base approach eliminates the need for that protocol: both core
    and wire branches inherit from the same lenient root, field names align,
    and Pydantic model_validate() handles translation. See ADR-0017 Option D
    and concern #796.
  specs:
  - id: ARCH-12-001
    priority: MUST
    kind: implementation
    statement: >-
      `as_Base` MUST inherit from `VultronBase`; `as_Object` MUST inherit
      from `VultronObject`. `VultronBase` and `VultronObject` (in
      `vultron/core/models/base.py`) are the shared root for both the core
      and wire object hierarchies.
    rationale: >-
      A shared root ensures field names and semantics align across both
      branches, enabling model_validate() round-trips without per-type
      translation stubs.
    verification: >-
      `issubclass(as_Base, VultronBase)` and
      `issubclass(as_Object, VultronObject)` are both True.
  - id: ARCH-12-002
    priority: MUST
    kind: implementation
    statement: >-
      The shared base (`VultronBase` / `VultronObject`) MUST define all
      shared fields with the most lenient types (`str | None`,
      `Any | None`, `datetime | None`). Neither branch may introduce a
      field type in a way that is Pydantic-incompatible with the shared
      base.
    rationale: >-
      Lenient shared-base types allow both branches to narrow independently
      without MRO conflicts; Pydantic AfterValidator narrowing is valid in
      subclasses.
  - id: ARCH-12-003
    priority: MUST
    kind: implementation
    statement: >-
      The core branch MAY narrow inherited fields via Pydantic validators
      (e.g., `NonEmptyString | None`, required `datetime`). Core-branch
      types MUST NOT carry wire-specific concerns: `alias_generator=to_camel`,
      hardcoded AS2 `@context` namespace, or VOCABULARY registration are
      forbidden in core-branch types.
    verification: >-
      `CoreObject` and its subclasses do not reference `to_camel` or assign
      to `VOCABULARY`. Confirmed by the layer-boundary test in
      `test/architecture/test_layer_boundaries.py`.
  - id: ARCH-12-004
    priority: MUST
    kind: implementation
    statement: >-
      The wire branch MUST NOT carry domain validators. Wire-branch overrides
      exist solely for AS2 serialization shape (field aliases, `@context`,
      lenient `Any | None` types). Wire-branch types MUST register in
      `VOCABULARY`; core-branch types MUST register in `CORE_VOCABULARY`.
  - id: ARCH-12-005
    priority: MUST
    kind: implementation
    statement: >-
      For types where both branches share field names and compatible types,
      translation from a core object to its wire counterpart MUST use
      `WireType.model_validate(core_obj.model_dump(mode="json"))`. No
      explicit `from_core()` / `to_core()` classmethods are required.
    rationale: >-
      Eliminating the explicit translation protocol removes per-type boilerplate
      and the _field_map escape hatch. The shared-base alignment ensures the
      round-trip is correct by construction.
  - id: ARCH-12-006
    priority: MUST
    kind: implementation
    statement: >-
      Actor `inbox` and `outbox` fields MUST be typed `str | None` in the
      shared base and core branch, carrying only the URI of the inbox or
      outbox endpoint. AS2 `OrderedCollection` wrapping is a wire-only
      serialization concern and MUST NOT appear in core-branch actor types.
    rationale: >-
      Domain logic only ever needs to route to the inbox URI; the full
      collection shape is an AS2 protocol concern, not a domain concern.
      This resolves the most structurally irreconcilable field-type conflict
      that blocked the original ARCH-12 from_core()/to_core() approach.
  - id: ARCH-12-007
    priority: MUST
    kind: implementation
    statement: >-
      All core domain objects that represent protocol-significant entities
      (cases, reports, participants, actors, log entries, embargo policies,
      etc.) MUST inherit from `CoreObject` (or `VultronObject` when
      CORE_VOCABULARY registration is not needed). Objects that exist solely
      as local configuration, transient dispatch envelopes, or internal
      processing records that are never shared across the wire MAY remain
      plain `BaseModel` subclasses; such classes MUST include a docstring
      explaining the rationale for not inheriting from the shared-base
      hierarchy.
    rationale: >-
      Consistent use of the shared-base hierarchy ensures that all
      protocol-significant domain objects share aligned field names,
      can participate in model_validate() round-trips (ARCH-12-005), and
      are discoverable via CORE_VOCABULARY. Intentional BaseModel classes
      are the exception, not the default; requiring a documented rationale
      prevents accidental hierarchy bypass as the codebase evolves.
    verification: >-
      Static analysis or a test asserts that all classes in
      `vultron/core/models/` that contain protocol-significant fields
      (`id_`, `type_`, `published`, `attributed_to`) inherit from
      `CoreObject` or `VultronObject`. Intentional `BaseModel` subclasses
      are listed in a registry or identified by a marker mixin/comment
      pattern.
- id: ARCH-09
  title: Domain Model Richness Constraint
  specs:
  - id: ARCH-09-001
    priority: MUST
    kind: pattern
    statement: Core domain models MUST be as rich as or richer than their wire-layer counterparts
    rationale: A thinner core model forces piecemeal additions as handlers are implemented, causing boundary leakage and implementation
      drift
  - id: ARCH-09-002
    priority: MUST
    kind: implementation
    statement: >-
      Actor domain models (`CoreActor` and its concrete subclasses `VultronPerson`,
      `VultronOrganization`, `VultronService`, `VultronApplication`, `VultronGroup`)
      MUST be defined in `vultron/core/models/`. The wire layer (`vultron/wire/as2/`)
      MUST provide corresponding wire-branch actor types inheriting from the
      shared base (`VultronObject`) rather than re-exporting core types directly.
    rationale: >-
      Defining actor domain models in core enforces the hexagonal boundary.
      The re-export pattern (where wire re-exported core actors directly) was a
      transitional workaround introduced when field-type conflicts blocked
      diamond inheritance. The shared-base approach (ARCH-12) resolves those
      conflicts; wire actor types should become proper wire-branch types
      once the implementation epic following concern #796 is complete.
    verification: >-
      Confirm that `VultronPerson`, `VultronOrganization`, `VultronService`,
      `VultronApplication`, and `VultronGroup` are defined in
      `vultron/core/models/actor.py`. Confirm that wire actor types in
      `vultron/wire/as2/vocab/objects/vultron_actor.py` inherit from
      `VultronObject` (or a subclass thereof) rather than re-exporting
      the core classes unchanged.
    relationships:
      - rel_type: refines
        spec_id: ARCH-09-001
      - rel_type: depends_on
        spec_id: ARCH-12-001
        note: >-
          ARCH-12 establishes the shared-base hierarchy; wire actor types
          must inherit from that shared base, not re-export core types.
- id: ARCH-10
  title: Fail-Fast Domain Objects
  specs:
  - id: ARCH-10-001
    priority: MUST
    kind: pattern
    statement: Domain events and domain models MUST validate required fields at construction time and fail immediately if
      required invariants are not satisfied
    rationale: Late validation masks missing data and makes debugging harder; fail-fast ensures errors surface at the point
      of construction
- id: ARCH-15
  title: Fail-Fast at Domain Operation Boundaries
  description: >-
    Governs relational invariants enforced at runtime entry points — use-case execute(),
    BT node update(), and helper functions that require non-None resolved values. Extends
    the construction-time fail-fast rule to cover checks that can only be performed at
    the point of invocation, not at object construction.
  specs:
  - id: ARCH-15-001
    priority: MUST
    kind: pattern
    statement: >
      A BT node's update() MUST return Status.FAILURE when a required blackboard
      key is absent or resolves to None. It MUST NOT return Status.SUCCESS in
      this case, as doing so misleads the enclosing BT sequence and silently
      drops protocol behavior (e.g., ledger entries not written).
    rationale: >
      Status.SUCCESS on a missing required input causes the BT sequence to
      continue as if the node succeeded, masking the failure and producing
      ledger gaps, dropped broadcasts, and mis-routed activities.
      See notes/domain-validation.md and ADR-0032.
    relationships:
      - rel_type: refines
        spec_id: ARCH-10-001
        note: Extends construction-time fail-fast to runtime BT node entry points.
  - id: ARCH-15-002
    priority: MUST
    kind: pattern
    statement: >
      A helper function that requires a non-None ID MUST check the result
      and raise VultronValidationError (or UnroutableActivityError for routing
      failures) immediately. The strict guarantee lives in the caller or the
      helper itself — never deferred silently to downstream code.
    rationale: >
      Returning None from a helper that conceptually requires a valid ID moves
      the error from the point of failure to the point of use, making stack
      traces and logs point to the wrong location.
      See notes/domain-validation.md and ADR-0032.
    relationships:
      - rel_type: refines
        spec_id: ARCH-10-001
        note: Extends construction-time fail-fast to helper function entry points.
  - id: ARCH-15-003
    priority: MUST
    kind: pattern
    statement: >
      The dispatcher MUST raise UnroutableActivityError when no case_id can
      be extracted from an inbound event. It MUST NOT return None and silently
      drop the activity from ledger indexing.
    rationale: >
      A silently dropped activity produces an invisible gap in the canonical
      case ledger and leaves no audit trail. The dispatcher caller must make
      an explicit decision about how to handle unroutable activities.
      See notes/domain-validation.md and ADR-0032.
    relationships:
      - rel_type: refines
        spec_id: ARCH-10-001
        note: Extends construction-time fail-fast to dispatcher routing entry points.
  - id: ARCH-15-004
    priority: MUST
    kind: pattern
    statement: >
      Each domain helper function MUST have exactly one canonical copy.
      Layer-neutral helpers (no dependencies above `models/`) MUST live in
      `vultron/core/models/_helpers.py`. Use-case-specific helpers belong in
      `vultron/core/use_cases/_helpers.py`. Duplicate implementations of the
      same logic are prohibited.
    rationale: >
      Duplicate helper copies diverge silently over time. Two copies of
      _as_id() in use_cases/_helpers.py and services/embargo_lifecycle.py had
      already diverged in docstring accuracy. Three copies of the case-manager
      lookup produced inconsistent None-handling behavior across callers.
      See notes/domain-validation.md and ADR-0032.
    relationships:
      - rel_type: refines
        spec_id: ARCH-10-001
        note: Canonical-copy discipline is a prerequisite for consistent fail-fast enforcement.
- id: ARCH-11
  title: Port Inbound/Outbound Discrimination
  specs:
  - id: ARCH-11-001
    priority: SHOULD
    kind: pattern
    statement: Core ports SHOULD be organized into inbound (driving) and outbound (driven) categories
- id: ARCH-14
  title: Wire Vocabulary Object Naming Convention
  rationale: >-
    Wire vocabulary objects in `vultron/wire/as2/vocab/objects/` historically
    used bare domain names (e.g., `VulnerabilityCase`, `CaseParticipant`) that
    shadow identically-named core domain models. This causes persistent
    confusion: agents and developers grab the wrong class, reason about the
    wrong object, or inadvertently introduce wire-layer imports into core code.
    The `as_` prefix — already established for base ActivityStreams types
    (`as_Activity`, `as_Actor`, `as_Object`) — MUST be extended to all
    Vultron-specific wire vocabulary objects to make the layer boundary
    unambiguous at a glance.
  specs:
  - id: ARCH-14-001
    priority: MUST
    kind: implementation
    statement: >-
      All Vultron-specific wire vocabulary classes defined in
      `vultron/wire/as2/vocab/objects/` MUST use the `as_` prefix
      (e.g., `as_VulnerabilityCase`, `as_CaseParticipant`, `as_CaseStatus`).
      This extends the existing `as_` naming convention — already applied to
      base ActivityStreams types (`as_Activity`, `as_Actor`, `as_Object`) —
      to all Vultron-specific wire objects in that package.
    rationale: >-
      Without the `as_` prefix, wire objects shadow identically-named core
      domain models, making it ambiguous which `VulnerabilityCase` a developer
      or agent is working with. The `as_` prefix makes the layer boundary
      unambiguous at a glance and enables automated detection of violations.
    verification: >-
      Architecture test in `test/architecture/` asserts that no class in
      `vultron/wire/as2/vocab/objects/` shares a name with any class in
      `vultron/core/models/`.
  - id: ARCH-14-002
    priority: MUST
    kind: implementation
    statement: >-
      The wire-layer base class for all Vultron-specific AS2 objects (currently
      `VultronAS2Object`) MUST be renamed `as_VultronObject`. This eliminates
      the redundant "AS2" qualifier (the `as_` prefix already connotes the
      wire layer) and aligns the base class name with ARCH-14-001.
    rationale: >-
      `VultronAS2Object` does not follow the `as_` prefix convention. The
      "AS2" suffix is redundant when the `as_` prefix already signals the
      wire layer. Renaming to `as_VultronObject` makes the base class
      consistent with all subclasses.
    verification: >-
      `vultron/wire/as2/vocab/objects/base.py` exports `as_VultronObject`;
      no class named `VultronAS2Object` exists anywhere in the codebase.
  - id: ARCH-14-003
    priority: MUST
    kind: implementation
    statement: >-
      `TypeAlias` companion types (wire-layer reference unions, e.g.,
      `VulnerabilityCaseRef`) MUST also use the `as_` prefix
      (e.g., `as_VulnerabilityCaseRef`, `as_CaseParticipantRef`).
    rationale: >-
      Companion aliases that do not follow the `as_` naming convention
      undermine the goal of ARCH-14-001: an import of `VulnerabilityCaseRef`
      is just as ambiguous as importing `VulnerabilityCase` from the wire layer.
    verification: >-
      No `TypeAlias` variable in `vultron/wire/as2/vocab/objects/` uses a
      name that matches a core model name without the `as_` prefix.
- id: ARCH-13
  title: DataLayer Scope Contract
  specs:
  - id: ARCH-13-001
    priority: MUST
    kind: implementation
    statement: >
      The base `DataLayer` protocol MUST be used only for shared object storage operations
      (read, write, save, list). It MUST NOT be passed to functions that perform
      inbox or outbox queue operations.
    rationale: >
      Inbox and outbox queue operations are actor-scoped; using the shared DataLayer
      (actor_id=None) silently operates on a phantom queue keyed by the empty string
      ("") rather than the actor's real queue, causing reads to appear empty and
      writes to be unreadable by the correct actor.
  - id: ARCH-13-002
    priority: MUST
    kind: implementation
    statement: >
      Inbox and outbox queue operations (inbox_list, inbox_pop, inbox_append,
      outbox_list, outbox_pop, outbox_append) MUST be performed on an `ActorScopedDataLayer`
      instance — a DataLayer whose actor_id is set to a non-empty canonical URI.
    rationale: >
      Queue rows are stored with actor_id as a column key; an unscoped DataLayer
      (actor_id=None) cannot address per-actor queue rows correctly.
  - id: ARCH-13-003
    priority: MUST
    kind: implementation
    statement: >
      The actor_id used when constructing an `ActorScopedDataLayer` MUST be the
      actor's canonical URI (the value of actor.id_), not a short ID, UUID
      path segment, or any other derived identifier.
    rationale: >
      record_outbox_item writes queue rows keyed by the actor_id string it receives.
      If outbox_list is called on a DataLayer scoped to a different string (e.g., a
      short UUID when the writer used a full URI), the queue appears empty and
      outbound activities are silently dropped (see BUG-2026040901).
  - id: ARCH-13-004
    priority: MUST
    kind: implementation
    statement: >
      The actor_id argument passed to record_outbox_item MUST match exactly the
      actor_id used to construct the `ActorScopedDataLayer` that will later call
      outbox_list or outbox_pop for that actor.
    rationale: >
      The queue key is a plain string equality check. Any mismatch — including
      full-URI vs. short-UUID — produces a silent empty read.
  - id: ARCH-13-005
    priority: SHOULD
    kind: implementation
    statement: >
      The `ActorScopedDataLayer` protocol type SHOULD be defined in
      `vultron/core/ports/datalayer.py` as a refinement of `DataLayer` so that
      type-checkers (mypy, pyright) can enforce scope boundaries at
      function-signature level. It is currently implemented there with methods:
      `inbox_append(activity_id: str) -> None`, `inbox_list() -> list[str]`,
      `inbox_pop() -> str | None`, `outbox_append(activity_id: str) -> None`,
      `outbox_list() -> list[str]`, `outbox_pop() -> str | None`.
    rationale: >
      An explicit Protocol type converts a convention-only rule into a
      compile-time-enforced boundary, making violations visible without running
      the code.
- id: ARCH-16
  title: App State Isolation
  specs:
  - id: ARCH-16-001
    priority: MUST_NOT
    kind: language
    statement: >-
      `create_app()` (or any equivalent application factory) MUST NOT mutate module-level
      singletons, global registries, or process-wide shared state. All per-application
      state MUST be scoped to the returned app instance or its lifespan context.
    rationale: >-
      Mutating module-level singletons in `create_app()` makes test isolation impossible:
      the second call to `create_app()` in the same process inherits mutations from the
      first. This applies to vocabulary registries, DataLayer factories, BT bridges,
      actor caches, and any other mutable global. Discovered as a demo-layer issue
      (DEMOMA-01-004) but applies equally to all application factories.
    relationships:
    - rel_type: implements
      spec_id: ARCH-04-001
- id: ARCH-17
  title: ASGIEmitter Base URL
  specs:
  - id: ARCH-17-001
    priority: MUST
    kind: implementation
    statement: >-
      The `ASGIEmitter` base URL MUST contain only the scheme and netloc components
      (e.g., `https://example.org`). It MUST NOT include a path prefix, trailing slash,
      or mount-point segment. The emitter strips the mount prefix from request paths before
      constructing outbound URLs; a base URL that includes a prefix causes double-application.
    rationale: >-
      A base URL of `https://example.org/api` combined with a request path `/api/actors/…`
      produces `https://example.org/api/api/actors/…`. Root cause of bugs #557 and #558.
  - id: ARCH-17-002
    priority: MUST
    kind: implementation
    statement: >-
      `ASGIEmitter` MUST use a `contextvars.ContextVar[int]` reentrancy guard, not a
      `threading.Lock` or boolean flag, to detect and prevent re-entrant emission
      (an emitter call triggered by a handler that was itself invoked by an earlier
      emission). Re-entrant emission MUST raise `EmitterReentrancyError`.
    rationale: >-
      A `threading.Lock` guard would deadlock when the re-entrant call happens on the
      same thread (common in async/ASGI contexts). A `ContextVar` is task-local and
      correctly tracks reentrancy per async task without thread-lock semantics.
    relationships:
    - rel_type: refines
      spec_id: ARCH-17-001
- id: ARCH-18
  title: Architecture Ratchet Discipline
  specs:
  - id: ARCH-18-001
    priority: MUST
    kind: dev-process
    statement: >-
      Architecture boundary tests that enforce a `KNOWN_VIOLATIONS` allowlist MUST use
      a bidirectional equality assertion: `assert actual_violations == KNOWN_VIOLATIONS`.
      One-directional subset assertions (`assert actual ⊆ KNOWN`) are prohibited because
      they allow the violation count to grow silently.
    rationale: >-
      A subset assertion says "we have at most these violations" but allows new ones
      to be added without failing the test. Bidirectional equality says "we have exactly
      these violations" — any addition fails immediately, and any removal must be reflected
      in the allowlist.
    relationships:
    - rel_type: implements
      spec_id: ARCH-10-001
  - id: ARCH-18-002
    priority: MUST
    kind: dev-process
    statement: >-
      When a known architectural violation is resolved (the file or import is removed or
      refactored), the corresponding entry MUST be removed from the `KNOWN_VIOLATIONS`
      allowlist in the same commit that resolves the violation. Stale allowlist entries
      that no longer correspond to real violations MUST NOT be retained.
    rationale: >-
      Stale entries mask the true state of the architecture boundary. A "fixed" violation
      that remains in `KNOWN_VIOLATIONS` makes the ratchet appear tighter than it is
      and hides regression when a new violation with the same name is later introduced.
    relationships:
    - rel_type: refines
      spec_id: ARCH-18-001
- id: ARCH-19
  title: Outbound Delivery Pipeline
  specs:
  - id: ARCH-19-001
    priority: MUST
    kind: pattern
    statement: >-
      Outbound delivery MUST be modelled as a three-stage pipeline: (1) **Emission** —
      the use-case or handler writes the activity to the outbox; (2) **Transport delivery**
      — the outbox worker retrieves the activity and delivers it to the recipient's inbox
      endpoint; (3) **Recipient acceptance** — the recipient's adapter processes the
      delivered activity. Each stage has distinct error semantics and MUST NOT be conflated.
    rationale: >-
      Conflating stages (e.g., treating a transport timeout as a recipient rejection) leads
      to incorrect retry logic and protocol-state divergence. The three-stage model is the
      foundation for correct at-least-once delivery. Source: `notes/architecture-adapters.md`.
  - id: ARCH-19-002
    priority: MUST
    kind: pattern
    statement: >-
      Emission (stage 1) MUST be idempotent with respect to the outbox: writing the same
      activity ID twice MUST NOT create a duplicate outbox entry.
    relationships:
    - rel_type: refines
      spec_id: ARCH-19-001
  - id: ARCH-19-003
    priority: MUST
    kind: pattern
    statement: >-
      Transport delivery (stage 2) MUST be retried on transient network failures. The retry
      mechanism MUST be implemented in the outbox worker, not in the use-case or handler.
    relationships:
    - rel_type: refines
      spec_id: ARCH-19-001
  - id: ARCH-19-004
    priority: MUST_NOT
    kind: pattern
    statement: >-
      A transport delivery failure (stage 2 error) MUST NOT be interpreted as recipient
      rejection (stage 3 semantics). Delivery failure means the activity did not reach
      the recipient; it carries no information about whether the recipient would accept
      or reject the activity.
    relationships:
    - rel_type: refines
      spec_id: ARCH-19-001
  - id: ARCH-19-005
    priority: MUST
    kind: pattern
    statement: >-
      The outbox worker MUST record the delivery outcome (success, transient failure, or
      permanent failure) in the per-actor process log (Python `logging`) at the level
      prescribed in `specs/structured-logging.yaml`. Delivery outcomes MUST NOT be
      written to the canonical case ledger; the case ledger is exclusively for
      CaseActor-authored protocol-significant assertions (ADR-0019).
    rationale: >-
      ADR-0019 establishes strict separation: the canonical case ledger contains only
      CaseActor-authored protocol assertions; per-actor transport observability goes to
      the process log. Delivery outcomes (whether a network call succeeded) are
      operational diagnostics, not protocol-significant assertions.
    relationships:
    - rel_type: refines
      spec_id: ARCH-19-001
