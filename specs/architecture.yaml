id: ARCH
title: Architecture
description: 'Defines the architectural constraints for the Vultron codebase. The system follows **Hexagonal Architecture**
  (Ports and Adapters): the core domain is isolated from all external systems. External systems interact with the core through
  defined **ports**, via thin **adapters**. `archived_notes/architecture-review.md` prevention), `notes/domain-model-separation.md`
  (wire/domain/persistence separation), `archived_notes/architecture-review.md` (violation inventory and remediation history),
  `docs/adr/0009-hexagonal-architecture.md` (decision rationale)'
version: 1.0.0
kind: pattern
scope:
- prototype
- production
groups:
- id: ARCH-01
  title: Layer Separation
  specs:
  - id: ARCH-01-001
    priority: MUST_NOT
    statement: The `core/` package (or equivalent domain layer) MUST NOT import from `wire/`, `adapters/`, or any external
      framework
    rationale: Keeps domain logic replaceable without touching the wire or transport layer
    relationships:
    - rel_type: derives_from
      spec_id: CS-05-001
  - id: ARCH-01-002
    priority: MUST
    statement: Core functions MUST accept and return domain types only
  - id: ARCH-01-003
    priority: MUST_NOT
    statement: The `wire/` layer (AS2 parser, semantic extractor) MUST NOT contain handler logic, case management, or journal
      management
    rationale: Wire format concerns are structurally distinct from domain concerns; mixing them prevents future wire format
      substitution

  - id: ARCH-01-004
    priority: MUST
    statement: >-
      All ARCH-01-001 violations in `vultron/core/` MUST be remediated via
      dedicated driven ports. Each file with a coreâ†’wire import MUST be given
      a narrow driven port (following the `SyncActivityPort` or
      `TriggerActivityPort` pattern) or folded under an expanded shared port.
    rationale: >-
      Leaving coreâ†’wire import violations unfixed undermines the hexagonal
      boundary and prevents clean unit testing of core logic with mock adapters.
      See tracking issues for the current set of known violations.
    relationships:
      - rel_type: refines
        spec_id: ARCH-01-001
        note: >-
          ARCH-01-001 is the general constraint; ARCH-01-004 requires that
          all violations be systematically remediated via driven ports.
- id: ARCH-02
  title: SemanticIntent Enum
  kind: domain
  specs:
  - id: ARCH-02-001
    priority: MUST
    statement: The `MessageSemantics` enum (`SemanticIntent`) MUST be defined in the domain layer, not in the wire layer
- id: ARCH-03
  title: Semantic Extractor
  kind: domain
  specs:
  - id: ARCH-03-001
    priority: MUST
    statement: 'AS2 vocabulary MUST be mapped to domain concepts in exactly one location: the semantic extractor'
    rationale: Isolates the single seam where wire format changes are absorbed
- id: ARCH-04
  title: Driven Adapter Injection
  specs:
  - id: ARCH-04-001
    priority: MUST
    statement: Driven adapters (persistence, delivery queue, DNS resolver, HTTP delivery) MUST be injected into core services
      via port interfaces
    rationale: Enables testing core logic with in-memory ports and swapping production backends without touching domain code

  - id: ARCH-04-002
    priority: MUST
    statement: >-
      `SyncActivityPort` MUST be defined as a `typing.Protocol` in
      `vultron/core/ports/sync_activity_port.py` with two fire-and-forget
      methods:
        - `send_reject_log_entry(entry: VultronCaseLedgerEntry, tail_hash: str, actor_id: str, to: str) -> None`
        - `send_announce_log_entry(entry: VultronCaseLedgerEntry, actor_id: str, to: str) -> None`
      The concrete adapter (`SyncActivityAdapter`) MUST be implemented in
      `vultron/adapters/driven/sync_activity_adapter.py` and own the full
      domain â†’ wire â†’ persist â†’ outbox pipeline. Core use cases and BT nodes
      MUST call only the port methods and MUST NOT import wire types
      (`CaseLedgerEntry`, `WireCaseLedgerEntry`) or wire factory functions
      (`announce_log_entry_activity`, `reject_log_entry_activity`).
    rationale: >-
      The incremental fix for ARCH-01-001 violations in `received/sync.py`
      and `triggers/sync.py`. The "baton-pass" pattern: core hands domain
      objects to the port; the adapter handles wire conversion unidirectionally.
    relationships:
      - rel_type: refines
        spec_id: ARCH-04-001
        note: SyncActivityPort is the specific driven port for sync outbound activities
      - rel_type: implements
        spec_id: ARCH-01-001
        note: Eliminates wire imports from core sync use cases

- id: ARCH-05
  title: Connector Plugins
  kind: language
  specs:
  - id: ARCH-05-001
    priority: MUST_NOT
    statement: Connector plugins (tracker integrations) MUST be discovered via Python entry points (`importlib.metadata`);
      the core MUST NOT import them directly
  - id: ARCH-05-002
    priority: MUST
    statement: Connector plugins MUST translate only â€” no case handling logic, authorization, or journal management belongs
      in a connector
- id: ARCH-06
  title: Wire Layer Replaceability
  specs:
  - id: ARCH-06-001
    priority: SHOULD
    statement: The wire layer (`wire/as2/`) SHOULD be replaceable as a unit without touching the core or adapter layers
- id: ARCH-07
  title: Handler Isolation
  specs:
  - id: ARCH-07-001
    priority: MUST_NOT
    statement: Handler functions MUST NOT re-invoke semantic extraction
- id: ARCH-08
  title: Driving Adapter Boundary
  specs:
  - id: ARCH-08-001
    priority: MUST
    statement: Driving adapters (HTTP inbox, CLI, MCP server) MUST invoke the wire pipeline before calling into the core
    rationale: Any driving adapter that needs to ingest AS2 can reuse the wire pipeline; there is no duplication
- id: ARCH-12
  title: Shared-Base Object Hierarchy
  kind: implementation
  rationale: >-
    The from_core()/to_core() translation protocol (the original ARCH-12
    design) was a workaround for independent parallel hierarchies. A
    shared-base approach eliminates the need for that protocol: both core
    and wire branches inherit from the same lenient root, field names align,
    and Pydantic model_validate() handles translation. See ADR-0017 Option D
    and concern #796.
  specs:
  - id: ARCH-12-001
    priority: MUST
    statement: >-
      `as_Base` MUST inherit from `VultronBase`; `as_Object` MUST inherit
      from `VultronObject`. `VultronBase` and `VultronObject` (in
      `vultron/core/models/base.py`) are the shared root for both the core
      and wire object hierarchies.
    rationale: >-
      A shared root ensures field names and semantics align across both
      branches, enabling model_validate() round-trips without per-type
      translation stubs.
    verification: >-
      `issubclass(as_Base, VultronBase)` and
      `issubclass(as_Object, VultronObject)` are both True.
  - id: ARCH-12-002
    priority: MUST
    statement: >-
      The shared base (`VultronBase` / `VultronObject`) MUST define all
      shared fields with the most lenient types (`str | None`,
      `Any | None`, `datetime | None`). Neither branch may introduce a
      field type in a way that is Pydantic-incompatible with the shared
      base.
    rationale: >-
      Lenient shared-base types allow both branches to narrow independently
      without MRO conflicts; Pydantic AfterValidator narrowing is valid in
      subclasses.
  - id: ARCH-12-003
    priority: MUST
    statement: >-
      The core branch MAY narrow inherited fields via Pydantic validators
      (e.g., `NonEmptyString | None`, required `datetime`). Core-branch
      types MUST NOT carry wire-specific concerns: `alias_generator=to_camel`,
      hardcoded AS2 `@context` namespace, or VOCABULARY registration are
      forbidden in core-branch types.
    verification: >-
      `CoreObject` and its subclasses do not reference `to_camel` or assign
      to `VOCABULARY`. Confirmed by the layer-boundary test in
      `test/architecture/test_layer_boundaries.py`.
  - id: ARCH-12-004
    priority: MUST
    statement: >-
      The wire branch MUST NOT carry domain validators. Wire-branch overrides
      exist solely for AS2 serialization shape (field aliases, `@context`,
      lenient `Any | None` types). Wire-branch types MUST register in
      `VOCABULARY`; core-branch types MUST register in `CORE_VOCABULARY`.
  - id: ARCH-12-005
    priority: MUST
    statement: >-
      For types where both branches share field names and compatible types,
      translation from a core object to its wire counterpart MUST use
      `WireType.model_validate(core_obj.model_dump(mode="json"))`. No
      explicit `from_core()` / `to_core()` classmethods are required.
    rationale: >-
      Eliminating the explicit translation protocol removes per-type boilerplate
      and the _field_map escape hatch. The shared-base alignment ensures the
      round-trip is correct by construction.
  - id: ARCH-12-006
    priority: MUST
    statement: >-
      Actor `inbox` and `outbox` fields MUST be typed `str | None` in the
      shared base and core branch, carrying only the URI of the inbox or
      outbox endpoint. AS2 `OrderedCollection` wrapping is a wire-only
      serialization concern and MUST NOT appear in core-branch actor types.
    rationale: >-
      Domain logic only ever needs to route to the inbox URI; the full
      collection shape is an AS2 protocol concern, not a domain concern.
      This resolves the most structurally irreconcilable field-type conflict
      that blocked the original ARCH-12 from_core()/to_core() approach.
  - id: ARCH-12-007
    priority: MUST
    statement: >-
      All core domain objects that represent protocol-significant entities
      (cases, reports, participants, actors, log entries, embargo policies,
      etc.) MUST inherit from `CoreObject` (or `VultronObject` when
      CORE_VOCABULARY registration is not needed). Objects that exist solely
      as local configuration, transient dispatch envelopes, or internal
      processing records that are never shared across the wire MAY remain
      plain `BaseModel` subclasses; such classes MUST include a docstring
      explaining the rationale for not inheriting from the shared-base
      hierarchy.
    rationale: >-
      Consistent use of the shared-base hierarchy ensures that all
      protocol-significant domain objects share aligned field names,
      can participate in model_validate() round-trips (ARCH-12-005), and
      are discoverable via CORE_VOCABULARY. Intentional BaseModel classes
      are the exception, not the default; requiring a documented rationale
      prevents accidental hierarchy bypass as the codebase evolves.
    verification: >-
      Static analysis or a test asserts that all classes in
      `vultron/core/models/` that contain protocol-significant fields
      (`id_`, `type_`, `published`, `attributed_to`) inherit from
      `CoreObject` or `VultronObject`. Intentional `BaseModel` subclasses
      are listed in a registry or identified by a marker mixin/comment
      pattern.
- id: ARCH-09
  title: Domain Model Richness Constraint
  specs:
  - id: ARCH-09-001
    priority: MUST
    statement: Core domain models MUST be as rich as or richer than their wire-layer counterparts
    rationale: A thinner core model forces piecemeal additions as handlers are implemented, causing boundary leakage and implementation
      drift
  - id: ARCH-09-002
    priority: MUST
    statement: >-
      Actor domain models (`CoreActor` and its concrete subclasses `VultronPerson`,
      `VultronOrganization`, `VultronService`, `VultronApplication`, `VultronGroup`)
      MUST be defined in `vultron/core/models/`. The wire layer (`vultron/wire/as2/`)
      MUST provide corresponding wire-branch actor types inheriting from the
      shared base (`VultronObject`) rather than re-exporting core types directly.
    rationale: >-
      Defining actor domain models in core enforces the hexagonal boundary.
      The re-export pattern (where wire re-exported core actors directly) was a
      transitional workaround introduced when field-type conflicts blocked
      diamond inheritance. The shared-base approach (ARCH-12) resolves those
      conflicts; wire actor types should become proper wire-branch types
      once the implementation epic following concern #796 is complete.
    verification: >-
      Confirm that `VultronPerson`, `VultronOrganization`, `VultronService`,
      `VultronApplication`, and `VultronGroup` are defined in
      `vultron/core/models/actor.py`. Confirm that wire actor types in
      `vultron/wire/as2/vocab/objects/vultron_actor.py` inherit from
      `VultronObject` (or a subclass thereof) rather than re-exporting
      the core classes unchanged.
    relationships:
      - rel_type: refines
        spec_id: ARCH-09-001
      - rel_type: depends_on
        spec_id: ARCH-12-001
        note: >-
          ARCH-12 establishes the shared-base hierarchy; wire actor types
          must inherit from that shared base, not re-export core types.
- id: ARCH-10
  title: Fail-Fast Domain Objects
  specs:
  - id: ARCH-10-001
    priority: MUST
    statement: Domain events and domain models MUST validate required fields at construction time and fail immediately if
      required invariants are not satisfied
    rationale: Late validation masks missing data and makes debugging harder; fail-fast ensures errors surface at the point
      of construction
- id: ARCH-11
  title: Port Inbound/Outbound Discrimination
  specs:
  - id: ARCH-11-001
    priority: SHOULD
    statement: Core ports SHOULD be organized into inbound (driving) and outbound (driven) categories
- id: ARCH-14
  title: Wire Vocabulary Object Naming Convention
  rationale: >-
    Wire vocabulary objects in `vultron/wire/as2/vocab/objects/` historically
    used bare domain names (e.g., `VulnerabilityCase`, `CaseParticipant`) that
    shadow identically-named core domain models. This causes persistent
    confusion: agents and developers grab the wrong class, reason about the
    wrong object, or inadvertently introduce wire-layer imports into core code.
    The `as_` prefix â€” already established for base ActivityStreams types
    (`as_Activity`, `as_Actor`, `as_Object`) â€” MUST be extended to all
    Vultron-specific wire vocabulary objects to make the layer boundary
    unambiguous at a glance.
  specs:
  - id: ARCH-14-001
    priority: MUST
    statement: >-
      All Vultron-specific wire vocabulary classes defined in
      `vultron/wire/as2/vocab/objects/` MUST use the `as_` prefix
      (e.g., `as_VulnerabilityCase`, `as_CaseParticipant`, `as_CaseStatus`).
      This extends the existing `as_` naming convention â€” already applied to
      base ActivityStreams types (`as_Activity`, `as_Actor`, `as_Object`) â€”
      to all Vultron-specific wire objects in that package.
    rationale: >-
      Without the `as_` prefix, wire objects shadow identically-named core
      domain models, making it ambiguous which `VulnerabilityCase` a developer
      or agent is working with. The `as_` prefix makes the layer boundary
      unambiguous at a glance and enables automated detection of violations.
    verification: >-
      Architecture test in `test/architecture/` asserts that no class in
      `vultron/wire/as2/vocab/objects/` shares a name with any class in
      `vultron/core/models/`.
  - id: ARCH-14-002
    priority: MUST
    statement: >-
      The wire-layer base class for all Vultron-specific AS2 objects (currently
      `VultronAS2Object`) MUST be renamed `as_VultronObject`. This eliminates
      the redundant "AS2" qualifier (the `as_` prefix already connotes the
      wire layer) and aligns the base class name with ARCH-14-001.
    rationale: >-
      `VultronAS2Object` does not follow the `as_` prefix convention. The
      "AS2" suffix is redundant when the `as_` prefix already signals the
      wire layer. Renaming to `as_VultronObject` makes the base class
      consistent with all subclasses.
    verification: >-
      `vultron/wire/as2/vocab/objects/base.py` exports `as_VultronObject`;
      no class named `VultronAS2Object` exists anywhere in the codebase.
  - id: ARCH-14-003
    priority: MUST
    statement: >-
      `TypeAlias` companion types (wire-layer reference unions, e.g.,
      `VulnerabilityCaseRef`) MUST also use the `as_` prefix
      (e.g., `as_VulnerabilityCaseRef`, `as_CaseParticipantRef`).
    rationale: >-
      Companion aliases that do not follow the `as_` naming convention
      undermine the goal of ARCH-14-001: an import of `VulnerabilityCaseRef`
      is just as ambiguous as importing `VulnerabilityCase` from the wire layer.
    verification: >-
      No `TypeAlias` variable in `vultron/wire/as2/vocab/objects/` uses a
      name that matches a core model name without the `as_` prefix.
- id: ARCH-13
  title: DataLayer Scope Contract
  specs:
  - id: ARCH-13-001
    priority: MUST
    statement: >
      The base `DataLayer` protocol MUST be used only for shared object storage operations
      (read, write, save, list). It MUST NOT be passed to functions that perform
      inbox or outbox queue operations.
    rationale: >
      Inbox and outbox queue operations are actor-scoped; using the shared DataLayer
      (actor_id=None) silently operates on a phantom queue keyed by the empty string
      ("") rather than the actor's real queue, causing reads to appear empty and
      writes to be unreadable by the correct actor.
  - id: ARCH-13-002
    priority: MUST
    statement: >
      Inbox and outbox queue operations (inbox_list, inbox_pop, inbox_append,
      outbox_list, outbox_pop, outbox_append) MUST be performed on an `ActorScopedDataLayer`
      instance â€” a DataLayer whose actor_id is set to a non-empty canonical URI.
    rationale: >
      Queue rows are stored with actor_id as a column key; an unscoped DataLayer
      (actor_id=None) cannot address per-actor queue rows correctly.
  - id: ARCH-13-003
    priority: MUST
    statement: >
      The actor_id used when constructing an `ActorScopedDataLayer` MUST be the
      actor's canonical URI (the value of actor.id_), not a short ID, UUID
      path segment, or any other derived identifier.
    rationale: >
      record_outbox_item writes queue rows keyed by the actor_id string it receives.
      If outbox_list is called on a DataLayer scoped to a different string (e.g., a
      short UUID when the writer used a full URI), the queue appears empty and
      outbound activities are silently dropped (see BUG-2026040901).
  - id: ARCH-13-004
    priority: MUST
    statement: >
      The actor_id argument passed to record_outbox_item MUST match exactly the
      actor_id used to construct the `ActorScopedDataLayer` that will later call
      outbox_list or outbox_pop for that actor.
    rationale: >
      The queue key is a plain string equality check. Any mismatch â€” including
      full-URI vs. short-UUID â€” produces a silent empty read.
  - id: ARCH-13-005
    priority: SHOULD
    statement: >
      The `ActorScopedDataLayer` protocol type SHOULD be defined in
      `vultron/core/ports/datalayer.py` as a refinement of `DataLayer` so that
      type-checkers (mypy, pyright) can enforce scope boundaries at
      function-signature level.
    rationale: >
      An explicit Protocol type converts a convention-only rule into a
      compile-time-enforced boundary, making violations visible without running
      the code.
