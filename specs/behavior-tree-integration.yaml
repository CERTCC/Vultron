id: BT
title: Behavior Tree Integration
description: >-
  Handler functions may orchestrate business logic using behavior trees (BTs) for complex
  workflows. BTs provide hierarchical, composable process modeling with explicit preconditions
  and state transitions. ADR-0008 (py_trees integration) **Node construction patterns**: See
  `notes/bt-design-patterns.md` for idiomatic guidance on PPA structure, implicit sequences,
  safety guards, memory nodes, and granularity — derived from Colledanchise & Ögren (arXiv:1709.00084).
  Formal requirements: `specs/behavior-tree-node-design.md` BTND-06-001 through BTND-06-007.
  logic. Complex workflows (report validation, case creation, embargo management) SHOULD use
  BTs for clarity and maintainability.
version: 1.0.0
kind: pattern
scope:
- prototype
- production
groups:
- id: BT-01
  title: BT Execution Model
  specs:
  - id: BT-01-001
    priority: MUST
    statement: BT execution MUST be event-driven, triggered by handler invocation
  - id: BT-01-002
    priority: MUST
    statement: BTs MUST execute to completion (or max iterations) per invocation
  - id: BT-01-003
    priority: MUST_NOT
    statement: BT execution MUST NOT use continuous tick-based polling loops
  - id: BT-01-004
    priority: MUST
    statement: BTs MUST be single-shot executions within handler context
- id: BT-02
  title: BT Library
  kind: language
  specs:
  - id: BT-02-001
    priority: MUST
    statement: >-
      Prototype handlers MUST implement BT execution using industry- standard BT library
    rationale: Mature libraries provide visualization, debugging, and standard BT semantics
  - id: BT-02-002
    priority: MUST
    statement: Simulation code in `vultron/bt/` MUST remain unchanged
- id: BT-03
  title: State Management
  kind: domain
  specs:
  - id: BT-03-001
    priority: MUST
    statement: BTs MUST use DataLayer as persistent state store
  - id: BT-03-002
    priority: MUST_NOT
    statement: BTs MUST NOT maintain separate blackboard persistence
  - id: BT-03-003
    priority: MAY
    statement: BT blackboard MAY cache DataLayer state during execution
  - id: BT-03-004
    priority: MUST
    statement: State changes MUST be committed to DataLayer on successful execution
- id: BT-04
  title: Handler Integration
  specs:
  - id: BT-04-001
    priority: MUST
    statement: Handler protocol MUST be preserved (decorator, signature, registration)
  - id: BT-04-002
    priority: MAY
    statement: Handlers MAY invoke BTs via bridge layer
  - id: BT-04-003
    priority: MUST
    statement: Handlers MUST remain synchronous (BT execution within handler)
  - id: BT-04-004
    priority: MUST
    statement: BT execution errors MUST propagate to handler error handling
- id: BT-05
  title: BT Bridge Layer
  kind: language
  specs:
  - id: BT-05-001
    priority: SHOULD
    statement: System SHOULD provide BT execution bridge for handler-to-BT invocation
  - id: BT-05-002
    priority: SHOULD
    statement: Bridge SHOULD set up py_trees context with DataLayer access
  - id: BT-05-003
    priority: SHOULD
    statement: Bridge SHOULD populate blackboard with activity and actor state
  - id: BT-05-004
    priority: SHOULD
    statement: Bridge SHOULD execute tree and return execution result
- id: BT-06
  title: Workflow-Specific Trees
  kind: domain
  specs:
  - id: BT-06-001
    priority: MUST
    statement: >-
      All protocol-significant behavior MUST be implemented as BT nodes or subtrees. There
      is no "simple enough to skip" threshold.
    rationale: >-
      The BT is the domain documentation; behaviors outside the tree are invisible to analysis,
      audit, and explainability.
  - id: BT-06-002
    priority: MUST
    statement: >-
      Prototype use-case BTs MUST correspond to identifiable subtrees of the canonical CVD
      protocol BT
  - id: BT-06-003
    priority: SHOULD
    statement: BT nodes SHOULD be deterministic
  - id: BT-06-004
    priority: MUST
    statement: >-
      Individual BT nodes MUST be simple and focused on a single concern (e.g., a single exception
      check or a single boolean condition)
    rationale: >-
      Surfacing logic in the tree makes the process auditable without reading implementation
      code; if it is not in the tree it cannot be reasoned about from the tree alone.
  - id: BT-06-005
    priority: MUST
    statement: >-
      Cascades from a parent subtree to a child subtree in the canonical BT MUST be expressed
      as BT subtrees within the use case's BT — not as procedural calls in `execute()` after
      `bt.run()` returns.
  - id: BT-06-006
    priority: MUST_NOT
    statement: >-
      Protocol-observable actions and state transitions MUST NOT be performed as procedural
      code outside the BT.
- id: BT-07
  title: DataLayer Integration
  kind: domain
  specs:
  - id: BT-07-001
    priority: MUST
    statement: BT nodes MUST interact with DataLayer via Protocol interface
  - id: BT-07-002
    priority: MUST
    statement: BT nodes MUST use type-safe DataLayer operations
  - id: BT-07-003
    priority: MUST
    statement: State transitions MUST be logged at the appropriate level
    relationships:
    - rel_type: depends_on
      spec_id: SL-03-001
    - rel_type: depends_on
      spec_id: SL-04-001
- id: BT-08
  title: Command-Line Execution
  specs:
  - id: BT-08-001
    priority: MAY
    statement: System MAY provide CLI interface for BT execution
  - id: BT-08-002
    priority: SHOULD
    statement: CLI SHOULD support invoking specific trees with test data
  - id: BT-08-003
    priority: SHOULD
    statement: CLI SHOULD log BT execution visualization
- id: BT-09
  title: Actor Isolation
  kind: domain
  specs:
  - id: BT-09-001
    priority: MUST
    statement: Each actor MUST have isolated BT execution context
  - id: BT-09-002
    priority: MUST_NOT
    statement: Actor blackboards MUST NOT share state
  - id: BT-09-003
    priority: MUST
    statement: Actor interaction MUST occur only via protocol messages
- id: BT-10
  title: CaseActor Management
  kind: domain
  specs:
  - id: BT-10-001
    priority: MUST
    statement: Report validation MUST trigger VulnerabilityCase creation
    relationships:
    - rel_type: implements
      spec_id: VP-02-015
    - rel_type: implements
      spec_id: VP-02-020
  - id: BT-10-002
    priority: MUST
    statement: Case creation MUST create corresponding CaseActor (Service)
  - id: BT-10-003
    priority: MUST
    statement: CaseActor MUST manage case-related message processing
  - id: BT-10-004
    priority: MUST
    statement: CaseActor MUST enforce case-level authorization
    scope:
    - production
    relationships:
    - rel_type: refines
      spec_id: CLP-09-001
    - rel_type: refines
      spec_id: CLP-09-003
    - rel_type: refines
      spec_id: CLP-09-004
  - id: BT-10-005
    priority: SHOULD
    statement: >-
      When an actor accepts a case invitation, the system SHOULD automatically advance the
      accepting actor's RM state to ACCEPTED via BT or use-case execution
    relationships:
    - rel_type: implements
      spec_id: CM-11-001
- id: BT-12
  title: VFD/PXA State Machine Usage
  kind: domain
  specs:
  - id: BT-12-001
    priority: MUST
    statement: >-
      When implementing VFD (vendor fix deployed) or PXA (public exploit/attack) state transitions,
      new code MUST use `create_vfd_machine()` and `create_pxa_machine()` (defined in `vultron/core/states/cs.py`)
      as the authoritative source of valid transition sequences. Hand-rolled transition logic
      for these state dimensions MUST NOT be introduced.
    rationale: >-
      Ensures the `transitions` machines remain the normative definition of valid VFD/PXA
      state progressions as new features are added, preventing divergence between the machines
      and the implementation.
- id: BT-11
  title: Concurrency
  kind: domain
  specs:
  - id: BT-11-001
    priority: MUST
    statement: Prototype MUST process messages sequentially (FIFO order)
    rationale: Eliminates race conditions in prototype phase
  - id: BT-11-002
    priority: MUST_NOT
    statement: Sequential processing MUST NOT block HTTP response (BackgroundTasks)
  - id: BT-11-003
    priority: MAY
    statement: Future optimizations MAY introduce resource-level locking
    scope:
    - production
- id: BT-13
  title: BT Failure Diagnosis
  kind: implementation
  specs:
  - id: BT-13-001
    priority: MUST
    statement: >-
      After any BT execution that returns FAILURE, code MUST retrieve the
      failure reason via `BTBridge.get_failure_reason(tree)` (a depth-first
      walk to the first failing leaf node). Code MUST NOT log or inspect
      `result.feedback_message` or `bt.root.feedback_message` for diagnostic
      purposes: a `py_trees` Sequence root's `feedback_message` is always
      `""` when a child fails, regardless of what the failing child set.
    rationale: >-
      `py_trees` sets `feedback_message` on the failing child node, not on
      the parent Sequence. Logging the root message produces an empty string
      that is indistinguishable from "no error" in logs, making failures
      completely silent. `get_failure_reason()` walks to the actual failing
      leaf and returns its message.

  - id: BT-13-002
    priority: MUST
    statement: >-
      The `BTBridge.get_failure_reason()` pattern MUST be applied consistently
      across all BT execution sites, not only for a single BT class or
      protocol flow. Any place in the codebase that logs a BT result MUST use
      this helper.
    relationships:
      - rel_type: refines
        spec_id: BT-13-001
        note: Scope is all BT execution sites, not just sync
- id: BT-14
  title: Peer Broadcast Failure Semantics
  kind: domain
  specs:
  - id: BT-14-001
    priority: MUST
    statement: >-
      Any BT node or subtree that performs protocol-visible peer broadcast
      fan-out MUST return FAILURE when broadcast preparation or outbox
      enqueueing fails. A guaranteed SUCCESS fallback that masks delivery
      failure MUST_NOT be used.
    rationale: >-
      Silent success on failed fan-out causes undetected peer state divergence
      and hides correctness faults from parent tree control flow.
    relationships:
    - rel_type: refines
      spec_id: BT-06-001
      note: Broadcast fan-out is protocol-significant behavior
    - rel_type: refines
      spec_id: BT-04-004
      note: Delivery failures must propagate to handler error paths
  - id: BT-14-002
    priority: SHOULD
    statement: >-
      Peer broadcast fan-out paths SHOULD reuse a shared helper/subtree for
      recipient filtering, activity construction, and outbox enqueueing so the
      failure contract is consistent across workflow domains.
    rationale: >-
      Duplicated fan-out implementations drift over time and re-introduce
      silent-failure behavior in only some pathways.
- id: BT-15
  title: Trigger-Side Use-Case Contract
  kind: domain
  specs:
  - id: BT-15-001
    priority: MUST
    statement: >-
      Trigger-side execute() methods MUST delegate state-machine transitions
      (RM, EM, CS) to BT leaf nodes via BTBridge, following the same pattern
      as received-side use cases.
    rationale: >-
      State machine transitions are protocol-significant behavior (BT-06-001).
      Inline transitions in execute() bypass BT audit, logging, and failure
      introspection via get_failure_reason(). The historical asymmetry between
      trigger-side and received-side use cases arose from the now-retired
      "simple CRUD" guidance.
    relationships:
    - rel_type: refines
      spec_id: BT-06-001
      note: SM transitions are protocol-significant behavior with no skip threshold
    - rel_type: refines
      spec_id: BT-06-006
      note: SM transitions performed outside a BT violate BT-06-006
  - id: BT-15-002
    priority: MUST_NOT
    statement: >-
      Trigger-side execute() methods MUST NOT call domain lifecycle methods
      (e.g., EmbargoLifecycle, EMAdapter, direct ParticipantStatus writes with
      rm_state/em_state) outside a BT execution context.
    rationale: >-
      Direct lifecycle calls in execute() make protocol transitions invisible
      to BT-level audit and observability tooling. The BTBridge pattern
      (instantiate BT → execute_with_setup() → introspect result) is the
      required contract for all use-case execute() methods that perform state
      transitions.
    relationships:
    - rel_type: refines
      spec_id: BT-06-006
- id: BT-17
  title: Role-Gated BT Subtrees and Blackboard Hygiene
  kind: pattern
  specs:
  - id: BT-17-001
    priority: MUST
    statement: >-
      Any BT subtree whose semantics are restricted to the `CVDRole.CASE_MANAGER`
      actor MUST be wrapped in a role-guard composite using
      `CheckIsCaseManagerNode` at tree-composition time, not enforced via
      application-layer guards outside the tree.
    rationale: >-
      Received-side use cases execute BTs with the receiving actor's identity.
      Without a role guard inside the tree, a CASE_MANAGER-only node fires for
      every actor that receives the triggering activity — including participants
      who should be silent recipients. Issue #1030 observed `AutoCloseBranchNode`
      firing on `finder-actor` because no role guard existed inside the tree;
      combined with a module-level idempotency set, the phantom fire claimed the
      slot and prevented the legitimate CASE_MANAGER fire. The canonical role-guard
      composite is a Selector with a guarded Sequence (CheckIsCaseManagerNode +
      action node) and a `Success("Skipped")` fallback.
    verification: >-
      For any BT node whose docstring or name implies CASE_MANAGER-only
      semantics, grep the tree-composition function that instantiates it and
      confirm a `CheckIsCaseManagerNode` wraps the subtree.
    relationships:
    - rel_type: refines
      spec_id: BT-06-001
      note: CASE_MANAGER-only behavior is protocol-significant; it must live
        inside the tree with an explicit guard
  - id: BT-17-002
    priority: MUST
    statement: >-
      A module-level idempotency set (a `set[str]` used to track "already fired"
      state for a BT node) MUST be paired with a role guard (BT-17-001) that
      prevents any actor other than the intended role from writing to the set.
    rationale: >-
      Module-level sets are per-process, not per-container. In a Docker
      deployment, each actor process has its own set; a phantom fire in process A
      does not affect process B. However, within a single process, two phantom
      fires (the wrong actor fires before the correct one) can race: the phantom
      claims the set slot first and silently blocks the legitimate fire. Pairing
      the set with a role guard ensures only the correct actor can claim the slot.
    verification: >-
      Inspect every module-level `set` used for BT idempotency; confirm the node
      that writes to it is also guarded by `CheckIsCaseManagerNode` or equivalent
      role-check at tree-composition time.
    relationships:
    - rel_type: refines
      spec_id: BT-17-001
  - id: BT-17-003
    priority: MUST
    statement: >-
      When a BT node takes a no-op path (e.g., an empty recipient list or a
      guard condition that is not met), it MUST explicitly write `None` to any
      output blackboard key it would normally set before returning FAILURE or
      SUCCESS. It MUST NOT leave a stale value from a previous execution in
      the blackboard.
    rationale: >-
      `py_trees.blackboard.Blackboard.storage` is process-global and is not
      cleared between `execute_with_setup` calls for domain-specific keys.
      `execute_with_setup` only cleans the `datalayer` and
      `trigger_activity_factory` keys on exit. A consumer node that reads an
      output key may receive the value from a prior execution if the producer
      node short-circuits without writing `None`. This causes silent
      state contamination across otherwise independent BT executions (issue #834).
    verification: >-
      Add a regression test that runs two `execute_with_setup` calls back-to-back
      without clearing the blackboard between them; assert the second run does not
      observe output values from the first when the node takes a no-op path.
    relationships:
    - rel_type: refines
      spec_id: BT-06-004
      note: Blackboard cleanup is part of the blackboard management contract
  - id: BT-17-004
    priority: MUST
    statement: >-
      A consumer BT node that reads an output key set by a peer producer node
      MUST treat both `KeyError` (key never written) and a `None` value
      (producer took no-op path per BT-17-003) as equivalent no-op sentinels
      and skip any write-dependent action.
    rationale: >-
      A node that only handles `KeyError` but not `None` will incorrectly proceed
      with a `None` value on the second run after the producer has cleared the key
      to `None`. Both states mean "producer had nothing to produce this cycle."
    verification: >-
      Unit tests for consumer nodes MUST include a case where the blackboard key
      is `None` and assert the consumer skips the dependent action.
    relationships:
    - rel_type: refines
      spec_id: BT-17-003
  - id: BT-17-005
    priority: MUST
    statement: >-
      Tests for a received-side use case that exercises a BT guarded-commit path
      MUST pass `receiving_actor_id` equal to the actor holding
      `CVDRole.CASE_MANAGER` in `actor_participant_index`, not the
      `VultronCaseActor` service entity ID.
    rationale: >-
      `CheckIsCaseManagerNode` compares `actor_id` against the participant
      registered with `CVDRole.CASE_MANAGER` in `actor_participant_index`,
      not against the `VultronCaseActor` service resource ID. Passing the service
      entity ID causes the role check to fail silently: the guarded commit never
      fires, the RM state falls through to the deferred path, and the test may
      pass for the wrong reason. Issue #1050 discovered this after migrating
      `AcceptInviteToEmbargoOnCaseReceivedUseCase` to the single-BT pattern.
    verification: >-
      In any test fixture for a received-side use case with a guarded-commit BT,
      assert that `receiving_actor_id` matches the actor whose ID is stored as
      `CVDRole.CASE_MANAGER` in the test case's `actor_participant_index`.
    relationships:
    - rel_type: refines
      spec_id: BT-17-001
      note: The role guard identity check is what makes this fixture requirement necessary
- id: BT-16
  title: Simulation Fuzzer Node Layout
  kind: pattern
  specs:
  - id: BT-16-001
    priority: MUST
    statement: >-
      Probabilistic simulation (fuzzer) BT nodes MUST reside in
      `vultron/demo/fuzzer/` and MUST NOT be placed in
      `vultron/core/behaviors/` or `vultron/bt/`.
    rationale: >-
      Demo/simulation nodes are external-dependency touchpoints, not
      production protocol behaviors. Keeping them in `vultron/demo/fuzzer/`
      makes the simulation/production boundary explicit and prevents
      simulation artifacts from leaking into core protocol logic.
  - id: BT-16-002
    priority: MUST
    statement: >-
      The probabilistic base types (WeightedBehavior subclasses) for
      simulation nodes MUST be defined in `vultron/demo/fuzzer/base.py`
      using the `py_trees.behaviour.Behaviour` base class.
    rationale: >-
      All py_trees-based BT execution uses the standard py_trees library
      (ADR-0008). Centralizing probabilistic base types in one module
      provides a single implementation point for all weighted-probability
      simulation nodes and avoids duplication across domain modules.
    relationships:
    - rel_type: implements
      spec_id: BT-02-001
      note: py_trees.behaviour.Behaviour is the required base for all prototype BT nodes
  - id: BT-16-003
    priority: MUST
    statement: >-
      Each simulation fuzzer node MUST be named after the external-dependency
      touchpoint it represents (e.g., `EvaluateEmbargoProposal`, `DeployFix`)
      and MUST include a docstring describing its semantic function in the CVD
      process, the category of external input it simulates (system
      integration, human decision, or environmental check), and its
      approximate success probability.
    rationale: >-
      Fuzzer nodes are named integration points where production logic will
      eventually replace the probabilistic stub. Explicit naming and
      documentation preserves the connection between simulation behavior and
      future implementation targets.
  - id: BT-16-004
    priority: MUST
    statement: >-
      Simulation fuzzer modules MUST be organized by CVD domain:
      `vultron/demo/fuzzer/base.py` (probabilistic infrastructure),
      `vultron/demo/fuzzer/embargo.py` (embargo management),
      `vultron/demo/fuzzer/messaging.py` (inbound message handling), and
      `vultron/demo/fuzzer/report_management/` (report lifecycle sub-workflows
      as parallel submodules).
    rationale: >-
      Domain-aligned module organization mirrors the workflow structure of the
      existing `vultron/bt/` simulation and makes cross-references between
      simulation stubs and production use cases straightforward for future
      implementers.
  - id: BT-16-005
    priority: SHOULD
    statement: >-
      Each simulation fuzzer node SHOULD be categorized in its docstring by
      automation potential: High (fully automatable via API or policy rule),
      Medium (partially automatable with human oversight required), Low
      (inherently human-driven; automation limited to notifications or task
      triggers), or N/A (terminal placeholder with no real decision logic).
    rationale: >-
      Automation-potential categorization guides future implementers toward the
      correct integration pattern when replacing stubs with production logic,
      supporting the future real-integration roadmap.
