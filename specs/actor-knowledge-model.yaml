id: AKM
title: Actor Knowledge Model
description: >-
  Defines the Actor Knowledge Model: a Vultron Actor's knowledge of the world is strictly
  bounded by the ActivityStreams 2.0 activities it has received. Actors must not assume
  recipients hold objects that were not explicitly included in prior activities; DataLayer
  access is private and non-shareable, and all inter-Actor communication occurs exclusively
  through the AS2 wire protocol.
version: 1.0.0
scope:
- prototype
- production
tags:
- messaging
- protocol
- federation
groups:
- id: AKM-01
  title: DataLayer Isolation
  specs:
  - id: AKM-01-001
    priority: MUST_NOT
    kind: protocol
    statement: >-
      Each Actor's DataLayer is private to that Actor and MUST NOT be accessible to any other
      Actor.
  - id: AKM-01-002
    priority: MUST_NOT
    kind: protocol
    statement: >-
      Actors that are co-located on the same server or within the same process MUST still
      interact via the wire protocol and MUST NOT communicate via direct DataLayer access
      or in-process calls bypassing the inbox/outbox API.
- id: AKM-02
  title: Knowledge Boundaries
  specs:
  - id: AKM-02-001
    priority: MUST_NOT
    kind: protocol
    statement: >-
      An Actor MUST NOT assume that a recipient has knowledge of any object that has not been
      explicitly included in a prior activity sent to that recipient.
  - id: AKM-02-002
    priority: MUST_NOT
    kind: protocol
    statement: >-
      Actors MUST NOT use object references in place of full inline objects when the recipient
      cannot be expected to have the referenced object in its own DataLayer.
  - id: AKM-02-003
    priority: MUST
    kind: protocol
    statement: >-
      The sole exception to the full-inline-object rule is the `target` field of an `Invite`
      activity in selective-disclosure scenarios.
- id: AKM-03
  title: Outbound Activity Object Integrity
  specs:
  - id: AKM-03-001
    priority: MUST
    kind: protocol
    statement: >-
      Outbound initiating activities (Create, Offer, Invite, Announce, Add, Remove, Update,
      Join, Ignore, Leave) MUST carry the `object` field as a fully inline typed domain object.
  - id: AKM-03-002
    priority: MUST
    kind: protocol
    statement: >-
      The outbox handler MUST enforce object integrity at delivery time as a last-resort runtime
      guard.
- id: AKM-04
  title: 'Future: Known-Object Tracking'
  specs:
  - id: AKM-04-001
    priority: MAY
    kind: protocol
    statement: >-
      A future implementation MAY track which objects have been shared with each participant
      (e.g., via `CaseLedgerEntry` hash-chain records) to avoid redundant full-object transmission.
    scope:
    - production
