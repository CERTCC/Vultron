id: PCR
title: Participant Case Replica
description: >-
  Requirements for how each Vultron Actor maintains and manages its local copy (replica) of
  a `VulnerabilityCase`. Covers replica identity, bootstrap, update authority, case-context
  message routing, reporter case discovery, and unknown-context handling. `specs/case-management.md`
  CM-01-001, CM-02-002, CM-02-010, CM-06-001, CM-06-002; `specs/sync-log-replication.md` SYNC-02-001,
  SYNC-02-003; `specs/actor-knowledge-model.md` AKM-01-001, AKM-01-002, AKM-02-001; `specs/response-format.md`
  **Relationship to sync-log-replication.md**: This spec governs the *participant replica
  lifecycle* (bootstrap, authority, routing). The SYNC spec governs the *log replication transport*
  (hash-chain, per-peer state, `Announce(CaseLogEntry)`). Both must be satisfied simultaneously;
  neither supersedes the other.
version: 1.0.0
kind: general
scope:
- prototype
- production
groups:
- id: PCR-01
  title: Replica Identity (No Stub CaseActor)
  specs:
  - id: PCR-01-001
    priority: MUST
    statement: >-
      Each Vultron Actor MUST maintain its local case replica as an internal concern — there
      is exactly one externally-addressable Actor identity per participant, regardless of
      how many cases that Actor is involved in.
    relationships:
    - rel_type: refines
      spec_id: CM-01-001
    - rel_type: refines
      spec_id: AKM-01-002
  - id: PCR-01-002
    priority: MUST
    statement: There is exactly one CaseActor per case, operated by the case creator/owner.
    relationships:
    - rel_type: refines
      spec_id: CM-02-001
- id: PCR-02
  title: Replica Bootstrap
  specs:
  - id: PCR-02-001
    priority: MUST
    statement: >-
      `Announce(VulnerabilityCase)` is the unified mechanism for delivering a full case snapshot
      to a participant, at every lifecycle stage.
    relationships:
    - rel_type: implements
      spec_id: AKM-03-001
    - rel_type: implements
      spec_id: SYNC-02-001
  - id: PCR-02-002
    priority: MUST
    statement: >-
      When a new participant is added to a case (whether at case creation or later), the CaseActor
      MUST send `Announce(VulnerabilityCase)` to that participant to deliver their initial
      case copy.
    relationships:
    - rel_type: implements
      spec_id: CM-06-001
  - id: PCR-02-003
    priority: MUST
    statement: >-
      When a participant actor receives `Announce(VulnerabilityCase)` and has no existing
      local copy for that case ID, it MUST create a local replica from the received case object.
  - id: PCR-02-004
    priority: MUST
    statement: >-
      When a participant actor receives `Announce(VulnerabilityCase)` and already has a local
      replica for that case ID, it MUST apply the received case state as an authoritative
      update, subject to PCR-03-001.
  - id: PCR-02-005
    priority: MUST_NOT
    statement: >-
      `Create(VulnerabilityCase)` retains its semantic meaning ("a case was created") but
      MUST NOT be used as the mechanism for delivering a full case snapshot to participants.
- id: PCR-03
  title: Replica Update Authority
  specs:
  - id: PCR-03-001
    priority: MUST
    statement: >-
      A participant actor's local case replica MUST only accept case-state updates that originate
      from the CaseActor for that case.
    relationships:
    - rel_type: implements
      spec_id: CM-06-002
  - id: PCR-03-002
    priority: MUST_NOT
    statement: >-
      The case owner actor MUST follow the same replica rules as all other participants: it
      MUST NOT write directly to its own local case copy; it MUST route all case-state changes
      through the CaseActor.
    relationships:
    - rel_type: refines
      spec_id: CM-02-010
  - id: PCR-03-003
    priority: MUST
    statement: >-
      A participant actor MUST authenticate `Announce(VulnerabilityCase)` activities before
      accepting them as authoritative updates to its local replica.
    scope:
    - production
- id: PCR-04
  title: Case Context Routing
  specs:
  - id: PCR-04-001
    priority: MUST
    statement: >-
      The `context` field of an ActivityStreams activity is the canonical mechanism for routing
      a case-scoped message to the correct local case replica handler within a participant
      actor.
    relationships:
    - rel_type: implements
      spec_id: CM-01-002
  - id: PCR-04-002
    priority: MUST
    statement: >-
      All case-scoped protocol activities sent by the CaseActor to participants MUST carry
      `context` set to the case ID.
  - id: PCR-04-003
    priority: MUST_NOT
    statement: >-
      The participant actor MUST be the only externally-addressable entity for receiving case-scoped
      messages on behalf of all cases it participates in; there MUST NOT be a separate per-case
      inbox.
- id: PCR-05
  title: Reporter Case Discovery
  specs:
  - id: PCR-05-001
    priority: MUST
    statement: >-
      Each actor's DataLayer MUST maintain a mapping from `VulnerabilityReport.id_` to `VulnerabilityCase.id_`
      for reports the actor has submitted.
  - id: PCR-05-002
    priority: MUST
    statement: >-
      When a participant actor receives `Announce(VulnerabilityCase)` and the case references
      a report in the actor's local report-to-case map, the actor MUST link the local case
      replica to that report record.
- id: PCR-06
  title: Unknown Case Context Handling
  specs:
  - id: PCR-06-001
    priority: MUST_NOT
    statement: >-
      When a participant actor receives an activity whose `context` field does not match any
      known local case replica, the actor MUST NOT silently discard the activity.
  - id: PCR-06-002
    priority: SHOULD
    statement: >-
      When an activity with an unknown case context arrives, the actor SHOULD queue the activity
      briefly and request a case snapshot from the CaseActor.
  - id: PCR-06-003
    priority: MUST_NOT
    statement: >-
      Activities with unknown case context MUST NOT update any local state until a valid case
      replica has been established.
- id: PCR-07
  title: Testing
  specs:
  - id: PCR-07-001
    priority: MUST
    statement: >-
      Unit tests MUST verify that `Announce(VulnerabilityCase)` from the CaseActor creates
      a local replica when none exists.
  - id: PCR-07-002
    priority: MUST
    statement: >-
      Unit tests MUST verify that `Announce(VulnerabilityCase)` from the CaseActor updates
      the local replica when one exists.
  - id: PCR-07-003
    priority: MUST
    statement: >-
      Unit tests MUST verify that `Announce(VulnerabilityCase)` from an actor that is NOT
      the CaseActor is rejected and logged at WARNING.
  - id: PCR-07-004
    priority: MUST
    statement: >-
      Unit tests MUST verify that the `context` field is used to route incoming activities
      to the correct case handler.
  - id: PCR-07-005
    priority: MUST
    statement: >-
      Unit tests MUST verify that activities with an unknown case context are queued, a resync
      request is emitted, and the activity is dropped after timeout without updating any state.
  - id: PCR-07-006
    priority: MUST
    statement: >-
      Integration tests MUST verify the full bootstrap sequence: case creation → CaseActor
      sends `Announce(VulnerabilityCase)` → participant creates local replica → subsequent
      case-scoped activities are routed correctly.
  - id: PCR-07-007
    priority: MUST
    statement: >-
      Integration tests MUST verify the late-joiner sequence: `Invite` → `Accept` → CaseActor
      sends `Announce(VulnerabilityCase)` to new participant → new participant creates local
      replica.
