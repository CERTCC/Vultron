id: HTTP
title: HTTP Protocol Requirements
description: >-
  Consolidated HTTP protocol requirements for Vultron API v2: status codes, headers, content
  negotiation. **Consolidates**: `inbox-endpoint.md` (IE-03, IE-07), `message-validation.md`
  (MV-06, MV-07), `error-handling.md` (EH-06), `agentic-readiness.md` (AR-03-002)
version: 1.0.0
groups:
- id: HTTP-01
  title: Content-Type Validation
  specs:
  - id: HTTP-01-001
    priority: MUST
    statement: Inbox endpoint MUST accept `application/activity+json` Content-Type
  - id: HTTP-01-002
    priority: MUST
    statement: >-
      Inbox endpoint MUST accept `application/ld+json; profile="https://www.w3.org/ns/activitystreams"`
      Content-Type
  - id: HTTP-01-003
    priority: MUST
    statement: Inbox endpoint MUST reject requests with invalid Content-Type using HTTP 415
- id: HTTP-02
  title: Request Size Limits
  specs:
  - id: HTTP-02-001
    priority: MUST
    statement: Inbox endpoint MUST reject requests exceeding 1 MB with HTTP 413
    scope:
    - production
- id: HTTP-03
  title: HTTP Status Codes
  specs:
  - id: HTTP-03-001
    priority: MUST
    statement: >-
      API MUST use standard HTTP status codes with consistent semantics per table below
- id: HTTP-04
  title: Response Headers
  specs:
  - id: HTTP-04-001
    priority: MUST
    statement: 'All JSON responses MUST include `Content-Type: application/json` header'
- id: HTTP-05
  title: Correlation ID Propagation
  specs:
  - id: HTTP-05-001
    priority: SHOULD
    statement: >-
      API SHOULD accept `X-Correlation-ID` or `X-Request-ID` headers for request tracing
    scope:
    - production
  - id: HTTP-05-002
    priority: SHOULD
    statement: >-
      API SHOULD generate correlation ID from activity `id` field if header not provided
    scope:
    - production
- id: HTTP-06
  title: Request Timeout Handling
  specs:
  - id: HTTP-06-001
    priority: SHOULD
    statement: Inbox endpoints SHOULD respond with HTTP headers within 100ms
    rationale: Ensures responsive UX for ActivityPub federation
  - id: HTTP-06-002
    priority: SHOULD
    statement: >-
      Processing exceeding 100ms SHOULD return HTTP 202 and queue for background processing
  - id: HTTP-06-003
    priority: SHOULD
    statement: Timeout occurrences SHOULD be logged at WARNING level
    scope:
    - production
- id: HTTP-07
  title: Rate Limiting Headers
  specs:
  - id: HTTP-07-001
    priority: MAY
    statement: API MAY include `X-RateLimit-Limit` header (maximum requests per window)
    scope:
    - production
  - id: HTTP-07-002
    priority: MAY
    statement: API MAY include `X-RateLimit-Remaining` header (requests remaining)
    scope:
    - production
  - id: HTTP-07-003
    priority: MAY
    statement: API MAY include `X-RateLimit-Reset` header (UTC timestamp for window reset)
    scope:
    - production
  - id: HTTP-07-004
    priority: MUST
    statement: >-
      Transient error responses (HTTP 429, 503) MUST include a `Retry-After` header indicating
      when the client should retry
    scope:
    - production
- id: HTTP-08
  title: FastAPI Response Serialization
  specs:
  - id: HTTP-08-001
    priority: MUST
    statement: >-
      API responses MUST include all fields of the actual returned object type, not only fields
      declared on the annotated base class
