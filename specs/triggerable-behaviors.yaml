id: TRIG
title: Triggerable Behaviors
description: >-
  Requirements for the trigger API that allows an actor to initiate protocol behaviors based
  on their own internal state, rather than reacting to an inbound ActivityStreams message.
  Triggerable behaviors are the **outgoing counterpart** to the inbound handler pipeline.
  The full CVD protocol cannot be demonstrated without them; a complete implementation requires
  both reactive and triggerable sides. `notes/triggerable-behaviors.md` (design notes), `notes/trigger-classification.md`
  (classification decisions), `docs/topics/behavior_logic/` (reference behavior tree docs)
  `case-management.md` (CM-01), `handler-protocol.md` (HP-00-001), `outbox.md` (OX-02-001),
  `agentic-readiness.md` (AR-04, AR-08), `configuration.md` (CFG-04)
version: 1.0.0
groups:
- id: TRIG-01
  title: Endpoint Format
  specs:
  - id: TRIG-01-001
    priority: MUST
    statement: >-
      The system MUST expose trigger endpoints using the path pattern `POST /actors/{actor_id}/trigger/{behavior-name}`
  - id: TRIG-01-002
    priority: MUST
    statement: Trigger endpoints MUST return HTTP 202 on successful acceptance
    relationships:
    - rel_type: depends_on
      spec_id: HTTP-01-003
  - id: TRIG-01-003
    priority: MUST
    statement: >-
      Trigger endpoints MUST return a structured error response when the actor, case, or report
      referenced in the request body cannot be resolved
    relationships:
    - rel_type: depends_on
      spec_id: EH-05-001
  - id: TRIG-01-004
    priority: MUST_NOT
    statement: >-
      Trigger endpoint processing MUST NOT block the HTTP response; long-running behavior
      execution MUST run as a background task
    relationships:
    - rel_type: depends_on
      spec_id: IE-03-001
  - id: TRIG-01-005
    priority: MUST
    statement: >-
      Trigger endpoints MUST be synchronous from the caller's perspective: the response MUST
      be returned only after the triggered behavior completes (or fails)
    rationale: >-
      Unlike inbound message handlers (which are intentionally asynchronous because they react
      to remote actors), triggerable behaviors are initiated locally and the caller expects
      an immediate result
    relationships:
    - rel_type: refines
      spec_id: TRIG-01-004
      note: >-
        the no-block constraint applies to HTTP I/O machinery, not to the behavior execution
        itself
