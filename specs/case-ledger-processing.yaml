id: CLP
title: Case Ledger Processing
description: >-
  Requirements for participant assertions, CaseActor canonicalization, local case audit ledgerging,
  recorded-history projection, and replication-facing `CaseLedgerEntry` objects. `notes/activitystreams-semantics.md`,
  `notes/case-state-model.md`, `notes/sync-ledger-replication.md` `specs/sync-ledger-replication.md`,
  `specs/outbox.md`, `specs/message-validation.md`, `specs/idempotency.md` recording. Transport-layer
  handling for malformed or unrouteable traffic that cannot be attached to a report or case
  remains out of scope here.
version: 1.0.0
kind: domain
scope:
- prototype
- production
groups:
- id: CLP-01
  title: Assertion Intake
  specs:
  - id: CLP-01-001
    priority: MUST
    statement: >-
      Non-CaseActor activities that participate in a report, proto-case, or case workflow
      MUST be treated as participant assertions awaiting CaseActor processing
  - id: CLP-01-002
    priority: MUST_NOT
    statement: >-
      The protocol MUST NOT require a separate "asserted mode" marker on ordinary participant
      activities for case/proto-case flows
  - id: CLP-01-003
    priority: MUST
    statement: >-
      The CaseActor MUST be the only actor that emits canonical case-history entries used
      by replicas
  - id: CLP-01-004
    priority: MUST_NOT
    statement: >-
      Participant replicas MUST NOT project shared case state directly from peer assertions
- id: CLP-02
  title: Canonical `CaseLedgerEntry`
  specs:
  - id: CLP-02-001
    priority: MUST
    statement: >-
      For each case-resolvable assertion processed at the case layer, the CaseActor MUST append
      a canonical `CaseLedgerEntry`
  - id: CLP-02-002
    priority: MUST
    statement: >-
      `CaseLedgerEntry` MUST be a canonical content object distinct from any transport envelope
      used to replicate it
  - id: CLP-02-003
    priority: MUST
    statement: >-
      `CaseLedgerEntry` MUST include the asserted activity payload, or a normalized immutable
      snapshot of it, sufficient for deterministic replay
  - id: CLP-02-004
    priority: MUST
    statement: >-
      `CaseLedgerEntry` MUST include a disposition field with at least `recorded` and `rejected`
  - id: CLP-02-005
    priority: SHOULD
    statement: >-
      Rejected `CaseLedgerEntry` objects SHOULD include a machine-readable reason code and MAY
      include human-readable detail
  - id: CLP-02-006
    priority: MUST_NOT
    statement: >-
      `CaseLedgerEntry` MUST include a `log_index` field corresponding to SYNC-01-002; this field
      MUST be set by the CaseActor's single authoritative write path and MUST NOT be assigned
      by external parties
  - id: CLP-02-007
    priority: MUST
    statement: >-
      `CaseLedgerEntry` MAY include an optional `term` field reserved for Raft cluster use; in
      single-node deployments this field SHOULD be omitted or set to `null`; in multi-node
      CaseActor cluster deployments this field MUST be populated with the current Raft term
      at time of append
- id: CLP-03
  title: Audit Scope and Continuity
  specs:
  - id: CLP-03-001
    priority: MUST
    statement: >-
      Only assertions that can be resolved to a specific report, proto-case, or case MUST
      be appended to the case audit ledger
  - id: CLP-03-002
    priority: MUST
    statement: >-
      Malformed, unauthenticated, or otherwise unrouteable inbound messages that cannot be
      attached to a report or case MUST be handled outside the case audit ledger
  - id: CLP-03-003
    priority: MUST
    statement: >-
      The assertion-recording model MUST support continuity from report receipt through the
      case lifecycle so that all history — including the proto-case stage (RM.RECEIVED / RM.INVALID)
      — is captured in the case audit ledger
- id: CLP-04
  title: Recorded Projection and Replication
  specs:
  - id: CLP-04-001
    priority: MUST
    statement: >-
      The authoritative recorded history of a case MUST be a filtered projection of `CaseLedgerEntry`
      objects whose disposition is `recorded`
  - id: CLP-04-002
    priority: MUST
    statement: >-
      Case-state reconstruction MUST use only the recorded projection and MUST ignore rejected
      entries
  - id: CLP-04-003
    priority: MUST
    statement: >-
      Replicated hash chains, Merkle proofs, and replay state MUST be computed over recorded
      `CaseLedgerEntry` objects only
  - id: CLP-04-004
    priority: MUST
    statement: >-
      CaseActor fan-out replication MUST deliver the canonical `CaseLedgerEntry` content, wrapped
      in an ActivityStreams transport envelope such as `Announce`
  - id: CLP-04-005
    priority: SHOULD
    statement: >-
      When a participant includes log-position context with an assertion, it SHOULD use the
      sender's last accepted canonical hash or position from the recorded projection
  - id: CLP-04-006
    priority: MUST
    statement: >-
      The canonical recorded log is the authoritative source of truth for case participant
      membership and case state
- id: CLP-05
  title: Rejection Handling
  specs:
  - id: CLP-05-001
    priority: SHOULD
    statement: >-
      CaseActor rejection outcomes SHOULD be sent directly to the asserting participant rather
      than broadcast to all participants
  - id: CLP-05-002
    priority: MUST_NOT
    statement: >-
      Normal case-update fan-out MUST NOT replicate rejected `CaseLedgerEntry` objects to all
      case participants
  - id: CLP-05-003
    priority: SHOULD
    statement: >-
      The system SHOULD provide a convenient way to retrieve the recorded-only history projection
      without requiring consumers to manually filter rejected entries from the broader audit
      log
- id: CLP-06
  title: Pending Assertion Suppression
  specs:
  - id: CLP-06-001
    priority: SHOULD
    statement: >-
      Participant actors SHOULD maintain actor-local pending assertion state for recently
      emitted case-scoped assertions that are awaiting canonical `CaseLedgerEntry` confirmation
  - id: CLP-06-002
    priority: MUST_NOT
    statement: >-
      Pending assertion state MUST NOT be treated as canonical case history and MUST NOT be
      used as the authoritative source for participant membership or case state reconstruction
  - id: CLP-06-003
    priority: MUST
    statement: >-
      Implementations that provide pending assertion suppression MUST support a configurable
      timeout; the default timeout SHOULD be 180 seconds
  - id: CLP-06-004
    priority: MUST
    statement: >-
      When a pending assertion reaches timeout without matching canonical confirmation, it MUST
      transition to a timed-out state and the system MUST emit an error log
  - id: CLP-06-005
    priority: MUST_NOT
    statement: >-
      Pending assertion timeout handling MUST NOT automatically retry assertion emission;
      follow-up emission decisions MUST be made by subsequent behavior evaluation
  - id: CLP-06-006
    priority: MUST
    statement: >-
      A pending assertion entry MUST be cleared when a matching canonical
      `CaseLedgerEntry(recorded|rejected)` is observed
- id: CLP-07
  title: Canonical Entry Criteria and Ledger/Process-Log Separation
  specs:
  - id: CLP-07-001
    priority: MUST
    statement: >-
      A `CaseLedgerEntry` committed to the canonical case ledger MUST correspond to exactly
      one CaseActor-accepted protocol-significant assertion; the entry's `payloadSnapshot`
      MUST be the verbatim AS2 activity that was asserted, or a deterministic canonical
      normalization of it, and MUST NOT be empty for non-rejection entries
  - id: CLP-07-002
    priority: MUST
    statement: >-
      Each logical state change MUST produce at most one canonical `CaseLedgerEntry`; the
      CaseActor MUST NOT commit both an accepted-participant-assertion entry and a
      separately-synthesized CaseActor entry for the same state change
  - id: CLP-07-003
    priority: MUST
    statement: >-
      The `payloadSnapshot.actor` field of a `CaseLedgerEntry(recorded)` MUST preserve the
      original asserting actor's identity; the CaseActor's own identity appears only on
      the `Announce(CaseLedgerEntry)` transport envelope and in CaseLedgerEntry recording
      metadata, never as a substitute for the asserter
  - id: CLP-07-004
    priority: MUST_NOT
    statement: >-
      The canonical case ledger MUST NOT contain runtime diagnostics, demo checkpoints,
      synthetic verification markers, troubleshooting events, or any per-actor
      observability content; such content belongs in the per-actor process log governed
      by `specs/structured-logging.yaml`
  - id: CLP-07-005
    priority: SHOULD
    statement: >-
      The CaseActor commit boundary SHOULD enforce CLP-07-001 through CLP-07-004 with a
      runtime guard that rejects non-canonical entries before they enter the hash chain,
      failing fast rather than silently polluting replicated history
  - id: CLP-07-006
    priority: MUST
    statement: >-
      Nested protocol objects referenced from a `payloadSnapshot` (e.g., `EmbargoEvent`,
      `VulnerabilityReport`, `Note`, `ParticipantStatus`) MUST be embedded inline as full
      objects in the snapshot; ID-string substitutions that require an out-of-band
      DataLayer lookup to resolve MUST NOT be used in canonical snapshots
  - id: CLP-07-007
    priority: MUST
    statement: >-
      `payloadSnapshot` context values MUST use the case URI once a case exists;
      report URIs MUST NOT appear as the context for ParticipantStatus or other
      case-scoped snapshots after the report→case promotion has occurred
  - id: CLP-07-008
    priority: MUST
    statement: >-
      If a canonicalization path resolves an ID-string nested reference for
      `payloadSnapshot` inlining, it MUST verify that the resolved object's context
      matches the parent snapshot context before replacement. On context mismatch, the
      entry MUST be rejected rather than inlining cross-case data.
    rationale: >-
      Blind `dl.read(id)` replacement can leak unrelated local objects into canonical
      snapshots when inbound activities carry attacker-controlled IDs.
- id: CLP-08
  title: Per-Case Genesis Hash Derivation and Origin Binding
  specs:
  - id: CLP-08-001
    priority: MUST
    statement: >-
      Each case ledger MUST use a per-case genesis hash as the predecessor hash for its
      first entry; a globally-shared constant MUST NOT be used as the genesis predecessor
      hash across all cases
    rationale: >-
      A shared global constant provides no cryptographic origin-binding: a ledger with all
      entries stripped is indistinguishable from a legitimately new empty ledger, and the
      well-known constant enables sync DoS amplification by allowing full-replay requests
      without any case-specific knowledge
  - id: CLP-08-002
    priority: MUST
    statement: >-
      The per-case genesis hash MUST be derived as
      `SHA-256(case_id + "|" + created_at.isoformat() + "|" + case_actor_id)`, where
      `case_id` is the canonical case URI, `created_at` is the case creation UTC
      timestamp in ISO 8601 format, and `case_actor_id` is the URI of the CaseActor
      created for this case
    rationale: >-
      Including all three values cryptographically anchors the chain's starting point to
      the specific case's origin identity and timestamp, allowing any party who knows the
      case metadata to independently verify the ledger's genesis
  - id: CLP-08-003
    priority: MUST
    statement: >-
      The case-specific genesis hash MUST be stored on `VulnerabilityCase` as a required
      field computed at case creation time, so that receivers can verify that a ledger
      starts correctly for this case
  - id: CLP-08-004
    priority: MUST
    statement: >-
      `CaseLedger.tail_hash` MUST return the case-specific genesis hash when no recorded
      entries exist; it MUST NOT return a globally-shared constant sentinel
  - id: CLP-08-005
    priority: MUST
    statement: >-
      Sync replay and backfill requests that supply a `from_hash` value MUST use the
      case-specific genesis hash (or the hash of a known recorded entry) as the starting
      point; implementations MUST treat any unrecognized `from_hash` value as a request
      to replay from the beginning of the recorded projection
  - id: CLP-08-006
    priority: MUST
    statement: >-
      The non-spoofability guarantee of the per-case genesis hash is satisfied by a
      domain-bound case URI (e.g., `https://example.org/cases/<uuid>`) whose path
      segment contains a cryptographically random UUID component; implementations MUST
      NOT use sequentially predictable or human-chosen path segments when origin-binding
      integrity is required; see `notes/case-ledger-authority.md` for future
      improvement paths (secret nonce, CaseActor keypairs)
- id: CLP-09
  title: Commit Authorization and Coverage
  specs:
  - id: CLP-09-001
    priority: MUST
    statement: >-
      Every call site that invokes the canonical commit operation MUST reach it only
      through a role-gated composition that verifies, at the time of invocation, that
      the active actor holds `CVDRole.CASE_MANAGER` for the case; this MUST be a
      role-based check, not an identity comparison, even where the CaseActor and the
      role holder happen to coincide today
    rationale: >-
      An audit of `CommitCaseLedgerEntryNode` call sites (Epic #788, issue #1021)
      found that only one of roughly ten call sites guarded the commit, and it did
      so with an ad hoc Python-level identity check outside the BT rather than a
      role check inside it. The other call sites committed unconditionally. Stating
      this as one vague authorization line (see BT-10-004) was not specific enough
      to prevent the gap from accumulating call site by call site.
  - id: CLP-09-002
    priority: MUST_NOT
    statement: >-
      The canonical commit operation MUST NOT be invoked directly (bare, unguarded)
      from any production call site outside the guarded-commit composition itself;
      a registry- or grep-based test MUST assert that no such bare usage exists
    verification: >-
      A dedicated test enumerates known commit call sites (or greps for the
      unguarded commit node's class name) and fails if any usage outside the
      guarded-commit factory's own implementation is found.
  - id: CLP-09-003
    priority: MUST
    statement: >-
      Every protocol-significant use case or BT subtree (per BT-06-001) MUST
      produce exactly one canonical commit; a coverage test MUST enumerate
      protocol-significant entries (e.g., everything reachable from
      `USE_CASE_MAP`) and assert each one reaches a commit, rather than relying
      on manual audit to discover missing commits
    rationale: >-
      `validate_report`, `ack_report`, and `close_case` produced no canonical
      ledger entry at all on `main` for an unknown span of time (issue #998/#1022).
      Dispatch completeness is already enforced structurally for `USE_CASE_MAP`
      (DR-02-002, UCORG-02-002); commit completeness had no equivalent structural
      check and was found only by a manual re-audit.
  - id: CLP-09-004
    priority: MUST
    statement: >-
      When the same use-case class may be invoked with more than one receiving-actor
      identity for a single logical activity (e.g., a relayed copy delivered to a
      second participant), authorization for the commit MUST be evaluated per
      invocation against the active actor's role, and MUST NOT be assumed from the
      use-case class's identity or from the fact that earlier invocations were
      authorized
    rationale: >-
      The `ack_report` flow in the two/three-actor demo invokes the same use case
      once with the case actor as receiver and once with the finder as a relay
      target; only the case-actor invocation may commit. This is the same shape
      of bug that produced the original hash-chain fork in issue #923, and it
      recurs at every new dual-invocation call site unless authorization is
      re-evaluated per invocation rather than per use-case class.
