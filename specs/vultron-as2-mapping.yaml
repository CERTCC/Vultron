      note: EA shorthand → ACCEPT_INVITE_TO_EMBARGO_ON_CASE → this wire form
    - rel_type: satisfies
      spec_id: MSM-02-005
      note: EC shorthand (revision accepted) → same wire form as EA
  - id: VAM-05-007
    priority: MUST
    kind: protocol
    statement: '`REJECT_INVITE_TO_EMBARGO_ON_CASE` MUST be represented as `Reject(Invite(Event)[context=VulnerabilityCase])`'
    relationships:
