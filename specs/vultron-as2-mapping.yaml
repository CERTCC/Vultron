    statement: '`REMOVE_EMBARGO_EVENT_FROM_CASE` MUST be represented as `Remove(Event)`'
    relationships:
    - rel_type: satisfies
      spec_id: MSM-02-007
      note: ET shorthand → REMOVE_EMBARGO_EVENT_FROM_CASE → this wire form
  - id: VAM-05-004
    priority: MUST
    kind: protocol
    statement: '`ANNOUNCE_EMBARGO_EVENT_TO_CASE` MUST be represented as `Announce(Event)[context=VulnerabilityCase]`'
  - id: VAM-05-005
