    relationships:
    - rel_type: satisfies
      spec_id: MSM-02-001
      note: EP shorthand → INVITE_TO_EMBARGO_ON_CASE → this wire form
    - rel_type: satisfies
      spec_id: MSM-02-003
      note: EV shorthand (revision) → same wire form as EP
  - id: VAM-05-006
    priority: MUST
    kind: protocol
    statement: '`ACCEPT_INVITE_TO_EMBARGO_ON_CASE` MUST be represented as `Accept(Invite(Event)[context=VulnerabilityCase])`'
