- id: VAM-09
  title: Unrecognized Activities
  specs:
  - id: VAM-09-001
    priority: MUST
    kind: protocol
    statement: An inbound AS2 activity that does not match any registered pattern MUST be assigned `MessageSemantics.UNKNOWN`
  - id: VAM-09-002
    priority: MUST_NOT
    kind: protocol
    statement: '`MessageSemantics.UNKNOWN` MUST NOT have an entry in `SEMANTICS_ACTIVITY_PATTERNS`; the fallback is implemented
      by `find_matching_semantics()` returning `UNKNOWN` when the pattern loop exhausts all entries without a match'
