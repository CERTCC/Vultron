id: VAM
title: Vultron Semantic–AS2 Mapping
description: Defines the authoritative mapping from each Vultron semantic message type (MessageSemantics enum value) to its
  ActivityStreams 2.0 wire representation. This is the single source of truth for how Vultron domain semantics are encoded
  as AS2 activity structures, isolating transport and wire-encoding concerns from the core domain logic and case-state machines.
version: 1.0.0
scope:
- prototype
- production
tags:
- messaging
- wire-format
groups:
- id: VAM-01
  title: General Mapping Conventions
  specs:
  - id: VAM-01-001
    priority: MUST
    kind: protocol
    statement: Every `MessageSemantics` enum value except `UNKNOWN` MUST have exactly one entry in `SEMANTICS_ACTIVITY_PATTERNS`
      that defines its AS2 wire representation
  - id: VAM-01-002
    priority: MUST_NOT
    kind: project
    statement: The AS2 activity patterns defined in this document MUST be implemented in `vultron/wire/as2/extractor.py` as
      `ActivityPattern` objects and MUST NOT be duplicated in any other module
  - id: VAM-01-003
    priority: MUST
    kind: protocol
    statement: Pattern entries in `SEMANTICS_ACTIVITY_PATTERNS` MUST be ordered from most-specific to least-specific so that
      `find_matching_semantics()` returns the correct semantic for overlapping patterns
  - id: VAM-01-004
    priority: MUST_NOT
    kind: protocol
    statement: An AS2 activity MUST be rehydrated (URI string references expanded to full objects via the DataLayer) before
      pattern matching; pattern matching MUST NOT rely on unhydrated string fields for type discrimination
  - id: VAM-01-005
    priority: MUST
    kind: protocol
    statement: When a pattern specifies a nested activity as the `object` field, the outer activity's `object` MUST be a fully
      rehydrated AS2 activity object matching the inner `ActivityPattern`
  - id: VAM-01-006
    priority: MUST
    kind: protocol
    statement: 'Pattern matching MUST be conservative when a non-`object_` field is a non-rehydratable URI string: such a
      field MUST be treated as matching any expected type rather than failing the match'
    rationale: Peripheral reference fields (`actor`, `target`, `context`, etc.) do not drive semantic dispatch; conservatively
      matching them avoids false negatives when the DataLayer cannot expand every reference
  - id: VAM-01-009
    priority: MUST
    kind: protocol
    statement: If the `object_` field of an activity remains a bare string URI after rehydration (i.e., the DataLayer does
      not have a record for that URI), `find_matching_semantics()` MUST return `MessageSemantics.UNKNOWN`
    rationale: Semantic dispatch depends on the object type. A bare string in `object_` makes the object type unknowable;
      proceeding as if the pattern matches would route the activity to the wrong handler
  - id: VAM-01-007
    priority: MUST
    kind: protocol
    statement: '`MessageSemantics.UNKNOWN` MUST be returned when no registered pattern matches the incoming activity'
  - id: VAM-01-008
    priority: MUST
    kind: protocol
    statement: Inbound activities represent state-change notifications, not commands; the AS2 activity type used for each
      semantic MUST reflect the completed state transition, not a requested action
- id: VAM-02
  title: Report Management Messages
  specs:
  - id: VAM-02-001
    priority: MUST
    kind: protocol
    statement: '`CREATE_REPORT` MUST be represented as `Create(VulnerabilityReport)`'
  - id: VAM-02-002
    priority: MUST
    kind: protocol
    statement: '`SUBMIT_REPORT` MUST be represented as `Offer(VulnerabilityReport)`'
    relationships:
    - rel_type: satisfies
      spec_id: MSM-01-001
      note: RS shorthand → SUBMIT_REPORT → this wire form
  - id: VAM-02-003
    priority: MUST
    kind: protocol
    statement: '`ACK_REPORT` MUST be represented as `Read(Offer(VulnerabilityReport))`'
    relationships:
    - rel_type: satisfies
      spec_id: MSM-01-008
      note: RK shorthand → ACK_REPORT → this wire form
  - id: VAM-02-004
    priority: MUST
    kind: protocol
    statement: '`VALIDATE_REPORT` MUST be represented as `Accept(Offer(VulnerabilityReport))`'
    relationships:
    - rel_type: satisfies
      spec_id: MSM-01-003
      note: RV shorthand → VALIDATE_REPORT → this wire form
  - id: VAM-02-005
    priority: MUST
    kind: protocol
    statement: '`INVALIDATE_REPORT` MUST be represented as `TentativeReject(Offer(VulnerabilityReport))`'
    relationships:
    - rel_type: satisfies
      spec_id: MSM-01-002
      note: RI shorthand → INVALIDATE_REPORT → this wire form
  - id: VAM-02-006
    priority: MUST
    kind: protocol
    statement: '`CLOSE_REPORT` MUST be represented as `Reject(Offer(VulnerabilityReport))`'
    relationships:
    - rel_type: satisfies
      spec_id: MSM-01-006
      note: RC shorthand → CLOSE_REPORT → this wire form
