id: HM
title: History File Management
description: >-
  Defines the structure, location, entry format, and tooling for managing project history
  files using per-entry write-once files organized by month and type, managed by the
  `append-history` CLI tool.
version: 1.3.0
scope:
  - prototype
  - production
tags:
- tooling
- documentation
groups:
  - id: HM-01
    title: History File Location and Structure
    kind: dev-process
    specs:
      - id: HM-01-001
        priority: MUST
        kind: dev-process
        statement: >-
          All project history files MUST reside under `plan/history/`.
      - id: HM-01-006
        priority: MUST_NOT
        kind: dev-process
        statement: >-
          The top-level `plan/` directory MUST NOT contain any `*HISTORY.md` files.
      - id: HM-01-002
        priority: MUST
        kind: dev-process
        statement: >-
          Each history entry MUST be stored as an individual write-once file
          at the path `plan/history/YYMM/<type>/<entry-id>.md`, where `YYMM`
          is the two-digit year and two-digit month when the entry was created,
          `<type>` is the entry type (see HM-02-002), and `<entry-id>` is the
          originating task or idea identifier (e.g., `IDEA-26042702`,
          `TASK-BTND5`).
      - id: HM-01-003
        priority: MUST
        kind: dev-process
        statement: >-
          After each `append-history` invocation, the tool MUST regenerate a
          local `plan/history/YYMM/README.md` index from entry frontmatter
          (see HM-03-006). This file is a **gitignored local cache** — it MUST
          NOT be committed to the repository. To view the history index, use
          `uv run show-history [--month YYMM | --all]`.
      - id: HM-01-005
        priority: MUST_NOT
        kind: dev-process
        statement: >-
          Once written, a history entry file MUST NOT be modified. History
          entries are immutable records. The `plan/history/YYMM/README.md`
          index may be regenerated locally but is gitignored.
        notes: >-
          One-time exception: the IDEA-26043001/2/3 migration (2026-05) rewrote
          all existing entries to replace the legacy `date:` field with a
          tz-aware `timestamp:` field. That migration is the only authorised
          exception to this rule; future changes to entry files are prohibited.

  - id: HM-02
    title: Entry File Format
    kind: domain
    specs:
      - id: HM-02-001
        priority: MUST
        kind: domain
        statement: >-
          Every history entry file MUST begin with a YAML frontmatter block
          containing at least the following fields: `title` (human-readable
          summary), `type` (one of the valid HistoryEntryType values),
          `timestamp` (tz-aware ISO 8601 datetime string in UTC, e.g.,
          `"2026-05-01T15:30:00+00:00"`), and `source` (the originating
          identifier such as an IDEA-ID or TASK-ID). The legacy `date` field
          (ISO 8601 date string) is accepted for reading pre-migration entries
          but MUST NOT be written by the tool for new entries.
      - id: HM-02-002
        priority: MUST
        kind: domain
        statement: >-
          Valid `type` values MUST be defined as a `StrEnum` named
          `HistoryEntryType` in `vultron/metadata/history/types.py`. Current
          values are `idea`, `implementation`, `learning`, and `priority`.
      - id: HM-02-005
        priority: MUST
        kind: domain
        statement: >-
          Adding a new history entry type MUST only require adding a member to
          the `HistoryEntryType` enum; no other code changes are required for
          the tool to accept the new type.
        relationships:
        - rel_type: refines
          spec_id: HM-02-002
      - id: HM-02-003
        priority: MUST
        kind: domain
        statement: >-
          The Markdown body following the frontmatter MUST contain the full
          human-readable text of the history entry (e.g., the archived idea
          text, the completed task summary, or the priority change record).
      - id: HM-02-004
        priority: MUST
        kind: domain
        statement: >-
          The `plan/history/YYMM/README.md` index MUST be auto-generated by
          the `append-history` tool (see HM-03-006) and MUST NOT be manually
          edited. Its content is derived exclusively from the frontmatter of
          entry files in the same monthly directory. The file is gitignored
          and serves only as a local convenience cache.

  - id: HM-03
    title: append-history CLI Tool
    kind: implementation
    specs:
      - id: HM-03-001
        priority: MUST
        kind: implementation
        statement: >-
          The tool MUST be invokable as `uv run append-history <type>` where
          `<type>` is one of the valid `HistoryEntryType` values (see HM-02-002).
      - id: HM-03-009
        priority: MUST
        kind: implementation
        statement: >-
          Passing an unrecognised `<type>` to `append-history` MUST produce a
          clear error message and exit non-zero.
        relationships:
        - rel_type: refines
          spec_id: HM-03-001
      - id: HM-03-002
        priority: MUST
        kind: implementation
        statement: >-
          When no `--file` argument is given, the tool MUST read entry content
          from standard input (stdin). This enables pipeline use:
          `echo "..." | uv run append-history idea`.
      - id: HM-03-003
        priority: MUST
        kind: implementation
        statement: >-
          The tool MUST accept a `--file <path>` argument as an alternative
          to stdin. When `--file` is given, content is read from the specified
          file rather than stdin.
      - id: HM-03-004
        priority: MUST
        kind: implementation
        statement: >-
          The tool MUST determine the target month directory using the current
          system clock (`datetime.date.today()`) during normal operation. A
          backfill-only date override MAY exist for migration tooling so legacy
          entries can be written into historical `YYMM` directories, but normal
          skill and agent guidance MUST continue to use the default current-date
          flow and MUST NOT require agents to choose a target month manually.
      - id: HM-03-005
        priority: MUST
        kind: implementation
        statement: >-
          The tool MUST create `plan/history/YYMM/` and `plan/history/YYMM/<type>/`
          if they do not already exist before writing the entry file.
      - id: HM-03-006
        priority: MUST
        kind: implementation
        statement: >-
          After writing a new entry file, the tool MUST regenerate
          `plan/history/YYMM/README.md` by scanning the known-type
          subdirectories (`idea/`, `implementation/`, `learning/`, `priority/`),
          reading each entry file's frontmatter, and writing a summary table
          sorted by timestamp descending.
        notes: >-
          The scan is restricted to known HistoryEntryType subdirectories to
          avoid parsing non-standard frontmatter in other subdirs (e.g.
          report/). The gitignore constraint is specified in HM-01-003.
      - id: HM-03-007
        priority: MUST
        kind: implementation
        statement: >-
          The `append-history` tool's Python module MUST reside under
          `vultron/metadata/history/` as a sibling of `vultron/metadata/specs/`.
      - id: HM-03-010
        priority: MUST
        kind: implementation
        statement: >-
          The `append-history` entry point function MUST be
          `vultron.metadata.history.cli:main`.
        relationships:
        - rel_type: refines
          spec_id: HM-03-007
      - id: HM-03-008
        priority: MUST
        kind: implementation
        statement: >-
          The tool MUST be registered in `pyproject.toml` under
          `[project.scripts]` as `append-history =
          "vultron.metadata.history.cli:main"`.

  - id: HM-04
    title: Agent Context Boundaries
    kind: dev-process
    specs:
      - id: HM-04-001
        priority: MUST_NOT
        kind: dev-process
        statement: >-
          `plan/history/` MUST NOT be included in the default "read plan
          context" step that agents perform at the start of every workflow.
          Agents MUST read only `plan/*.md` (excluding `plan/history/`) during
          their standard orientation phase.
      - id: HM-04-002
        priority: SHOULD
        kind: dev-process
        statement: >-
          Agents SHOULD read `plan/history/` only when specifically
          investigating historical changes, auditing completed work, or
          extracting lessons from prior implementation phases.
      - id: HM-04-003
        priority: MUST
        kind: dev-process
        statement: >-
          The `study-project-docs` skill documentation MUST explicitly state
          that Step 2 (read plan context) covers `plan/*.md` but NOT
          `plan/history/`. Agents following this skill MUST NOT recursively
          read `plan/history/` during orientation.

  - id: HM-05
    title: Skill and AGENTS.md Integration
    kind: dev-process
    specs:
      - id: HM-05-001
        priority: MUST
        kind: dev-process
        statement: >-
          The `build` skill MUST use `uv run append-history implementation`
          to write completion summaries.
      - id: HM-05-002
        priority: MUST
        kind: dev-process
        statement: >-
          The `ingest-idea` skill MUST use `uv run append-history idea` to
          archive processed ideas.
      - id: HM-05-003
        priority: MUST
        kind: dev-process
        statement: >-
          The `learn` skill MUST NOT read `plan/*HISTORY.md` files directly.
          When historical context is needed, the `learn` skill MUST invoke
          `study-project-docs` and let that skill mediate which plan files are
          appropriate to load.
      - id: HM-05-004
        priority: MUST
        kind: dev-process
        statement: >-
          `AGENTS.md` MUST be updated to reflect the new `plan/history/`
          structure: the "Key Files Map" and any quick-reference sections that
          list `plan/*HISTORY.md` paths MUST be updated to reference
          `plan/history/` and the `append-history` tool.

  - id: HM-06
    title: Timestamp Field and Future-Date Rejection
    kind: domain
    specs:
      - id: HM-06-001
        priority: MUST
        kind: domain
        statement: >-
          Every new history entry MUST include a `timestamp` field containing a
          tz-aware ISO 8601 datetime string in UTC (e.g.,
          `"2026-05-01T15:30:00+00:00"`).
      - id: HM-06-007
        priority: MUST
        kind: implementation
        statement: >-
          The `append-history` tool MUST populate the `timestamp` field
          automatically from the current system clock when creating new entries.
        relationships:
        - rel_type: implements
          spec_id: HM-06-001
      - id: HM-06-002
        priority: MUST
        kind: domain
        statement: >-
          `HistoryEntryFrontmatter` MUST require a `timestamp` field
          (timezone-aware ISO 8601 datetime in UTC). Validation MUST fail
          with a clear error if `timestamp` is absent or malformed.
      - id: HM-06-004
        priority: MUST
        kind: domain
        statement: >-
          `HistoryEntryFrontmatter` MUST reject any `timestamp` value that is
          more than 60 seconds in the future (relative to the current UTC
          system clock). This tolerance accounts for clock drift between the
          time the timestamp is computed and when the Pydantic model is
          validated.
      - id: HM-06-005
        priority: MUST
        kind: domain
        statement: >-
          All `timestamp` values MUST be timezone-aware.
      - id: HM-06-008
        priority: MUST
        kind: domain
        statement: >-
          Naive datetime values (those without a UTC offset) MUST be rejected
          with a clear error message.
        relationships:
        - rel_type: refines
          spec_id: HM-06-005
      - id: HM-06-009
        priority: MUST
        kind: domain
        statement: >-
          All stored and compared timestamps MUST be normalised to UTC.
        relationships:
        - rel_type: refines
          spec_id: HM-06-005
      - id: HM-06-006
        priority: MUST
        kind: domain
        statement: >-
          The `plan/history/YYMM/README.md` index MUST display both a
          `Date` column (YYYY-MM-DD extracted from `timestamp`) and a
          `Time (UTC)` column (HH:MM extracted from `timestamp`). Entries
          MUST be sorted by `timestamp` in descending order.

  - id: HM-07
    title: CLI Interface for Frontmatter Construction
    kind: implementation
    specs:
      - id: HM-07-001
        priority: MUST
        kind: implementation
        statement: >-
          The `append-history <type>` command MUST accept `--title` and
          `--source` as required named arguments.
      - id: HM-07-005
        priority: MUST
        kind: implementation
        statement: >-
          The tool MUST construct the YAML frontmatter block internally from
          the `--title`, `--source`, and auto-generated `timestamp` arguments;
          callers MUST NOT supply frontmatter content.
        relationships:
        - rel_type: refines
          spec_id: HM-07-001
      - id: HM-07-002
        priority: MUST_NOT
        kind: implementation
        statement: >-
          Callers of `append-history` MUST NOT include a YAML frontmatter block
          in the content they supply via stdin or `--file`.
        relationships:
        - rel_type: refines
          spec_id: HM-07-005
      - id: HM-07-003
        priority: MUST
        kind: implementation
        statement: >-
          The tool MUST accept a hidden `--timestamp` argument for backfill
          use only (e.g., migrating pre-existing entries).
      - id: HM-07-006
        priority: MUST
        kind: implementation
        statement: >-
          The `--timestamp` override argument MUST accept an ISO 8601 datetime
          string with a UTC offset.
        relationships:
        - rel_type: refines
          spec_id: HM-07-003
      - id: HM-07-007
        priority: MUST
        kind: implementation
        statement: >-
          The standard future-date validation (HM-06-004) MUST apply to values
          supplied via the `--timestamp` override argument.
        relationships:
        - rel_type: refines
          spec_id: HM-07-003
        - rel_type: implements
          spec_id: HM-06-004
      - id: HM-07-004
        priority: MUST
        kind: implementation
        statement: >-
          Skill documentation (`ingest-idea`, `build`, `learn`) and
          `notes/history-management.md` MUST use the `--title`/`--source`
          interface for `append-history`. The frontmatter-in-stdin pattern
          MUST NOT be used.
