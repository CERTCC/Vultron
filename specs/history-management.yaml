id: HM
title: History File Management
description: >-
  Defines the structure, location, entry format, and tooling for managing
  project history files. Replaces the monolithic append-only `plan/*HISTORY.md`
  pattern with per-entry write-once files organized by month and type under
  `plan/history/`, managed by the `append-history` CLI tool.
version: 1.0.0
kind: pattern
scope:
  - prototype
  - production
groups:
  - id: HM-01
    title: History File Location and Structure
    kind: general
    specs:
      - id: HM-01-001
        priority: MUST
        statement: >-
          All project history files MUST reside under `plan/history/`. The
          top-level `plan/` directory MUST NOT contain any new `*HISTORY.md`
          files after this spec is adopted.
      - id: HM-01-002
        priority: MUST
        statement: >-
          Each history entry MUST be stored as an individual write-once file
          at the path `plan/history/YYMM/<type>/<entry-id>.md`, where `YYMM`
          is the two-digit year and two-digit month when the entry was created,
          `<type>` is the entry type (see HM-02-002), and `<entry-id>` is the
          originating task or idea identifier (e.g., `IDEA-26042702`,
          `TASK-BTND5`).
      - id: HM-01-003
        priority: MUST
        statement: >-
          Each monthly directory (`plan/history/YYMM/`) MUST contain a
          `README.md` index file that lists every entry in that month's
          directory, derived from each entry file's YAML frontmatter. The
          `append-history` tool MUST regenerate this README after every append
          (see HM-03-006).
      - id: HM-01-004
        priority: MUST
        statement: >-
          The legacy monolithic history files (`plan/IMPLEMENTATION_HISTORY.md`,
          `plan/IDEA-HISTORY.md`, `plan/PRIORITY_HISTORY.md`) MUST be moved
          to `plan/history/` at their top level as static archives. A static
          `plan/history/README.md` MUST be created explaining that these files
          predate the structured format and were superseded on the migration
          date.
      - id: HM-01-005
        priority: MUST_NOT
        statement: >-
          Once written, a history entry file MUST NOT be modified. History
          entries are immutable records. Only the `plan/history/YYMM/README.md`
          index may be regenerated.

  - id: HM-02
    title: Entry File Format
    kind: domain
    specs:
      - id: HM-02-001
        priority: MUST
        statement: >-
          Every history entry file MUST begin with a YAML frontmatter block
          containing at least the following fields: `title` (human-readable
          summary), `type` (one of the valid HistoryEntryType values),
          `date` (ISO 8601 date string, e.g., `2026-04-28`), and `source`
          (the originating identifier such as an IDEA-ID or TASK-ID).
      - id: HM-02-002
        priority: MUST
        statement: >-
          Valid `type` values MUST be defined as a `StrEnum` named
          `HistoryEntryType` in `vultron/metadata/history/types.py`. Initial
          values are `idea`, `implementation`, and `priority`. Adding a new
          type MUST only require adding a member to this enum; no other code
          changes are required for the tool to accept the new type.
      - id: HM-02-003
        priority: MUST
        statement: >-
          The Markdown body following the frontmatter MUST contain the full
          human-readable text of the history entry (e.g., the archived idea
          text, the completed task summary, or the priority change record).
      - id: HM-02-004
        priority: MUST
        statement: >-
          The `plan/history/YYMM/README.md` index MUST be auto-generated by
          the `append-history` tool (see HM-03-006) and MUST NOT be manually
          edited. Its content is derived exclusively from the frontmatter of
          entry files in the same monthly directory.

  - id: HM-03
    title: append-history CLI Tool
    kind: implementation
    specs:
      - id: HM-03-001
        priority: MUST
        statement: >-
          The tool MUST be invokable as `uv run append-history <type>` where
          `<type>` is one of the valid `HistoryEntryType` values (see
          HM-02-002). Passing an unrecognised type MUST produce a clear error
          message and exit non-zero.
      - id: HM-03-002
        priority: MUST
        statement: >-
          When no `--file` argument is given, the tool MUST read entry content
          from standard input (stdin). This enables pipeline use:
          `echo "..." | uv run append-history idea`.
      - id: HM-03-003
        priority: MUST
        statement: >-
          The tool MUST accept a `--file <path>` argument as an alternative
          to stdin. When `--file` is given, content is read from the specified
          file rather than stdin.
      - id: HM-03-004
        priority: MUST
        statement: >-
          The tool MUST determine the target month directory using the current
          system clock (`datetime.date.today()`). No date-override parameter
          is provided; this eliminates agent decision-making about which file
          to target.
      - id: HM-03-005
        priority: MUST
        statement: >-
          The tool MUST create `plan/history/YYMM/<type>/` if it does not
          already exist before writing the entry file. The `plan/history/YYMM/`
          directory MUST also be created if it does not exist.
      - id: HM-03-006
        priority: MUST
        statement: >-
          After writing a new entry file, the tool MUST regenerate
          `plan/history/YYMM/README.md` by scanning all `*.md` files (excluding
          `README.md` itself) in the monthly directory tree, reading each
          file's frontmatter, and writing a summary table sorted by date and
          type.
      - id: HM-03-007
        priority: MUST
        statement: >-
          The tool's Python module MUST reside under `vultron/metadata/history/`
          as a sibling of `vultron/metadata/specs/`. The entry point function
          MUST be `vultron.metadata.history.cli:main`.
      - id: HM-03-008
        priority: MUST
        statement: >-
          The tool MUST be registered in `pyproject.toml` under
          `[project.scripts]` as `append-history =
          "vultron.metadata.history.cli:main"`.

  - id: HM-04
    title: Agent Context Boundaries
    kind: pattern
    specs:
      - id: HM-04-001
        priority: MUST_NOT
        statement: >-
          `plan/history/` MUST NOT be included in the default "read plan
          context" step that agents perform at the start of every workflow.
          Agents MUST read only `plan/*.md` (excluding `plan/history/`) during
          their standard orientation phase.
      - id: HM-04-002
        priority: SHOULD
        statement: >-
          Agents SHOULD read `plan/history/` only when specifically
          investigating historical changes, auditing completed work, or
          extracting lessons from prior implementation phases.
      - id: HM-04-003
        priority: MUST
        statement: >-
          The `study-project-docs` skill documentation MUST explicitly state
          that Step 2 (read plan context) covers `plan/*.md` but NOT
          `plan/history/`. Agents following this skill MUST NOT recursively
          read `plan/history/` during orientation.

  - id: HM-05
    title: Skill and AGENTS.md Integration
    kind: pattern
    specs:
      - id: HM-05-001
        priority: MUST
        statement: >-
          The `build` skill MUST use `uv run append-history implementation`
          to write completion summaries instead of directly appending to
          `plan/IMPLEMENTATION_HISTORY.md`. References to direct file paths
          for history files MUST be replaced with `append-history` invocations.
      - id: HM-05-002
        priority: MUST
        statement: >-
          The `ingest-idea` skill MUST use `uv run append-history idea` to
          archive processed ideas instead of directly appending to
          `plan/IDEA-HISTORY.md`. References to direct file paths MUST be
          replaced with `append-history` invocations.
      - id: HM-05-003
        priority: MUST
        statement: >-
          The `learn` skill MUST NOT read `plan/*HISTORY.md` files directly.
          When historical context is needed, the `learn` skill MUST invoke
          `study-project-docs` and let that skill mediate which plan files are
          appropriate to load.
      - id: HM-05-004
        priority: MUST
        statement: >-
          `AGENTS.md` MUST be updated to reflect the new `plan/history/`
          structure: the "Key Files Map" and any quick-reference sections that
          list `plan/*HISTORY.md` paths MUST be updated to reference
          `plan/history/` and the `append-history` tool.
