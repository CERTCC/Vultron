id: CSB
title: CVD Case State Behavioral Requirements
description: >-
  Event-Condition-Action behavioral requirements for CVD Case State (CS)
  transitions. Each group is triggered by either a received CS message or a
  local CS state transition. Items are BehavioralSpec entries with typed
  preconditions and ordered steps where sequencing is normatively required.
  **Sources**: docs/reference/formal_protocol/transitions.md (CS tables),
  specs/vultron-protocol-spec.yaml (VP-09, VP-12, VP-14),
  docs/topics/behavior_logic/msg_cs_bt.md, monitor_threats_bt.md,
  em_terminate_bt.md.
  See also: notes/behavioral-conformance-specs.md for design rationale.
  Note: CSB and EMB (em-behavior.yaml) are developed together because CS
  cascade chains (e.g. enter-cs-p -> embargo teardown) reference EM behavior
  directly — separating them would create dangling satisfies relationships.
version: 0.1.0
kind: domain
tags:
- behavioral
scope:
- prototype
- production
groups:
- id: CSB-01
  title: Receive CV (Vendor Aware)
  description: >-
    Wire-type mapping — see MSM-03-001 (CV → ADD_CASE_STATUS_TO_CASE →
    Add(CaseStatus)[target=VulnerabilityCase]; CaseStatus payload encodes vendor_aware).
  trigger:
    type: message_received
    value: CV
  specs:
  - id: CSB-01-001
    priority: MUST
    statement: >-
      A Participant in a non-Closed RM state (q^rm ∉ C) receiving CV MUST
      update their model of the sending Participant's CS state to Vendor Aware
      (q^cs ∈ Vfd···) and emit CK to acknowledge receipt.
    rationale: >-
      CV announces a Vendor-specific CS transition. The receiver does not change
      their own CS state; they update their awareness model for the sender. The
      CK acknowledges receipt per VP-12 messaging norms.
    testable: true
    preconditions:
    - rm_state:
        - RECEIVED
        - INVALID
        - VALID
        - DEFERRED
        - ACCEPTED
      description: Participant is in an active RM state (Received/Invalid/Valid/Deferred/Accepted)
    steps:
    - order: 1
      actor: receiver
      action: >-
        Update model of sender's CS state to Vendor Aware (Vfd···) — receiver's
        own CS state is unchanged
      expected: Receiver's awareness model for sender reflects CS=Vfd
    - order: 2
      actor: receiver
      action: Emit CK to acknowledge receipt of CV
      expected: CK queued for sender
    postconditions:
    - description: Sender's CS state recorded as Vfd; CK emitted; receiver CS unchanged
    relationships:
    - rel_type: satisfies
      spec_id: MSM-03-001
      note: 'CV shorthand wire-type mapping'

