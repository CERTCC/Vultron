id: TB
title: Testability
description: >-
  The Vultron inbox handler must be thoroughly testable at unit, integration, and system levels.
  Testability enables confidence in correctness, supports refactoring, and documents expected
  behavior.
version: 1.0.0
kind: language
scope:
- prototype
- production
tags:
- testing
groups:
- id: TB-01
  title: Testing Framework
  kind: language
  specs:
  - id: TB-01-001
    priority: MUST
    statement: The system MUST use pytest as the testing framework
  - id: TB-01-002
    priority: MUST
    statement: Test configuration MUST be defined in `pyproject.toml`
- id: TB-02
  title: Test Coverage
  specs:
  - id: TB-02-001
    priority: MUST
    statement: Unit tests MUST achieve 80%+ line coverage
  - id: TB-02-002
    priority: MUST
    statement: Critical paths MUST achieve 100% line coverage
- id: TB-03
  title: Integration Test Coverage
  kind: domain
  specs:
  - id: TB-03-001
    priority: MUST
    statement: Integration tests MUST cover inbox POST → handler invocation flow
  - id: TB-03-002
    priority: MUST
    statement: Integration tests MUST cover validation → error response flow
  - id: TB-03-003
    priority: MUST
    statement: Integration tests MUST verify async processing behavior
- id: TB-04
  title: Test Organization
  specs:
  - id: TB-04-001
    priority: MUST
    statement: Test structure MUST mirror source code structure
  - id: TB-04-002
    priority: MUST
    statement: Test files MUST use descriptive names starting with `test_`
  - id: TB-04-003
    priority: MUST
    statement: >-
      Unit and integration tests MUST be in separate directories or marked with pytest markers
- id: TB-05
  title: Test Data Management
  specs:
  - id: TB-05-001
    priority: MUST
    statement: The system MUST provide reusable test fixtures
  - id: TB-05-002
    priority: MUST
    statement: Test data MUST be generated via factories, not hardcoded
  - id: TB-05-003
    priority: MUST
    statement: Test fixtures MUST be defined in `conftest.py` files
  - id: TB-05-004
    priority: MUST
    statement: Tests MUST use proper domain objects, not simplified mock data
    rationale: >-
      Tests with string IDs can pass while production code fails; proper objects exercise
      actual validation and serialization
  - id: TB-05-005
    priority: MUST
    statement: Test semantic types MUST match the activity structure being tested
    rationale: >-
      Semantic type validation is enforced by the `USE_CASE_MAP` key lookup at dispatch time;
      mismatched tests bypass actual code paths
- id: TB-06
  title: Test Isolation
  specs:
  - id: TB-06-001
    priority: MUST
    statement: Tests MUST be independent and runnable in any order
  - id: TB-06-002
    priority: MUST
    statement: Tests MUST use test database or mocked database
  - id: TB-06-003
    priority: MUST
    statement: Test state MUST be reset between tests
  - id: TB-06-004
    priority: MUST
    statement: Test fixtures MUST clean up created data after test completion
    rationale: Prevents test database bloat and ensures isolation
  - id: TB-06-005
    priority: MUST
    statement: Behavior Tree tests MUST clear the py_trees blackboard between tests
    rationale: >-
      py_trees blackboard is a global singleton; without clearing, state from one test leaks
      into subsequent tests
  - id: TB-06-006
    priority: MUST
    statement: All tests MUST be deterministic and produce the same result on every run
    rationale: >-
      Flaky tests erode confidence in the test suite, mask real failures, and slow development.
      A flaky test MUST be fixed or removed; it MUST NOT be left in the suite.
  - id: TB-06-007
    priority: MUST
    kind: implementation
    statement: >-
      Integration tests that exercise multi-actor message flows MUST give each simulated
      actor its own isolated `DataLayer` instance. Tests that share a single `DataLayer`
      across multiple actors bypass the outbox→inbox delivery path and test in-memory
      state sharing instead of protocol communication.
    rationale: >-
      The outbox→inbox delivery path is a critical protocol boundary. A shared DataLayer
      removes it: actor A's outbox write is immediately visible to actor B without going
      through any delivery mechanism, making the test a unit test of shared state rather
      than an integration test of the protocol.
    relationships:
    - rel_type: refines
      spec_id: TB-06-001
  - id: TB-06-008
    priority: MUST
    statement: >-
      BT factories that have probabilistic defaults (e.g., always-succeed or always-fail
      stubs for nodes backed by configurable policies) MUST expose a module-level
      deterministic factory constant for use in tests. Tests MUST use the deterministic
      factory, not the production random-policy factory, to avoid stochastic test failures.
    rationale: >-
      A test that calls a production BT factory configured with a probability distribution
      may pass or fail depending on random outcomes. The deterministic factory ensures
      the test exercises a specific code path every time. Convention: name the constant
      `_always_succeed_factory` or `_always_fail_factory` at module level.
    relationships:
    - rel_type: refines
      spec_id: TB-06-006
- id: TB-07
  title: Mocking and Stubbing
  specs:
  - id: TB-07-001
    priority: MUST
    statement: External services MUST be mocked in unit tests
  - id: TB-07-002
    priority: MUST
    statement: Database access MUST be stubbed in unit tests
  - id: TB-07-003
    priority: MAY
    statement: Integration tests MAY use real database with test data
- id: TB-08
  title: Test Documentation
  specs:
  - id: TB-08-001
    priority: MUST
    statement: Tests MUST use descriptive names explaining what is tested
  - id: TB-08-002
    priority: SHOULD
    statement: Complex tests SHOULD include docstrings
  - id: TB-08-003
    priority: SHOULD
    statement: Tests SHOULD serve as usage examples
- id: TB-09
  title: Test Maintainability
  specs:
  - id: TB-09-001
    priority: MUST
    statement: Tests MUST be kept simple and readable
  - id: TB-09-002
    priority: SHOULD
    statement: Test duplication SHOULD be avoided via fixtures and helpers
  - id: TB-09-003
    priority: MUST
    statement: Tests MUST be refactored along with production code
- id: TB-11
  title: Test Infrastructure Consistency
  kind: language
  specs:
  - id: TB-11-001
    priority: MUST
    statement: >-
      When a pytest mark is renamed or added, ALL of the following MUST be
      updated in the same changeset: (a) the `markers` list in `pyproject.toml`,
      (b) any `.github/workflows/` YAML files that reference the mark by name
      (e.g., `-m "mark_name"` in `pytest` invocations), and (c) any test files
      that apply the mark.
    rationale: >-
      A mark renamed in test files but not in a workflow YAML causes `pytest` to
      select 0 tests matching the old name and exit with code 5 (no tests
      collected). CI treats a non-zero exit code as a failure, but the failure
      message ("no tests ran") is easily misread as an environment issue rather
      than a naming mismatch. Issue #934 observed this after renaming
      `case_log_invariants` to `case_ledger_invariants` across test files while
      leaving the workflow YAML referencing the old name.
    verification: >-
      After any pytest mark rename: grep `.github/workflows/` for the old mark
      name and confirm zero matches; confirm `pyproject.toml` registers the new
      name; run `pytest -m "new_mark_name" --collect-only` and confirm non-zero
      test collection.
    relationships:
    - rel_type: refines
      spec_id: TB-07-001
      note: Mark consistency between source, config, and CI is part of test
        infrastructure correctness
- id: TB-10
  title: Architecture Boundary Tests
  kind: dev-process
  specs:
  - id: TB-10-001
    priority: SHOULD
    statement: >-
      Once the `core` and `wire` packages are fully separated (see `specs/architecture.md`
      and `archived_notes/architecture-review.md`), architecture boundary tests SHOULD be
      added to enforce layer separation rules
    rationale: >-
      Automated boundary tests catch accidental cross-layer imports earlier than code review.
    scope:
    - production
  - id: TB-10-002
    priority: MUST
    statement: >-
      Architecture ratchet tests MUST use bidirectional equality: `assert actual_violations
      == KNOWN_VIOLATIONS`. A subset check (`assert actual ⊆ KNOWN`) is prohibited because
      it allows the violation set to grow without failing the test. When a violation is
      resolved, its entry MUST be removed from `KNOWN_VIOLATIONS` in the same commit.
    rationale: >-
      See ARCH-18-001 for the architecture-level rule. This entry specifies the test
      implementation obligation.
    relationships:
    - rel_type: implements
      spec_id: ARCH-18-001
- id: TB-12
  title: BT Test Harness
  kind: language
  specs:
  - id: TB-12-001
    priority: MUST
    statement: >-
      BT leaf and composite node tests MUST use the `BTTestScenario` deep-module test
      harness. The `setup_node_blackboard()` helper is an anti-pattern for integration
      tests of BT nodes: it creates shallow, manually wired blackboard state that
      diverges from the tree structure the node expects in production.
    rationale: >-
      `BTTestScenario` instantiates the full tree (or a representative subtree) and
      exercises nodes in their actual execution context, catching structural assumptions
      (e.g., parent Sequence providing the blackboard namespace) that `setup_node_blackboard()`
      tests cannot detect.
    relationships:
    - rel_type: refines
      spec_id: TB-03-001
  - id: TB-12-002
    priority: MUST
    statement: >-
      Each BT scenario test MUST run the BT tree exactly once per test case. Running the
      same tree instance multiple times in a single test produces accumulated blackboard
      state that masks isolation failures. Each test case MUST get a fresh tree instance.
    relationships:
    - rel_type: refines
      spec_id: TB-12-001
  - id: TB-12-003
    priority: MUST
    statement: >-
      BT integration tests MUST complete within 5 seconds per test case. Tests that
      exceed this limit MUST be redesigned (e.g., reducing dataset size, mocking
      external I/O) rather than raising the timeout. The `pytest-timeout` `timeout = 5`
      configuration MUST apply to all BT tests.
    relationships:
    - rel_type: refines
      spec_id: TB-12-001
  - id: TB-12-004
    priority: SHOULD
    statement: >-
      When a BT test scenario produces a `SUBFAILED` status (partial-success in a
      `memory=True` Sequence), the test SHOULD explicitly assert the expected leaf
      statuses rather than asserting only the root status. `SUBFAILED` on the root
      masks which children succeeded and which failed.
    relationships:
    - rel_type: refines
      spec_id: TB-12-001
