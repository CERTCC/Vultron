id: PROTO
title: Prototype Shortcuts
description: >-
  Permissible shortcuts and relaxed constraints for the prototype stage. These support iterative
  development while preserving traceability of production requirements. during the prototype
  stage.
version: 1.0.0
kind: implementation
scope:
- prototype
- production
groups:
- id: PROTO-01
  title: Authentication
  specs:
  - id: PROTO-01-001
    priority: MAY
    statement: Omit cryptographic authentication for agent-to-agent communication.
    relationships:
    - rel_type: constrains
      spec_id: CM-06-004
- id: PROTO-02
  title: Federation
  specs:
  - id: PROTO-02-001
    priority: MAY
    statement: Assume all actors are local to a single ActivityPub server.
  - id: PROTO-02-002
    priority: MAY
    statement: >-
      Post direct messages to an actor's inbox without federation or cross-server routing.
- id: PROTO-03
  title: Performance
  specs:
  - id: PROTO-03-001
    priority: SHOULD_NOT
    statement: Use algorithms with exponential or worse time complexity.
  - id: PROTO-03-002
    priority: SHOULD
    statement: >-
      Prefer the simplest algorithm when multiple options exist, even if less efficient.
  - id: PROTO-03-003
    priority: SHOULD
    statement: >-
      Implement straightforward optimizations that do not significantly increase complexity.
  - id: PROTO-03-004
    priority: SHOULD
    statement: >-
      Document known unimplemented optimizations in implementation notes for future reference.
- id: PROTO-04
  title: Production Deferral
  specs:
  - id: PROTO-04-001
    priority: SHOULD
    statement: >-
      Specification files SHOULD tag production-only requirements with `PROD_ONLY` so they
      can be systematically identified and deferred during the prototype stage.
  - id: PROTO-04-002
    priority: SHOULD
    statement: >-
      Review specifications to identify requirements that should carry the `PROD_ONLY` tag.
- id: PROTO-05
  title: Case Prioritization
  specs:
  - id: PROTO-05-001
    priority: MAY
    statement: >-
      Use a stub always-engage policy (`AlwaysPrioritizePolicy`) in place of a real prioritization
      framework.
- id: PROTO-08
  title: Backward Compatibility and Change Completeness
  specs:
  - id: PROTO-08-001
    priority: MUST_NOT
    statement: >-
      Add backward-compatibility shims when refactoring, renaming, moving, or removing code.
      Shims include re-export stubs, import aliases, wrapper functions, and deprecation stubs
      that exist solely to preserve old import paths or call signatures.
    rationale: >-
      Without shims a failing import immediately signals a missed call site; with a shim the
      missed update is invisible and accumulates as technical debt
  - id: PROTO-08-002
    priority: MUST
    statement: >-
      Complete every code change fully — all call sites for a renamed, moved, or removed symbol
      MUST be updated in the same commit as the symbol change.
  - id: PROTO-08-003
    priority: MUST_NOT
    statement: >-
      Preserve an old API, import path, field name, or function signature solely for backward
      compatibility.
  - id: PROTO-08-004
    priority: SHOULD
    statement: >-
      Follow a documented deprecation cycle with migration guidance when external consumers
      of the API exist.
    scope:
    - production
- id: PROTO-07
  title: Performance Testing
  specs:
  - id: PROTO-07-001
    priority: MAY
    statement: >-
      Performance tests and performance assertions MAY be skipped or marked as expected failures
      during the prototype stage
    rationale: >-
      Premature performance work distracts from correctness and architectural clarity; defer
      until exiting the prototype phase
    scope:
    - production
