id: EP
title: Embargo Policy
description: >-
  Requirements for a standardized embargo policy record associated with an Actor profile.
  Allows actors to declare their default embargo preferences so that coordinators can evaluate
  compatibility before proposing an embargo or inviting an actor to a case.
version: 1.0.0
kind: domain
scope:
- prototype
- production
tags:
- protocol
- state-machine
groups:
- id: EP-01
  title: Policy Record Format
  specs:
  - id: EP-01-001
    priority: MAY
    statement: >-
      An Actor profile MAY include a `embargo_policy` field containing a structured embargo
      policy record
  - id: EP-01-002
    priority: MUST
    statement: 'The embargo policy record MUST include the following fields:'
    relationships:
    - rel_type: implements
      spec_id: VP-05-001
    - rel_type: implements
      spec_id: VP-07-001
    - rel_type: implements
      spec_id: VP-07-002
    - rel_type: depends_on
      spec_id: DUR-01-001
      note: ISO 8601 duration format
  - id: EP-01-003
    priority: SHOULD
    statement: 'The embargo policy record SHOULD include the following fields:'
    relationships:
    - rel_type: implements
      spec_id: VP-05-001
    - rel_type: implements
      spec_id: VP-07-006
    - rel_type: depends_on
      spec_id: DUR-01-001
      note: ISO 8601 duration format
  - id: EP-01-004
    priority: MUST
    statement: >-
      The embargo policy record MUST be serializable as a Pydantic model and persisted in
      the DataLayer
  - id: EP-01-005
    priority: MUST
    statement: The embargo policy record MUST use full-URI IDs for `actor_id`
    relationships:
    - rel_type: depends_on
      spec_id: OID-01-001
- id: EP-02
  title: API Endpoint
  specs:
  - id: EP-02-001
    priority: SHOULD
    statement: >-
      Each Actor SHOULD expose its embargo policy at `GET /actors/{actor_id}/embargo-policy`
    scope:
    - production
  - id: EP-02-002
    priority: MUST
    statement: >-
      The policy endpoint MUST be machine-readable (returns JSON) and MUST be listed in the
      Actor's ActivityPub profile under a well-known key (e.g., `vultron:embargoPolicy`)
    scope:
    - production
- id: EP-03
  title: Policy Compatibility Evaluation
  specs:
  - id: EP-03-001
    priority: SHOULD
    statement: >-
      Before proposing an embargo or inviting an actor to join an existing embargo, the CaseActor
      SHOULD retrieve and evaluate the target actor's embargo policy for compatibility with
      the proposed embargo terms
    scope:
    - production
    relationships:
    - rel_type: implements
      spec_id: VP-07-001
    - rel_type: implements
      spec_id: VP-07-006
    - rel_type: implements
      spec_id: VP-07-007
  - id: EP-03-002
    priority: MUST
    statement: >-
      Compatibility evaluation MUST check that the proposed duration falls within the target
      actor's `minimum_duration`–`maximum_duration` range, if declared
    scope:
    - production
    relationships:
    - rel_type: implements
      spec_id: VP-07-003
    - rel_type: implements
      spec_id: VP-07-004
    - rel_type: implements
      spec_id: VP-07-005
    - rel_type: depends_on
      spec_id: DUR-01-001
    - rel_type: depends_on
      spec_id: DUR-04-001
- id: EP-04
  title: Default Embargo Semantics (MUST)
  specs:
  - id: EP-04-001
    priority: MUST
    statement: >-
      When a receiver applies their published default embargo at case creation and the sender
      submitted no explicit embargo proposal, the initial `CaseStatus.em_state` MUST be set
      to `EM.ACTIVE`, not `EM.PROPOSED`. The sender's report submission without a counter-proposal
      constitutes tacit acceptance of the receiver's default embargo.
    relationships:
    - rel_type: refines
      spec_id: DUR-07-003
  - id: EP-04-002
    priority: MUST_NOT
    statement: >-
      The implementation MUST apply both the PROPOSE and ACCEPT state machine triggers atomically
      within `InitializeDefaultEmbargoNode`. The intermediate `EM.PROPOSED` state MUST NOT
      be persisted or observable externally.
  - id: EP-04-003
    priority: MUST
    statement: >-
      When both the sender and receiver have an applicable embargo proposal at case creation
      (sender proposes a duration and receiver has a default), the shorter of the two MUST
      be made active immediately (`em_state = EM.ACTIVE`) and the longer SHOULD be registered
      as a pending revision (`em_state = EM.REVISE`).
  - id: EP-04-004
    priority: MUST
    statement: >-
      EP-04-003 is contingent on a sender-proposal mechanism being available. Until such a
      mechanism exists, only the no-sender-proposal case (EP-04-001) applies at case creation.
- id: EP-05
  title: Counter-Revision PEC Cascade Rule
  kind: domain
  specs:
  - id: EP-05-001
    priority: MUST
    statement: >-
      When an embargo transitions from `ACTIVE` to `REVISE` (counter-revision proposed),
      the CaseActor MUST call `_cascade_pec_revise()` to reset each `SIGNATORY`
      participant's PEC state to `INVITED` so they can re-consent to the revised terms.
    rationale: >-
      Without the PEC cascade, a participant who signed for embargo terms `T1` would
      remain `SIGNATORY` when the embargo is revised to `T2` — implying consent they
      never gave. The cascade makes re-consent explicit.
    relationships:
    - rel_type: implements
      spec_id: CM-18-001
  - id: EP-05-002
    priority: MUST_NOT
    statement: >-
      When the embargo is already in `REVISE` state and a further revision proposal
      arrives (`REVISE → REVISE`), the CaseActor MUST NOT call `_cascade_pec_revise()`
      again. The PEC states were already reset by the initial `ACTIVE → REVISE` transition;
      a double cascade would incorrectly re-invite participants who may have already
      re-consented.
    relationships:
    - rel_type: refines
      spec_id: EP-05-001
- id: EP-06
  title: PEC Idempotency
  kind: domain
  specs:
  - id: EP-06-001
    priority: MUST_NOT
    statement: >-
      An idempotent retry or re-processing of a participant add-or-update MUST NOT
      overwrite a non-null PEC state with the default `NO_EMBARGO`. Once a participant
      has been assigned any non-default PEC state (`INVITED`, `SIGNATORY`, `LAPSED`,
      or `DECLINED`), that state MUST be preserved across retries.
    rationale: >-
      Overwriting a `SIGNATORY` or `DECLINED` state with `NO_EMBARGO` on retry silently
      revokes or erases consent that was already given. The positive-path idempotency
      rule (don't double-add) is covered by CM-13-005; this rule covers the negative
      path (don't downgrade).
    relationships:
    - rel_type: refines
      spec_id: CM-13-005
    - rel_type: implements
      spec_id: CM-18-001
