id: CM
title: Case Management
description: >-
  Requirements for VulnerabilityCase lifecycle management, CaseActor responsibilities, and
  the RM/EM/CS/VFD state model. Covers actor isolation at the protocol level and the distinction
  between participant-specific and participant-agnostic state. `notes/bt-integration.md`,
  ActivityPub specification `handler-protocol.md` (HP-00-001, HP-00-002), `actor-knowledge-model.md`
  (AKM-01-001, AKM-01-002). CM-14 (case initialization sequence) sourced from IDEA-26050501.
  CM-16 (actor suggestion routing) and CM-17 (invitation flow) sourced from ADR-0026
  design session 2026-07-09.
version: 1.0.0
kind: domain
scope:

- prototype
- production
groups:
- id: CM-01
  title: Actor Isolation
  specs:
  - id: CM-01-001
    priority: MUST
    statement: Each actor MUST have an isolated protocol state domain
  - id: CM-01-002
    priority: MUST
    statement: Each actor's RM state MUST be maintained independently per case
- id: CM-02
  title: CaseActor Lifecycle
  specs:
  - id: CM-02-001
    priority: MUST
    statement: Each VulnerabilityCase MUST have exactly one associated CaseActor
  - id: CM-02-002
    priority: MUST
    statement: CaseActor MUST be the authoritative source of truth for case state
  - id: CM-02-003
    priority: MUST
    statement: CaseActor MUST persist until the associated VulnerabilityCase is closed
  - id: CM-02-004
    priority: MUST
    statement: CaseActor MUST know the case owner
  - id: CM-02-005
    priority: MUST
    statement: CaseActor MUST restrict certain activities to the case owner
    scope:
    - production
  - id: CM-02-006
    priority: MUST
    statement: CaseActor MUST enforce case-level authorization for all case mutations
    scope:
    - production
  - id: CM-02-007
    priority: MUST
    statement: >-
      `VulnerabilityCase` MUST include a `notes: list[as_NoteRef]` field to record case-scoped
      notes created via `AddNoteToCase` activities
  - id: CM-02-008
    priority: MUST
    statement: >-
      When a `VulnerabilityCase` is created from an originating `VulnerabilityReport` Offer,
      the vendor (case recipient / owner) MUST be recorded as the initial primary participant
  - id: CM-02-009
    priority: MUST
    statement: >-
      The CaseActor MUST apply its own trusted timestamp to every state-changing event it
      receives, regardless of any timestamp supplied by the sending participant
    rationale: >-
      The CaseActor's clock is the only trusted source of time for event ordering within a
      case; using participant-supplied timestamps would allow different copies of a case (held
      by different actors) to disagree on event order, undermining auditability and the single-source-of-truth
      guarantee
    relationships:
    - rel_type: depends_on
      spec_id: CM-02-002
  - id: CM-02-010
    priority: MUST
    statement: >-
      The CaseActor and the case owner (named actor) MUST have distinct actor identities —
      each with their own actor ID — even when co-located on the same server
    rationale: >-
      Enforcing distinct identities ensures that all case-state transitions pass through the
      wire protocol regardless of deployment topology, preserving audit integrity and enabling
      future separation onto independent containers without protocol changes
    relationships:
    - rel_type: refines
      spec_id: CM-01-001
    - rel_type: depends_on
      spec_id: CM-02-001
- id: CM-03
  title: Case State Model
  specs:
  - id: CM-03-001
    priority: MUST
    statement: >-
      The system MUST implement the three interacting state machines: RM (Report Management),
      EM (Embargo Management), and CS (Case State)
    relationships:
    - rel_type: implements
      spec_id: VP-01-001
    - rel_type: implements
      spec_id: VP-13-001
    - rel_type: implements
      spec_id: VP-14-001
  - id: CM-03-002
    priority: MUST
    statement: RM state MUST be participant-specific
    relationships:
    - rel_type: implements
      spec_id: VP-01-002
    - rel_type: implements
      spec_id: VP-02-002
    - rel_type: implements
      spec_id: VP-03-001
  - id: CM-03-003
    priority: MUST
    statement: >-
      A shared EM state MUST be tracked at the case level in `CaseStatus.em_state` to represent
      the collective embargo agreement
    relationships:
    - rel_type: implements
      spec_id: VP-04-002
    - rel_type: implements
      spec_id: VP-13-009
    - rel_type: implements
      spec_id: VP-14-001
  - id: CM-03-008
    priority: MUST
    statement: >-
      Each `CaseParticipant` MUST track their own embargo consent state via the `ParticipantStatus.embargo_adherence`
      field
    relationships:
    - rel_type: implements
      spec_id: VP-04-002
  - id: CM-03-004
    priority: MUST
    statement: CS (PXA sub-state) MUST be participant-agnostic (shared per case)
  - id: CM-03-005
    priority: MUST
    statement: VFD (Vendor Fix Deployment) state MUST be participant-specific
  - id: CM-03-006
    priority: MUST
    statement: >-
      Collection fields that hold status histories MUST be pluralized and documented as history
      collections
  - id: CM-03-007
    priority: MUST
    statement: >-
      RM state transitions MUST use the established protocol activity types without introducing
      new activity types for reverse transitions
    rationale: >-
      Keeps the RM symbol set minimal and produces clean audit histories; `Undo` conflates
      historical negation with a new forward transition
    relationships:
    - rel_type: implements
      spec_id: VP-02-004
- id: CM-04
  title: State Transition Correctness
  specs:
  - id: CM-04-001
    priority: MUST
    statement: >-
      Handlers processing RM state transitions MUST update `ParticipantStatus.rm_state` for
      the sending actor's CaseParticipant
    relationships:
    - rel_type: implements
      spec_id: VP-02-002
    - rel_type: implements
      spec_id: VP-02-003
    - rel_type: implements
      spec_id: VP-03-001
    - rel_type: implements
      spec_id: VP-13-005
  - id: CM-04-002
    priority: MUST
    statement: >-
      Handlers processing VFD state transitions MUST update `ParticipantStatus.vfd_state`
      for the sending actor's CaseParticipant
  - id: CM-04-003
    priority: MUST
    statement: >-
      Handlers processing EM state transitions MUST update the appropriate EM state field
      based on who is accepting and the current state:
    relationships:
    - rel_type: implements
      spec_id: VP-06-001
    - rel_type: implements
      spec_id: VP-09-001
    - rel_type: implements
      spec_id: VP-11-001
    - rel_type: implements
      spec_id: VP-11-002
    - rel_type: implements
      spec_id: VP-14-001
    - rel_type: implements
      spec_id: VP-14-002
    - rel_type: depends_on
      spec_id: CM-03-008
  - id: CM-04-004
    priority: MUST
    statement: >-
      Handlers processing PXA state transitions (public disclosure, exploit publication, attack
      observation) MUST update `CaseStatus.pxa_state`
    relationships:
    - rel_type: implements
      spec_id: VP-03-002
    - rel_type: implements
      spec_id: VP-14-003
    - rel_type: implements
      spec_id: VP-14-004
  - id: CM-04-005
    priority: MUST
    statement: >-
      Handlers that implement VFD or PXA transitions MUST validate the requested transition
      against the authoritative current state before persisting it
  - id: CM-04-006
    priority: MUST_NOT
    statement: >-
      State transition handlers MUST NOT mix participant-specific and participant-agnostic
      state updates incorrectly
    relationships:
    - rel_type: implements
      spec_id: VP-13-009
    - rel_type: depends_on
      spec_id: CM-03-008
  - id: CM-04-007
    priority: MUST
    statement: >-
      RM transition validation MUST treat `RM.CLOSED` as terminal before applying any
      same-state no-op shortcut. A repeated `CLOSED -> CLOSED` update MUST be treated
      as a terminal no-op that does not append new participant status records, trigger
      broadcast, or create new case-ledger entries.
    rationale: >-
      Checking equality first can let duplicate close retries flow into downstream
      append/broadcast paths as fresh state changes.
- id: CM-05
  title: Object Model Relationships
  specs:
  - id: CM-05-001
    priority: MUST
    statement: >-
      The system MUST distinguish the following domain objects as separate, non-interchangeable
      types:
  - id: CM-05-002
    priority: MUST_NOT
    statement: >-
      A `VulnerabilityCase` MUST reference at least one `VulnerabilityReport`; a case with
      zero reports MUST NOT exist
    relationships:
    - rel_type: implements
      spec_id: VP-02-015
    - rel_type: implements
      spec_id: VP-02-020
  - id: CM-05-003
    priority: SHOULD
    statement: >-
      A `VulnerabilityCase` SHOULD reference at least one `VulnerabilityRecord` before closure;
      cases with no associated record at closure SHOULD log a warning
  - id: CM-05-004
    priority: MAY
    statement: A `VulnerabilityCase` MAY have zero or more associated `CaseReference` objects
  - id: CM-05-005
    priority: MUST
    statement: >-
      `CaseReference` objects MUST include at minimum a `url` field; SHOULD include a `name`
      field (human-readable title); MAY include a `tags` field (array of one or more type
      descriptors, e.g., `"patch"`, `"vendor-advisory"`, `"third-party-advisory"`, `"exploit"`,
      `"release-notes"`)
  - id: CM-05-006
    priority: MAY
    statement: >-
      One report MAY describe multiple vulnerabilities; one case MAY group multiple reports
      (e.g., when overlapping participants are involved)
  - id: CM-05-007
    priority: MAY
    statement: >-
      Multiple `CaseReference` objects MAY arise from a single case (e.g., coordinated simultaneous
      disclosure by multiple vendors)
  - id: CM-05-008
    priority: MUST_NOT
    statement: >-
      `VulnerabilityRecord` identifiers MUST be treated as opaque strings; the system MUST
      NOT restrict identifier values to CVE ID format or any other specific namespace
    rationale: >-
      Different organizations use different identifier namespaces (CVE, CERT/CC VU#, vendor-assigned
      IDs, etc.); requiring a specific format excludes valid records and prevents multi-namespace
      support
  - id: CM-05-009
    priority: SHOULD
    statement: >-
      A `VulnerabilityRecord` SHOULD support a list of alias identifiers from different namespaces
      for the same vulnerability
    rationale: >-
      Multiple IDs from different namespaces may refer to the same underlying vulnerability
      (e.g., a CVE ID and a CERT/CC VU# ID)
  - id: CM-05-010
    priority: MUST
    statement: >-
      When a `VulnerabilityRecord` is a `CVERecord` (i.e., it carries a CVE ID), its data
      MUST conform to the CVE JSON schema (<https://github.com/CVEProject/cve-schema>)
- id: CM-06
  title: Case Update Broadcast
  specs:
  - id: CM-06-001
    priority: MUST
    statement: >-
      When the CaseActor updates canonical case state, it MUST notify all current case participants
    relationships:
    - rel_type: implements
      spec_id: VP-02-019
    - rel_type: implements
      spec_id: VP-03-012
    - rel_type: implements
      spec_id: VP-08-001
  - id: CM-06-002
    priority: MUST
    statement: >-
      Participants receiving a case update notification MUST treat the update as authoritative
      only when it originates from the CaseActor
    relationships:
    - rel_type: depends_on
      spec_id: CM-02-002
  - id: CM-06-003
    priority: MUST
    statement: >-
      Case update notifications MUST include the updated CaseActor URL so participants can
      fetch the current case state if needed
    scope:
    - production
  - id: CM-06-004
    priority: MUST
    statement: >-
      Participants MUST authenticate case update notifications before accepting them as authoritative
    scope:
    - production
  - id: CM-06-005
    priority: MUST
    statement: >-
      When a note is added to a case, the CaseActor MUST broadcast the note to all case participants
      (excluding the note author)
    relationships:
    - rel_type: depends_on
      spec_id: OX-03-001
    - rel_type: depends_on
      spec_id: CM-02-001
- id: CM-07
  title: CVD Action Rules API
  specs:
  - id: CM-07-001
    priority: SHOULD
    statement: >-
      The system SHOULD expose an endpoint that returns the set of valid actions available
      to a case participant given the current case state and their role
    relationships:
    - rel_type: refines
      spec_id: AR-07-001
    - rel_type: refines
      spec_id: AR-07-002
  - id: CM-07-002
    priority: MUST
    statement: >-
      The action rules response MUST include the participant's role and the current RM, EM,
      CS, and VFD states relevant to that participant
  - id: CM-07-003
    priority: MUST
    statement: >-
      The action rules response MUST list valid next actions as structured objects including
      the action name and any required parameters
- id: CM-08
  title: Domain Model Architecture
  specs:
  - id: CM-08-001
    priority: SHOULD
    statement: >-
      The system SHOULD maintain a clear separation between the wire representation, domain
      model, and persistence model for CVD objects
  - id: CM-08-002
    priority: MUST_NOT
    statement: >-
      Domain objects MUST NOT directly inherit from ActivityStreams base types; explicit `from_core()`
      / `to_core()` translation methods MUST be provided at the wire boundary (see `specs/architecture.md`
      ARCH-12-001 through ARCH-12-007 and `notes/domain-model-separation.md`)
- id: CM-09
  title: Redacted Case View
  specs:
  - id: CM-09-001
    priority: SHOULD
    statement: >-
      The system SHOULD support a `RedactedVulnerabilityCase` type for sharing case information
      with invited-but-not-yet-accepted participants
    scope:
    - production
  - id: CM-09-002
    priority: MUST
    statement: >-
      The ID of a `RedactedVulnerabilityCase` MUST be cryptographically unrelated to the full
      `VulnerabilityCase` ID
    rationale: >-
      Prevents an attacker who obtains a redacted case ID from inferring the full case ID
    scope:
    - production
  - id: CM-09-003
    priority: MUST
    statement: Each invitee MUST receive a distinct `RedactedVulnerabilityCase` ID
    rationale: >-
      Prevents cross-correlation of redacted IDs to infer participant list size or identities
    scope:
    - production
  - id: CM-09-004
    priority: MAY
    statement: >-
      For the prototype, the `Invite` activity MAY reference the case by full case ID only,
      deferring the redacted view to a later phase
- id: CM-10
  title: Per-Participant Embargo Acceptance
  specs:
  - id: CM-10-001
    priority: MUST
    statement: >-
      `CaseParticipant` MUST track which embargo(es) a participant has explicitly accepted
    relationships:
    - rel_type: implements
      spec_id: VP-05-001
  - id: CM-10-002
    priority: MUST
    statement: >-
      Embargo acceptances MUST be timestamped by the CaseActor at the time of receipt, not
      using the participant's claimed timestamp
    rationale: >-
      The CaseActor applies the only trusted timestamp; the participant's reported time cannot
      be verified
    relationships:
    - rel_type: depends_on
      spec_id: CM-02-002
    - rel_type: implements
      spec_id: CM-02-009
  - id: CM-10-003
    priority: SHOULD
    statement: >-
      The `CaseParticipant` model SHOULD include an `accepted_embargo_ids: list[str]` field
      recording the IDs of `EmbargoEvent` objects the participant has explicitly accepted
  - id: CM-10-004
    priority: MUST
    statement: >-
      Before sharing case updates with a participant, the system MUST verify that the participant
      has accepted the current active embargo
- id: CM-11
  title: CM-11 Invitation Acceptance Lifecycle
  specs:
  - id: CM-11-001
    priority: MUST
    statement: >-
      When an actor accepts a case invitation, the accepting actor's RM state MUST advance
      to ACCEPTED
    relationships:
    - rel_type: implements
      spec_id: VP-03-012
    - rel_type: depends_on
      spec_id: CM-03-001
  - id: CM-11-002
    priority: SHOULD
    statement: >-
      After auto-engagement (CM-11-001), the accepting actor SHOULD emit an `RmEngageCaseActivity`
      to notify the case owner
    relationships:
    - rel_type: depends_on
      spec_id: OX-02-001
- id: CM-12
  title: CM-12 Case Creation Timing
  specs:
  - id: CM-12-001
    priority: MUST
    statement: >-
      A `VulnerabilityCase` MUST be created when an `Offer(Report)` activity is received by
      the vendor actor
  - id: CM-12-002
    priority: MUST
    statement: >-
      At case creation, the system MUST create two initial `VultronParticipant` records
      in the order defined by CM-14-001
    relationships:
    - rel_type: depends_on
      spec_id: CM-03-001
    - rel_type: depends_on
      spec_id: CM-02-008
    - rel_type: part_of
      spec_id: CM-14-001
  - id: CM-12-003
    priority: MUST
    statement: >-
      When a case is created from an `Offer(Report)`, the case owner MUST queue a `Create(Case)`
      activity to notify the reporter that a case has been opened
    relationships:
    - rel_type: depends_on
      spec_id: OX-02-001
  - id: CM-12-004
    priority: MUST
    statement: >-
      If a default embargo policy is configured, a default embargo MUST be initialized
      at case creation (RM.RECEIVED) following the sequence in CM-14-001
    relationships:
    - rel_type: refines
      spec_id: DUR-07-002
      note: which now applies at case receipt
    - rel_type: part_of
      spec_id: CM-14-001
  - id: CM-12-005
    priority: MUST
    statement: >-
      `InvalidateReportReceivedUseCase`, `CloseReportReceivedUseCase`, and `ValidateReportReceivedUseCase`
      MUST dereference the incoming report ID to the associated case ID before delegating
      to the corresponding case-level use case
    relationships:
    - rel_type: depends_on
      spec_id: CM-12-001
- id: CM-13
  title: Embargo Acceptance Ownership
  specs:
  - id: CM-13-001
    priority: MUST
    statement: >-
      When processing an `Accept(Invite(EmbargoEvent))` or embargo-accept trigger, the
      handler MUST determine whether the accepting actor is the case owner
      (`VulnerabilityCase.attributed_to == actor_id`) and apply the correct state
      transitions accordingly
    rationale: >-
      The case owner's acceptance is the authoritative signal for advancing the shared
      EM state. Non-owner participants update only their own consent state.
  - id: CM-13-002
    priority: MUST
    statement: >-
      If the accepting actor is the case owner, the handler MUST transition the shared
      `CaseStatus.em_state` to `ACTIVE`
  - id: CM-13-003
    priority: MUST
    statement: >-
      If the accepting actor is NOT the case owner, the handler MUST update only that
      participant's own `ParticipantStatus.embargo_adherence` consent state to `SIGNATORY`;
      it MUST NOT advance the shared EM state
    rationale: >-
      Non-owner participants do not hold a pocket veto; their individual acceptance does
      not constitute case-level embargo activation
  - id: CM-13-004
    priority: MUST
    statement: >-
      If `VulnerabilityCase.attributed_to` is `None` (legacy or single-actor case), the
      handler MUST treat the triggering actor as the case owner for the purposes of EM
      state transitions
    rationale: >-
      Backward compatibility with cases created before the `attributed_to` field was
      introduced; prevents single-actor embargo triggers from silently failing
  - id: CM-13-005
    priority: MUST
    statement: >-
      Embargo accept/reject handlers MUST be idempotent: if the participant's consent
      state is already `SIGNATORY` (for accept) or `DECLINED` (for reject), the handler
      MUST succeed silently without re-running state machine transitions or emitting
      invalid-transition warnings
  - id: CM-13-006
    priority: MUST
    statement: >-
      When a case is created with a default embargo that reaches `EM.ACTIVE` at creation
      time, the case owner MUST be initialized as a `SIGNATORY` in the same BT node or an
      immediately following sibling node in the same BT subtree
    rationale: >-
      The case creator is the case owner by default; seeding them as a signatory prevents
      the case owner from being locked out of their own active embargo until a separate
      accept step occurs. The consent state must be set via the PEC state machine
      (not by direct field assignment) to preserve state machine invariants.
    relationships:
    - rel_type: depends_on
      spec_id: CM-12-004
  - id: CM-13-007
    priority: MUST
    statement: >-
      Note attachment idempotency MUST be checked by testing whether the note's `id_` is
      present in `VulnerabilityCase.notes`, NOT by testing whether the note object exists
      in the DataLayer
    rationale: >-
      A note may be stored in the DataLayer by one path and never attached to `case.notes`
      by another path. Checking DataLayer existence produces false idempotency.
  - id: CM-13-008
    priority: MUST
    statement: >-
      When reusing an existing report-phase `ParticipantStatus` record on embargo
      accept/reject retries, handlers MUST preserve a non-null existing consent value and
      MUST NOT overwrite it with the default `NO_EMBARGO` value.
    rationale: >-
      Retry/idempotent paths must not silently downgrade previously established consent
      snapshots.
- id: CM-14
  title: Case Initialization Sequence
  description: >-
    Defines the canonical ordered sequence of initialization steps that MUST occur when a
    VulnerabilityCase is created at Offer(Report) receipt (CM-12-001). All steps MUST complete
    before the case is considered fully initialized.
  specs:
  - id: CM-14-001
    priority: MUST
    statement: >-
      The case initialization sequence MUST execute in the following order:
      (1) create the `VulnerabilityCase` with the receiving actor set as `attributed_to`;
      (2) create the case-owner `VultronParticipant` (RM.RECEIVED, `CVDRole.CASE_OWNER`);
      (3) initialize the default embargo to `EM.ACTIVE` and seed the case owner as `SIGNATORY`,
      if a default embargo policy is configured;
      (4) queue a `Create(Case)` activity addressed to the reporter and flush the outbox;
      (5) add the reporter as a `VultronParticipant` (RM.ACCEPTED, `CVDRole.FINDER`/`REPORTER`)
      and seed them as `SIGNATORY` on any active embargo;
      (6) commit a case ledger entry (triggering `Announce(CaseLedgerEntry)` fan-out to all participants).
    rationale: >-
      Step 2 precedes step 3 so that the embargo is always created by a participant
      (the case owner). The Create(Case) notification in step 4 is flushed before the
      reporter is added in step 5 so the reporter's system receives the case object
      before any subsequent Announce(CaseLedgerEntry) fan-out that references it.
    relationships:
    - rel_type: depends_on
      spec_id: CM-12-001
    - rel_type: refines
      spec_id: CM-12-002
    - rel_type: refines
      spec_id: CM-12-004
  - id: CM-14-002
    priority: MUST
    statement: >-
      The case-owner `VultronParticipant` MUST be created before the default embargo is
      initialized, so that the embargo is always associated with an existing participant
    rationale: >-
      An embargo without any participant lacks an owning actor. Creating the owner
      participant first ensures that the embargo is initialized in the context of an
      actor who can be responsible for it.
    relationships:
    - rel_type: depends_on
      spec_id: CM-14-001
  - id: CM-14-003
    priority: MUST
    statement: >-
      When the case initialization sequence creates a default embargo, the case owner
      MUST be seeded as `SIGNATORY` on that embargo immediately after the embargo reaches
      `EM.ACTIVE` state
    rationale: >-
      The case owner initiated the embargo by accepting the default policy on behalf of
      the case. Requiring a separate accept step would leave the case owner as a
      non-signatory on their own active embargo.
    relationships:
    - rel_type: depends_on
      spec_id: CM-14-001
    - rel_type: refines
      spec_id: CM-13-006
  - id: CM-14-004
    priority: MUST
    statement: >-
      The `Create(Case)` notification MUST be queued and the outbox flushed before the
      reporter is added as a `VultronParticipant` in step 5 of CM-14-001
    rationale: >-
      The reporter's system must receive and store the case object before any
      Announce(CaseLedgerEntry) fan-out that lists them as a participant. Reversing this
      order causes "case not found" errors on the reporter side when the log entry
      arrives referencing a case the reporter has not yet seen.
    relationships:
    - rel_type: depends_on
      spec_id: CM-14-001
    - rel_type: depends_on
      spec_id: CM-12-003
  - id: CM-14-005
    priority: MUST
    statement: >-
      When the reporter is added as a `VultronParticipant` during case initialization,
      they MUST be seeded as `SIGNATORY` on any active embargo
    rationale: >-
      The reporter already possesses the vulnerability information before the case is
      created. Requiring an explicit embargo acceptance before sharing case content
      would create a paradoxical deadlock: the reporter has the information that the
      embargo is meant to protect, yet cannot receive case updates until they accept
      the embargo. Seeding them as SIGNATORY reflects their implicit consent, expressed
      by submitting the report.
    relationships:
    - rel_type: depends_on
      spec_id: CM-14-001
  - id: CM-14-006
    priority: SHOULD
    statement: >-
      If the reporter included an embargo proposal with their `Offer(Report)`, the case
      initialization SHOULD reconcile the reporter's proposed duration against the
      receiver's default embargo policy and initialize the embargo at the shorter of
      the two durations
    note: >-
      No wire-format mechanism currently exists for a reporter to include an embargo
      proposal in an `Offer(Report)`. This requirement is forward-looking and cannot
      be exercised until that mechanism is implemented. See
      notes/embargo-default-semantics.md "Known Gap: No Reporter Embargo Proposal
      Mechanism" and specs/embargo-policy.yaml EP-04-003.
    relationships:
    - rel_type: depends_on
      spec_id: CM-14-001
    - rel_type: depends_on
      spec_id: CM-12-004
  - id: CM-14-007
    priority: MUST
    statement: >-
      Additional participants MUST NOT be invited and embargo modifications MUST NOT be
      initiated until the case initialization sequence defined in CM-14-001 (including any
      applicable conditional steps) is complete
    rationale: >-
      The initialization sequence establishes the minimum valid case state: a case
      object, an owner, an optional embargo, and a reporter. Inviting third parties or
      modifying the embargo before this baseline is in place creates race conditions
      and protocol violations.
    relationships:
    - rel_type: depends_on
      spec_id: CM-14-001
- id: CM-15
  title: Case Creation Policy
  description: >-
    Requirements for the configurable auto_create_case policy on ActorConfig.
    Enables pre-case-ACK protocol flows (ADR-0015 post-decision refinement,
    issue #1133).
  specs:
  - id: CM-15-001
    priority: MUST
    statement: >-
      ActorConfig MUST expose an `auto_create_case` boolean field (default: True).
      When a receiver's auto_create_case is False, processing an inbound
      Offer(Report) MUST store the VulnerabilityReport and the Offer(Report)
      activity but MUST NOT create a VulnerabilityCase and MUST leave the
      receiver's outbox unchanged. The gate MAY be enforced either as a
      routing-level short-circuit in SubmitReportReceivedUseCase or as an
      in-tree condition node at the root of create_receive_report_case_tree;
      the observable outcome (no case, no outbound activities) is what is
      normative, not the enforcement location.
    rationale: >-
      Receivers that follow the Option 3 protocol path (send Read(Offer(Report))
      before deciding to accept or reject) require the ability to delay case
      creation. The default (True) preserves the original ADR-0015 Option 4
      "always create at RM.RECEIVED" behavior for all existing actors and demos.
      Case creation is protocol-significant behavior (BT-15-001), so the
      canonical gate lives in the behavior tree as a condition node; the
      use-case short-circuit is an equivalent optimization that avoids invoking
      the BT for a decision already known at dispatch time. Either placement
      yields the same observable outcome, so the requirement is specified in
      terms of behavior rather than call path.
    relationships:
    - rel_type: refines
      spec_id: CM-12-001
- id: CM-16
  title: Actor Suggestion Routing (Recommend-Actor Flow)
  specs:
  - id: CM-16-001
    priority: MUST
    statement: >-
      A participant wishing to suggest that another actor be invited to the case MUST
      send `Offer(object=Actor, target=Case)` to the CaseActor's inbox, not directly
      to the Case Owner's inbox.
    rationale: >-
      All case-scoped protocol messages MUST route through the CaseActor so the event
      can be recorded in the canonical case ledger before any downstream action is taken
      (ADR-0021, PCR-08-001).
    relationships:
    - rel_type: implements
      spec_id: PCR-08-001
  - id: CM-16-002
    priority: MUST
    statement: >-
      When the CaseActor receives `Offer(object=Actor, target=Case)`, it MUST commit a
      `CaseLedgerEntry` for the received Offer and fan out the entry to all participants
      BEFORE taking any downstream action.
    rationale: >-
      Ledger entries record events that have already occurred; pre-committing a
      decision before communicating it is not permitted (CLP-10-006 commit ordering).
    relationships:
    - rel_type: implements
      spec_id: CLP-10-006
  - id: CM-16-003
    priority: MUST
    statement: >-
      After recording the received `Offer(Actor)`, the CaseActor MUST assign a
      non-empty default role list for the suggested actor via an Evaluator BT node
      (ADR-0024 shape: Evaluator). The Evaluator MUST return FAILURE if it cannot
      produce a non-empty role list; the downstream consumer node MUST NOT silently
      substitute a default for an empty list written by the Evaluator (ADR-0032
      BT-HELPER-01).
    note: >-
      The Evaluator node is a call-out point (ADR-0025 abstraction; ADR-0024 shape:
      Evaluator) that MAY be replaced by a more sophisticated role-inference
      implementation in future. The non-empty invariant is enforced at write time so
      the downstream consumer never needs to treat an empty list as a sentinel.
      See CM-16-011 and CM-16-012 for the recommended and permitted default values.
  - id: CM-16-011
    priority: SHOULD
    statement: >-
      The default role list SHOULD be `[CVDRole.VENDOR]` for actors whose type cannot
      be determined from context, because in CVD cases the most likely role for a
      newly added participant is Vendor.
  - id: CM-16-012
    priority: MAY
    statement: >-
      The default role list MAY be `[CVDRole.OTHER]` when the Evaluator can determine
      that the suggested actor does not fit any known CVD role but still requires case
      membership (e.g., a security researcher with no vendor affiliation).
      `CVDRole.OTHER` is the most conservative choice because it makes no assumption
      about the actor's function in the CVD process.
  - id: CM-16-013
    priority: MAY
    statement: >-
      The Evaluator's default role assignment MAY be overridden by actor-level
      configuration (e.g., a policy that maps known actor URIs to specific roles)
      or by the Case Owner at accept time when the Case Owner selects different
      roles for the suggested participant.
    rationale: >-
      The Case Owner has ultimate authority over who participates in their case
      and in what role. The Evaluator's output is a suggested starting point to
      reduce friction, not a binding decision. The Case Owner can always update
      role assignments to whatever they determine is appropriate.
  - id: CM-16-004
    priority: MUST
    statement: >-
      The CaseActor MUST transform the received `Offer(Actor)` into
      `Offer(object=CaseParticipant{attributed_to=actor, case_roles=roles}, target=Case)`
      and send it to the Case Owner's inbox, with `origin` set to the ID of the original
      recommender's Offer activity.
    rationale: >-
      The Case Owner makes a membership decision about a CaseParticipant (actor + roles),
      not about a bare Actor identity. The `origin` field preserves the causal chain
      without a side-channel data store.
  - id: CM-16-005
    priority: MAY
    statement: >-
      The recommender's `Offer(Actor)` MAY include a `content` or `summary` field
      explaining why the actor is being suggested. The CaseActor SHOULD forward this
      text as the `content` of the transformed `Offer(CaseParticipant)` it sends to
      the Case Owner.
  - id: CM-16-006
    priority: MUST
    statement: >-
      After receiving `Accept(Offer(CaseParticipant))` from the Case Owner, the CaseActor
      MUST (1) commit a ledger entry for the Accept, (2) fan out the ledger entry, (3) send
      `AcceptActorRecommendation` to the original recommender with `in_reply_to` set to
      the ID of the original recommender's `Offer` activity, and (4) send
      `Invite(CaseStub[+embargo])` to the suggested actor per CM-17.
    relationships:
    - rel_type: implements
      spec_id: CM-17-001
  - id: CM-16-007
    priority: MUST
    statement: >-
      After receiving `Reject(Offer(CaseParticipant))` from the Case Owner, the CaseActor
      MUST (1) commit a ledger entry for the Reject, (2) fan out the ledger entry, and
      (3) send `RejectActorRecommendation` to the original recommender with `in_reply_to`
      set to the ID of the original recommender's `Offer` activity.
  - id: CM-16-008
    priority: MUST
    statement: >-
      When a second `Offer(Actor X, Case)` arrives while a pending decision for Actor X
      is still outstanding (no Accept or Reject yet received from the Case Owner), the
      CaseActor MUST record the duplicate recommendation in the ledger and MUST send a
      `Note` to the Case Owner's inbox indicating that a reinforcing suggestion was
      received, including the second recommender's identity and any `content` from the
      Offer. The CaseActor MUST NOT send a second transformed Offer to the Case Owner.
  - id: CM-16-009
    priority: MUST
    statement: >-
      When a second `Offer(Actor X, Case)` arrives after an Invite has already been sent
      to Actor X (i.e., the invite is in-flight or the actor is already a participant),
      the CaseActor MUST record the recommendation in the ledger, fan out the entry, and
      auto-send `AcceptActorRecommendation` (with `in_reply_to` = original recommender's
      Offer ID) back to the second recommender. The CaseActor MUST NOT send a duplicate
      Invite to Actor X.
  - id: CM-16-010
    priority: MUST
    statement: >-
      In every step of the actor suggestion flow, the CaseActor MUST commit the ledger
      entry for a protocol event AFTER the corresponding message has been sent or received,
      never before.
    rationale: >-
      Pre-announcing a decision in the ledger before communicating the decision creates
      a window where the ledger shows an effect without its cause.
- id: CM-17
  title: Invitation Flow — Enrichment and Roles
  specs:
  - id: CM-17-001
    priority: MUST
    statement: >-
      The `Invite` activity sent by the CaseActor to a new actor MUST include a case
      stub as the `object`, with the case stub containing at minimum the case ID and
      type. This requirement is extended by CM-17-002 and CM-17-003.
  - id: CM-17-002
    priority: MUST
    statement: >-
      When `CaseStatus.em_state == ACTIVE` at the time the Invite is sent, the case stub
      MUST include at minimum the `activeEmbargo` reference (ID + `end_time`) and the
      embedded `CaseStatus.em_state` field so the invitee can give informed consent before
      accepting.
    rationale: >-
      The invite-accept cycle is the only consent signal for late-joining participants
      when an active embargo already exists. Accepting without seeing embargo terms is
      not meaningfully informed consent (issue #1289, MV-10-006).
    relationships:
    - rel_type: implements
      spec_id: MV-10-006
  - id: CM-17-003
    priority: MUST
    statement: >-
      The `Invite` activity MUST embed the intended `case_roles: list[CVDRole]` for the
      invitee. Roles reach `EmitInviteActorToCaseNode` via the blackboard key
      ``suggested_roles`` (flat, unnamespaced). There are two distinct source paths:
      (1) **Direct-trigger path** — the Case Owner explicitly calls
      `invite-actor-to-case` with a `roles` list; `SvcInviteActorToCaseUseCase`
      writes that list to ``suggested_roles`` via `_extra_execute_kwargs()` before
      BT execution. (2) **Suggest-actor received path** — the CaseActor receives
      `Accept(Offer(CaseParticipant))`; `AcceptOfferCaseParticipantReceivedUseCase`
      does NOT write ``suggested_roles``; the `Invite` is emitted with `roles=None`
      and the invitee's `CaseParticipant.case_roles` is populated on
      `Accept(Invite)` by reading roles from the persisted Invite wire object
      (CM-17-004). In the suggest-actor path, roles originate from the Case Owner's
      Accept response (CM-16-006) or the CaseActor's default role assignment
      (CM-16-003).
    rationale: >-
      All invited participants getting `caseRoles=[]` is a protocol defect (issue
      #1288). The participant record created on `Accept(Invite)` MUST reflect the
      roles the Case Owner intended, whether those roles arrived via a direct trigger
      request or via the suggest-actor round-trip.
  - id: CM-17-004
    priority: MUST
    statement: >-
      When the CaseActor receives `Accept(Invite)` from the invitee, it MUST (1) commit a
      ledger entry for the Accept, (2) fan out the ledger entry to ALL existing participants,
      (3) create a `CaseParticipant` record for the invitee at `RM.ACCEPTED` with the roles
      from the Invite, (4) sign embargo consent if `em_state == EM.ACTIVE` (CM-10-001),
      (5) send `Announce(VulnerabilityCase)` with the current full case snapshot to the
      invitee, and (6) backfill all prior `CaseLedgerEntry` records to the invitee in
      log-index order.
    relationships:
    - rel_type: implements
      spec_id: CM-11-001
    - rel_type: implements
      spec_id: CM-10-001
    - rel_type: implements
      spec_id: PCR-08-010
  - id: CM-17-005
    priority: MUST_NOT
    statement: >-
      The invitee MUST NOT appear in the case participant list until their `Accept(Invite)`
      has been received and processed by the CaseActor. A pending invitation (Invite sent,
      no response yet) is tracked only as a ledger entry, not as a participant record.
    rationale: >-
      A participant record implies RM.ACCEPTED state and associated permissions. Creating
      one before the invitee has consented would grant protocol access prematurely.
  - id: CM-17-006
    priority: MUST
    statement: >-
      The CaseActor MUST commit a `CaseLedgerEntry` for the emitted `Invite` activity
      (recording the fact of its emission) AFTER the Invite has been queued for delivery
      to the invitee. The commit MUST NOT precede the emission.
    relationships:
    - rel_type: implements
      spec_id: CLP-10-006
- id: CM-18
  title: Participant Embargo Consent State Machine
  kind: domain
  specs:
  - id: CM-18-001
    priority: MUST
    statement: >-
      Each participant's embargo consent MUST be tracked as a `ParticipantEmbargoConsent`
      (PEC) value with five possible states: `NO_EMBARGO` (initial), `INVITED` (invite sent,
      awaiting response), `SIGNATORY` (accepted), `LAPSED` (timer expired with no response),
      and `DECLINED` (explicitly refused).
    rationale: >-
      The five-state PEC machine formalizes the "pocket veto" mechanism: a participant who
      is invited but never responds causes the embargo to lapse rather than block progress.
      Source: `notes/participant-embargo-consent.md`.
  - id: CM-18-002
    priority: MUST
    statement: >-
      The `INVITED → LAPSED` transition MUST be driven by a timer expiry, not by a
      participant action. The timer period MUST be derived from the embargo's `end_time`
      (or a configured grace period). The pocket veto materialises only when the timer
      fires without a prior `INVITED → SIGNATORY` or `INVITED → DECLINED` transition.
  - id: CM-18-003
    priority: MUST
    statement: >-
      The `NO_EMBARGO → INVITED`, `INVITED → SIGNATORY`, `INVITED → DECLINED`, and
      `INVITED → LAPSED` transitions are the only valid PEC state changes. Any other
      transition MUST be rejected as a protocol error.
    relationships:
    - rel_type: refines
      spec_id: CM-18-001
  - id: CM-18-004
    priority: MUST_NOT
    statement: >-
      A participant's PEC state MUST NOT move from `SIGNATORY` or `DECLINED` or `LAPSED`
      to `INVITED`. Once consent has been resolved (in either direction) it MUST NOT be
      restarted. A new embargo proposal requires a new PEC record, not mutation of the
      existing one.
- id: CM-19
  title: Participant Index Discipline
  kind: domain
  specs:
  - id: CM-19-001
    priority: MUST
    statement: >-
      `case_participants` (the persisted set of `CaseParticipant` records) is the
      authoritative source of participant membership. `actor_participant_index`
      (the in-memory dict mapping actor IDs to participants) is a cache derived from
      it. Divergence between these two structures is a hard error, not a recoverable
      state.
    rationale: >-
      A divergence means the cache has entries the authority doesn't know about (or
      vice versa), producing silently incorrect routing and access-control decisions.
  - id: CM-19-002
    priority: MUST
    statement: >-
      Any code path that modifies `case_participants` (add, remove, update) MUST also
      update `actor_participant_index` atomically within the same transaction or
      method call. The index MUST NOT be allowed to lag the authority.
    relationships:
    - rel_type: refines
      spec_id: CM-19-001
  - id: CM-19-003
    priority: MUST
    statement: >-
      Code that needs a participant by actor ID MUST read from `actor_participant_index`
      (the cache). Code that needs the canonical participant set (e.g., for broadcast or
      audit) MUST read from `case_participants`. Using the cache for canonical iteration
      is prohibited because cache population order is undefined.
    relationships:
    - rel_type: refines
      spec_id: CM-19-001
