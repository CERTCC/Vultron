id: PD
title: Project Documentation Structure
description: This specification defines the purpose, scope, and maintenance requirements for key project documentation files
  that guide AI agents and human developers.
version: 1.0.0
kind: implementation
scope:
- prototype
- production
tags:
- documentation
groups:
- id: PD-01
  title: File Size Guidelines
  specs:
  - id: PD-01-001
    priority: SHOULD
    statement: Large modules with multiple responsibilities SHOULD be refactored into smaller cohesive modules
- id: PD-03
  title: Documentation Currency
  specs:
  - id: PD-03-001
    priority: MUST
    statement: '`notes/*.md` files MUST be updated when implementation phases they describe are completed'
  - id: PD-03-002
    priority: SHOULD
    statement: '`notes/*.md` files that are purely historical and contain no durable design guidance SHOULD be archived in
      `archived_notes/` with a brief rationale, rather than deleted'
  - id: PD-03-004
    priority: MUST
    statement: '`notes/*.md` files with `status: superseded` in their frontmatter MUST be moved to `archived_notes/` promptly
      after the superseding notes file is stable. A superseded file MUST NOT remain in `notes/` indefinitely — it creates
      noise for agents scanning that directory and risks outdated guidance being loaded as active context.'
  - id: PD-03-005
    priority: MUST
    statement: When moving a file to `archived_notes/`, agents MUST update `archived_notes/README.md` with a new row in the
      Archived Files table, including the file name, archive date, reason for archiving, and any open items that were rescued
      to GitHub Issues before the move.
  - id: PD-03-003
    priority: MUST
    statement: Module paths referenced in `notes/` MUST be updated to reflect canonical current locations whenever those paths
      change
  - id: PD-03-006
    priority: SHOULD
    statement: Workflow or tooling PRs SHOULD update maintainer-facing documentation in the same PR; when this is not feasible,
      the PR MUST include a linked follow-up docs issue before merge.
- id: PD-04
  title: Documentation Build Validation
  specs:
  - id: PD-04-001
    priority: MUST
    statement: '`mkdocs build --strict` MUST pass without warnings before any changes to `docs/` directory files are staged
      for commit'
  - id: PD-04-002
    priority: MUST
    statement: Validation MUST occur after markdown linting (via `.github/skills/format-markdown/SKILL.md`) and before test
      runs, in the build-and-test workflow documented in `.github/skills/build-docs/SKILL.md`
  - id: PD-04-003
    priority: SHOULD
    statement: Agents SHOULD run `uv run mkdocs build --strict` locally when modifying `docs/` files to catch issues before
      staging for commit, reducing CI failures and improving development velocity
- id: PD-05
  title: Append-Only History Write Protocol
  kind: pattern
  specs:
  - id: PD-05-001
    priority: MUST
    statement: Agents MUST append new entries exclusively to the **end** of `plan/*HISTORY.md` files. Inserting content at
      an arbitrary line number, a specific section heading, or anywhere other than the very end of the file is **prohibited**.
  - id: PD-05-002
    priority: MUST_NOT
    statement: 'Agents MUST NOT perform a conditional existence check (e.g., `ls`, `test -f`, `os.path.exists`) before appending.
      Instead, agents MUST unconditionally ensure the file exists using a simple guard (e.g., `touch plan/HISTORY.md`), then
      proceed directly to the append step. The prohibited pattern is the `ls → if not found: create; if found: append` decision
      tree.'
  - id: PD-05-003
    priority: MUST_NOT
    statement: Agents MUST NOT read the full content of an append-only file in order to append a new entry. Only the final
      lines need to be inspected (using `view_range` with the tail of the file) to locate the exact end-of-file position.
  - id: PD-05-004
    priority: MUST
    statement: 'Agents MUST use the following canonical append procedure: 1. Ensure the file exists: `touch <file>` (no-op
      if already present). 2. Write the new entry to a temporary file, then append that file to the target using `bash("cat
      /tmp/entry.md >> plan/HISTORY.md")` — or use Python `open(file, ''a'')` for content that contains shell-special characters.
      Do NOT use the `edit` tool for appending, because `edit` requires a unique `old_str` anchor that is not guaranteed in
      files with repeated structural patterns. 3. Verify the entry was written correctly: read the tail with `bash("tail -30
      <file>")` to confirm the content appears as expected.'
  - id: PD-05-005
    priority: MUST_NOT
    statement: Agents MUST NOT edit, reorder, or remove any existing entry from a `plan/*HISTORY.md` file. Once written, a
      history entry is permanent.
- id: PD-06
  title: Plan Section Organization (MUST/SHOULD)
  specs:
  - id: PD-06-004
    priority: MUST_NOT
    statement: Priority ordering is the sole responsibility of `plan/PRIORITIES.md`. GitHub Issue
      titles and `plan/PRIORITIES.md` headings MUST NOT encode priority information as numeric
      prefixes or rely on ordering to imply priority.
  - id: PD-06-005
    priority: SHOULD
    statement: '`plan/PRIORITIES.md` entries SHOULD reference the relevant GitHub Issue numbers to link
      priority assignments to implementation work. No rigid format is required because PRIORITIES.md is primarily human-edited;
      a brief reference to the issue number or topic is sufficient.'
- id: PD-09
  title: Task Granularity and GitHub Issues Coordination
  kind: general
  specs:
  - id: PD-09-001
    priority: SHOULD
    statement: Each GitHub Issue SHOULD be scoped to approximately one Pull Request worth of work — a set
      of changes that can be reviewed and merged in a single PR.
    rationale: This sizing keeps individual issues reviewable, linkable, and trackable within the GitHub
      Issues UI. Issues that span multiple PRs are difficult to close cleanly and obscure progress
      visibility.
    tags:
    - documentation
  - id: PD-09-002
    priority: SHOULD
    statement: When an Issue would require more than one Pull Request to complete, it SHOULD either be
      split into multiple PR-sized Issues or elevated to a parent Epic Issue with GitHub sub-issues
      representing each PR-sized chunk.
    rationale: An issue that spans multiple PRs cannot be closed atomically. Splitting or elevating
      preserves the one-PR-per-issue invariant without forcing artificial scope reduction.
    tags:
    - documentation
  - id: PD-09-003
    priority: SHOULD
    statement: Multi-step work items requiring coordinated effort across several Issues or external
      visibility SHOULD have a parent Epic GitHub Issue. GitHub sub-issues SHOULD be used to link the
      Epic to the individual Task Issues.
    rationale: GitHub sub-issues provide granular traceability within the GitHub UI, making progress
      visible to collaborators.
    tags:
    - documentation
  - id: PD-09-004
    priority: MUST
    statement: >-
      An Epic whose scope includes changes to the canonical CaseLedgerEntry commit path
      (commit call sites, commit authorization/gating, or per-actor ledger content) MUST include a
      closing sub-issue that reviews a fresh multi-actor demo run's per-actor ledger logs before the
      Epic is closed. Passing the aggregate invariant test suite alone is NOT sufficient closure
      evidence for such an Epic. Concretely, an Epic is "in scope" for this rule if any change
      within it touches `CommitCaseLedgerEntryNode`, `create_guarded_commit_case_ledger_entry_tree`,
      or `create_commit_log_entry_tree` in `vultron/core/behaviors/`, or any call site that invokes
      these directly.
    rationale: >-
      Epic #788's aggregate invariant suite (`test/ci/test_case_ledger_invariants.py`) passed
      all checks on `main` throughout the epic, yet the originating issue (#923) found 17
      protocol-correctness findings, including two critical-severity bugs (a hash-chain fork and an
      RM oscillation loop), that were visible only from a direct side-by-side review of each actor's
      JSONL log, not from any single structural invariant. Without a standing rule requiring this
      review at closure, later commit-path changes in the same Epic (e.g., a new authorization gate
      touching ~10 call sites) could reintroduce the same class of bug undetected.
    tags:
    - documentation
  - id: PD-09-005
    priority: SHOULD
    statement: >-
      Before scheduling an Epic whose goal is to deprecate or remove an existing artifact
      (a field, a class, a write path), an exhaustive inventory of read and write call sites for that
      artifact, across all layers, including any wire-layer or adapter-layer duplicates, SHOULD be
      attached to the Epic issue at creation time.
    rationale: >-
      Epic #788's wire-layer `VulnerabilityCase.events`/`record_event()` duplicate (issue
      #888) was discovered mid-epic rather than scoped at the start, and ended up as a late-arriving
      prerequisite blocking the epic's final removal step (#792). An upfront inventory would have
      surfaced this dependency before work began rather than after most of the epic was already
      complete.
    tags:
    - documentation
