id: SYNC
title: Case Event Log Synchronization
description: >-
  Requirements for the append-only canonical recorded case ledger, replication transport,
  conflict handling, per-peer state tracking, and retry semantics for distributed case
  state synchronization across Participant Actors.
version: 1.0.0
scope:
- prototype
- production
tags:
- protocol
- persistence
groups:
- id: SYNC-01
  title: Append-Only Log
  specs:
  - id: SYNC-01-001
    priority: MUST
    kind: protocol
    statement: The canonical recorded case ledger MUST be append-only; log entries MUST be immutable once appended
  - id: SYNC-01-002
    priority: MUST
    kind: protocol
    statement: Each log entry MUST carry a monotonically increasing index scoped to its case
  - id: SYNC-01-003
    priority: MUST
    kind: protocol
    statement: Each log entry MUST include a cryptographic hash of its own content and MUST reference the hash of its immediate
      predecessor, forming a forward-linked hash chain (Merkle chain style)
  - id: SYNC-01-004
    priority: MUST
    kind: protocol
    statement: Canonical recorded log entries MUST be written through the CaseActor's single authoritative write path
  - id: SYNC-01-005
    priority: MUST
    kind: protocol
    statement: The hash-chain log entry format MUST be designed to be forward-compatible with a future Merkle Tree implementation
- id: SYNC-02
  title: Replication Transport
  specs:
  - id: SYNC-02-001
    priority: MUST
    kind: protocol
    statement: Log replication between CaseActor and Participant Actors MUST use ActivityStreams `Announce` activities as
      the transport envelope for canonical recorded log content
  - id: SYNC-02-002
    priority: MUST
    kind: protocol
    statement: Each replication message MUST identify the sender, target recipient, the log entry hash, and the predecessor
      hash
  - id: SYNC-02-003
    priority: MUST
    kind: protocol
    statement: Replication MUST originate from the replication leader (initially the CaseActor) and be sent to each Participant
      Actor individually
  - id: SYNC-02-004
    priority: MUST_NOT
    kind: protocol
    statement: Each `Announce(CaseLedgerEntry)` activity MUST embed the full inline `CaseLedgerEntry` object in its `object` field;
      a URI-only reference MUST NOT be used, because the recipient needs all entry fields (including `prev_log_hash` and `entry_hash`)
      to validate the hash chain without an additional round-trip to the sender's DataLayer
- id: SYNC-03
  title: Conflict Handling
  specs:
  - id: SYNC-03-001
    priority: MUST
    kind: protocol
    statement: A receiver MUST reject a replication message whose predecessor hash does not match the receiver's current log
      tail hash
  - id: SYNC-03-002
    priority: MUST
    kind: protocol
    statement: On receiving a rejection, the sender MUST retry replication starting from the entry following the last accepted
      hash reported by the receiver
  - id: SYNC-03-003
    priority: MUST_NOT
    kind: protocol
    statement: 'Replication MUST be idempotent: repeated delivery of the same log entry MUST NOT produce duplicate entries
      in the receiver''s log'
    relationships:
    - rel_type: implements
      spec_id: ID-02-001
      note: idempotency.md
  - id: SYNC-03-004
    priority: SHOULD
    kind: protocol
    statement: When a Participant Actor sends any message to the CaseActor, it SHOULD include the hash of its last accepted
      canonical recorded log entry as a parameter in the activity's context field
- id: SYNC-04
  title: Per-Peer Replication State
  specs:
  - id: SYNC-04-001
    priority: MUST
    kind: protocol
    statement: The replication leader MUST track per-peer state including at minimum the last acknowledged log entry hash
      for each peer
  - id: SYNC-04-002
    priority: MUST
    kind: protocol
    statement: Per-peer replication state MUST be persisted via the DataLayer so that it survives a leader restart
- id: SYNC-05
  title: Retry and Backoff
  specs:
  - id: SYNC-05-001
    priority: SHOULD
    kind: protocol
    statement: The replication sender SHOULD implement retry with exponential backoff on delivery failure
  - id: SYNC-05-002
    priority: SHOULD
    kind: protocol
    statement: Retry and backoff parameters SHOULD be configurable
  - id: SYNC-05-003
    priority: MUST
    kind: protocol
    statement: Default values for retry and backoff parameters MUST be documented
- id: SYNC-06
  title: Leadership and Ownership
  specs:
  - id: SYNC-06-001
    priority: SHOULD
    kind: protocol
    statement: Replication leadership SHOULD be treated as distinct from case ownership
  - id: SYNC-06-002
    priority: SHOULD
    kind: protocol
    statement: The conditions under which replication leadership changes SHOULD be documented in `notes/sync-ledger-replication.md`
  - id: SYNC-06-003
    priority: MUST
    kind: protocol
    statement: The SYNC-1 through SYNC-4 phases implement a **single-node CaseActor configuration** — a degenerate Raft cluster
      of one. A single-node CaseActor is always the leader and always has write authority; no election is needed.
  - id: SYNC-06-004
    priority: SHOULD
    kind: protocol
    statement: >-
      A future multi-node CaseActor cluster (Phase 3) provides high-availability write authority
      via Raft consensus. This is a distinct replication tier from participant replication:
      participant replication (SYNC-2) is pull-based fan-out via `Announce(CaseLedgerEntry)`,
      whereas the multi-node CaseActor cluster uses Raft consensus to elect a single write
      authority among the CaseActor nodes. The two tiers operate independently and SHOULD NOT
      be conflated.
- id: SYNC-09
  title: Commit Discipline
  specs:
  - id: SYNC-09-001
    priority: MUST
    kind: protocol
    statement: A log entry is **committed** when it has been durably appended to the authoritative log and is safe to apply
      to the case state machine
  - id: SYNC-09-002
    priority: MUST
    kind: protocol
    statement: External Vultron messages (activities sent to Participant Actors or other protocol participants) MUST only
      be emitted after the associated `CaseLedgerEntry` is committed
  - id: SYNC-09-003
    priority: MUST
    kind: protocol
    statement: The CaseActor's behavior tree execution MUST be gated on holding leadership role; in single-node this is always
      satisfied; in multi-node this MUST be checked against the Raft leader state
- id: SYNC-07
  title: Testing
  specs:
  - id: SYNC-07-001
    priority: MUST
    kind: protocol
    statement: 'Unit tests MUST cover append-only semantics: entries are immutable, hashes are unique, and predecessor hash
      references are set correctly'
  - id: SYNC-07-002
    priority: MUST
    kind: protocol
    statement: 'Integration tests MUST cover the full single-peer replication cycle: leader appends an entry, sends an `Announce`
      activity, and the receiver validates the predecessor hash and appends the entry'
  - id: SYNC-07-003
    priority: MUST
    kind: protocol
    statement: 'Tests MUST cover conflict and idempotency scenarios: mismatched predecessor hash, duplicate delivery, and
      leader retry after rejection'
- id: SYNC-08
  title: System Invariants
  specs:
  - id: SYNC-08-001
    priority: MUST
    kind: protocol
    statement: 'Append-only integrity: log entries MUST be immutable once committed and MUST be uniquely identified by their
      content hash'
  - id: SYNC-08-002
    priority: MUST
    kind: protocol
    statement: 'Deterministic projection: given an identical canonical recorded log prefix, all compliant implementations
      MUST derive identical state'
  - id: SYNC-08-003
    priority: MUST_NOT
    kind: protocol
    statement: 'Idempotent replay: reprocessing any canonical recorded log prefix (including duplicates) MUST NOT change the
      resulting state'
  - id: SYNC-08-004
    priority: MUST_NOT
    kind: protocol
    statement: 'Monotonic visibility: participants MUST NOT regress their acknowledged log position'
  - id: SYNC-08-005
    priority: MUST
    kind: protocol
    statement: 'Reject-on-divergence: entries that do not extend the current hash chain MUST be rejected and MUST trigger
      resynchronization'
    rationale: >-
      "Rejected" means "not applied and not persisted as the current tail"; it
      does NOT require discarding the entry. A forward-gap entry (a valid entry
      whose predecessor has not yet arrived) MAY be retained in the non-ledger
      holding area of SYNC-14 pending its predecessor, and MUST still trigger
      resynchronization (the Reject remains the backstop for genuinely lost
      entries). See ADR-0037 (docs/adr/0037-buffer-out-of-order-ledger-entries.md).
- id: SYNC-10
  title: Catch-Up Gate Before New Actions
  specs:
  - id: SYNC-10-001
    priority: MUST
    kind: protocol
    statement: >-
      After actor process restart or recovery, an actor with case state in scope MUST re-establish
      case-ledger freshness with the CaseActor before taking new protocol-significant case actions
  - id: SYNC-10-002
    priority: MUST
    kind: protocol
    statement: >-
      While catch-up freshness is not established, the actor MUST block or defer new
      protocol-significant case actions and surface an explicit stale-or-catching-up
      condition
  - id: SYNC-10-003
    priority: SHOULD
    kind: protocol
    statement: >-
      Catch-up freshness checks SHOULD use the actor's last acknowledged canonical hash and
      replay mechanisms so that action gating is based on canonical log position, not local
      wall-clock assumptions
  - id: SYNC-10-004
    priority: MUST
    kind: protocol
    statement: >-
      The catch-up gate MUST require a contiguous canonical log prefix from genesis through
      the actor's currently acknowledged tip; any gap in that prefix MUST block
      protocol-significant case actions
  - id: SYNC-10-005
    priority: MUST_NOT
    kind: protocol
    statement: >-
      The catch-up gate MUST NOT require the actor's acknowledged tip to equal the CaseActor's
      current ledger tip; lagging behind the leader tip is allowed if the actor's own
      acknowledged prefix is contiguous from genesis
- id: SYNC-11
  title: Participant-Local Pending Assertion Suppression
  specs:
  - id: SYNC-11-001
    priority: SHOULD
    kind: protocol
    statement: >-
      A participant actor SHOULD maintain an actor-local, in-memory pending-assertion store
      that records outbound assertion activities (e.g., Add(Note,Case)) emitted toward the
      CaseActor but not yet confirmed by a canonical Announce(CaseLedgerEntry) round-trip;
      the suppression window is configurable and zero disables suppression
  - id: SYNC-11-002
    priority: SHOULD
    kind: protocol
    statement: >-
      After a participant successfully enqueues an assertion activity toward the CaseActor,
      the participant SHOULD record the (case_id, event_type, activity_id) triple in its
      pending-assertion store so that duplicate near-term re-emits of the same assertion are
      suppressed while the round-trip is pending
  - id: SYNC-11-003
    priority: SHOULD
    kind: protocol
    statement: >-
      When a participant receives a matching Announce(CaseLedgerEntry) whose log_object_id
      equals a pending assertion's object_id, the participant's pending-assertion store
      SHOULD clear the matching entry so that future re-emits of the same triple are no
      longer suppressed
  - id: SYNC-11-004
    priority: MUST_NOT
    kind: protocol
    statement: >-
      The CaseActor MUST NOT use the pending-assertion store for its own ledger commits;
      the CaseActor's DataLayer idempotency check already guards against duplicate commits
      by the single authoritative writer
  - id: SYNC-11-005
    priority: SHOULD
    kind: protocol
    statement: >-
      A pending assertion that exceeds its configured timeout window SHOULD be marked
      timed-out and SHOULD no longer suppress future re-emits, allowing operator retry or
      the catch-up gate to resubmit the assertion
- id: SYNC-12
  title: Effects-Before-Persist Invariant
  specs:
  - id: SYNC-12-001
    priority: MUST
    kind: protocol
    statement: >-
      A participant MUST apply all domain effects derived from a CaseLedgerEntry (embargo
      teardown, participant-status update, note attachment, invite-accept) BEFORE persisting
      the entry to its local ledger; if any effect fails, the entry MUST NOT be persisted
  - id: SYNC-12-002
    priority: MUST
    kind: protocol
    statement: >-
      The presence of a CaseLedgerEntry in a participant's local ledger MUST imply that all
      domain effects for that entry were successfully applied; a persisted entry with
      unapplied effects is a protocol violation
  - id: SYNC-12-003
    priority: MUST
    kind: protocol
    statement: >-
      When a participant receives a CaseLedgerEntry that is already present in its local
      ledger, the participant MUST skip both effects and persist (treat as already-done);
      re-applying effects to a stored entry is not permitted because the entry's effects
      were applied exactly once before the initial persist
- id: SYNC-13
  title: Ledger Write Ownership and Layer Boundary
  description: >-
    SYNC-12's already-stored gate (SYNC-12-003) uses the presence of a CaseLedgerEntry in
    an actor's DataLayer as the sole evidence that the entry's effects were already applied.
    That inference is only sound if the ONLY thing that ever writes a CaseLedgerEntry to the
    DataLayer is the core write path that also applies the effects. If any other layer (e.g.
    a wire/adapter parse or rehydration helper) creates a CaseLedgerEntry record, the gate
    fires SUCCESS on first delivery and the effects are silently skipped. These requirements
    make the write-ownership boundary that SYNC-12 depends on explicit.
  specs:
  - id: SYNC-13-001
    priority: MUST
    kind: protocol
    statement: >-
      A CaseLedgerEntry record is written to an actor's DataLayer ONLY by that actor's core
      ledger write path — the CaseActor's authoritative append (SYNC-01-004) for its own
      case, or a participant's PersistReceivedLogEntry step (SYNC-12-001) for a replica.
      Presence of a CaseLedgerEntry in the DataLayer is defined to mean "this actor's core
      has committed the entry and applied its effects."
    relationships:
    - rel_type: depends_on
      spec_id: SYNC-12-002
      note: SYNC-12-002 relies on this write-ownership guarantee to hold
  - id: SYNC-13-002
    priority: MUST_NOT
    kind: protocol
    statement: >-
      Adapter, wire, transport, and message-parsing code MUST NOT create, save, or otherwise
      persist a CaseLedgerEntry to the DataLayer. Only a CaseActor may author CaseLedgerEntry
      records for the primary case; participants obtain replica entries solely via the core
      Announce(CaseLedgerEntry) receive behavior tree. Ingress code delivers the message; it
      does not write the ledger.
  - id: SYNC-13-003
    priority: MUST_NOT
    kind: protocol
    statement: >-
      Message ingress MUST NOT use the canonical ledger/DataLayer store as a scratch or
      lookup cache for routing, semantic classification, or rehydration of an inbound
      Announce(CaseLedgerEntry). The inline CaseLedgerEntry parsed from the wire envelope
      MUST be carried forward in-memory (or via a clearly separate, non-ledger holding area)
      so that semantic routing and effect application do not depend on pre-storing the entry.
  - id: SYNC-13-004
    priority: MUST
    kind: protocol
    statement: >-
      Semantic routing of an inbound Announce(CaseLedgerEntry) MUST resolve to the
      log-entry semantic (ANNOUNCE_CASE_LEDGER_ENTRY) on first delivery using the typed
      inline object obtained during parsing, without requiring a DataLayer round-trip; the
      SYNC-12-003 already-stored gate MUST remain the sole mechanism that distinguishes
      first delivery from repeat delivery.
- id: SYNC-14
  title: Out-of-Order Entry Buffering and Drain
  description: >-
    Announce(CaseLedgerEntry) is delivered over a transport with no ordering guarantee, and
    Vultron may not be the only implementation on the wire, so a replica can receive an entry
    before its hash-chain predecessor. Dropping such an entry and relying on a reject/replay
    round-trip does not converge under adversarial reordering, because replay re-announces
    entries individually over the same unordered transport (they can reorder and be dropped
    again). These requirements make replica convergence independent of delivery order by
    holding forward-gap entries in a non-ledger buffer and draining them in hash-chain order
    once the entry that closes the gap is committed. Rationale: ADR-0037
    (docs/adr/0037-buffer-out-of-order-ledger-entries.md).
  specs:
  - id: SYNC-14-001
    priority: MUST
    kind: protocol
    statement: >-
      When a participant receives a valid Announce(CaseLedgerEntry) whose prev_log_hash does
      not match its current chain tail but whose log_index is strictly greater than
      tail_index + 1 (a forward gap), the participant MUST NOT permanently discard the entry;
      it MUST retain the entry in a holding area pending arrival of its predecessor.
    rationale: >-
      The hash chain makes indefinite retention safe: a held entry is applied only when an
      entry whose entry_hash equals the held entry's prev_log_hash is committed, so a
      fork/rewrite cannot masquerade as the predecessor.
  - id: SYNC-14-002
    priority: MUST
    kind: protocol
    statement: >-
      A forward-gap entry that is buffered MUST still trigger resynchronization (SYNC-08-005)
      — the participant MUST send Reject(CaseLedgerEntry) carrying its last accepted hash so
      the CaseActor replays entries that are genuinely lost (never delivered) rather than
      merely reordered.
  - id: SYNC-14-003
    priority: MUST
    kind: protocol
    statement: >-
      After a participant commits a CaseLedgerEntry, it MUST drain the holding area: for each
      newly committed tail, it MUST locate the buffered entry (if any) whose prev_log_hash
      equals the new tail's entry_hash, apply that entry, and repeat, cascading until no
      buffered entry extends the current tail.
  - id: SYNC-14-004
    priority: MUST
    kind: protocol
    statement: >-
      Draining a buffered entry MUST apply the entry's domain effects before persisting it
      (SYNC-12-001) and MUST NOT re-apply effects for an entry already present in the local
      ledger (SYNC-12-003); the drain path MUST be the same apply-then-persist path used for
      in-order delivery.
    relationships:
    - rel_type: depends_on
      spec_id: SYNC-12-001
      note: The drain MUST preserve the effects-before-persist invariant per applied entry
  - id: SYNC-14-005
    priority: MUST_NOT
    kind: protocol
    statement: >-
      The out-of-order holding area MUST NOT be the canonical ledger/DataLayer store; a
      buffered entry MUST NOT be persisted as a CaseLedgerEntry until it is drained (i.e.
      until its predecessor is present), so that presence of a CaseLedgerEntry in the
      DataLayer continues to mean "committed and effects applied" (SYNC-13-001).
    relationships:
    - rel_type: depends_on
      spec_id: SYNC-13-001
      note: Buffering in the DataLayer would break the presence-means-committed invariant
  - id: SYNC-14-006
    priority: SHOULD
    kind: protocol
    statement: >-
      The holding area SHOULD be bounded in size per case; when full it SHOULD evict the
      entry farthest ahead of the current gap (highest log_index) and log a warning. Eviction
      is recoverable because SYNC-14-002 already sent a Reject, so eviction MUST NOT be relied
      upon to trigger recovery by itself.
