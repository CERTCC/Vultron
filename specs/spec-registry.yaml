id: SR
title: Spec Registry
description: Requirements for converting `specs/*.md` files to YAML governed by Pydantic models, building a structured registry
  of all requirements, and providing linting, pytest integration, and context-generation tooling. module. Migration from `.md`
  to `.yaml` is a one-time lossless conversion.
version: 1.0.0
kind: implementation
scope:
- prototype
- production
groups:
- id: SR-01
  title: YAML File Format (MUST)
  specs:
  - id: SR-01-001
    priority: MUST
    statement: Each `specs/*.md` file MUST be replaced by a `specs/*.yaml` file with the same kebab-case topic name.
  - id: SR-01-002
    priority: MUST
    statement: Each YAML file MUST have a top-level `id` field containing the file-level prefix string (e.g., `"HP"`).
  - id: SR-01-003
    priority: MUST
    statement: Each YAML file MUST have `title`, `description`, and `version` fields.
  - id: SR-01-004
    priority: MUST
    statement: Each YAML file MUST contain a `groups` list; each group MUST have `id`, `title`, and `specs` fields.
  - id: SR-01-005
    priority: MUST
    statement: Each individual spec entry MUST have `id`, `priority`, `statement`, and `rationale` fields.
  - id: SR-01-006
    priority: MUST
    statement: Spec IDs MUST be globally unique across all loaded YAML files.
  - id: SR-01-007
    priority: MUST
    statement: 'Group IDs within a file MUST match the file-level prefix (e.g., group `HP-01` must live in file with `id:
      HP`).'
  - id: SR-01-008
    priority: SHOULD
    statement: Each spec entry SHOULD include a `testable` boolean field (default `true`).
  - id: SR-01-009
    priority: SHOULD
    statement: Spec entries SHOULD include a `kind` field from the `SpecKind` StrEnum (`general` or `implementation`); default
      `general`.
  - id: SR-01-010
    priority: SHOULD
    statement: Spec entries SHOULD include a `scope` field listing one or more `Scope` StrEnum values (`prototype`, `production`);
      default `[production]`.
  - id: SR-01-011
    priority: SHOULD
    statement: Spec entries SHOULD include a `tags` list using values from the `SpecTag` StrEnum vocabulary.
  - id: SR-01-012
    priority: MUST
    statement: Spec entries SHOULD include a `relationships` list when cross-spec traceability is needed; each relationship
      MUST have `rel_type` and `spec_id` fields.
  - id: SR-01-013
    priority: MUST
    statement: 'Spec IDs within a group MUST match the group ID prefix (e.g., spec `HP-01-001` must live in group with `id:
      HP-01`). This extends SR-01-007 to the spec level and ensures that the three-part ID (`FILE-GROUP-SPEC`) is internally
      consistent.'
    rationale: 'Without this constraint, spec IDs become misleading: a reader seeing `PD-03-001` expects it to be in group
      `PD-03`, but it may live in group `PD-06`. This breaks navigability and makes ID-based cross-references ambiguous. Note:
      IDs SR-01-008 through SR-01-012 are taken by pre-existing specs currently residing in the wrong group (TASK-SPECIDFIX
      tracks the remediation).'
    tags:
    - documentation
    - tooling
- id: SR-02
  title: Pydantic Schema (MUST)
  specs:
  - id: SR-02-001
    priority: MUST
    statement: 'The `vultron/metadata/specs/` module MUST define Pydantic models for all registry structures: `SpecFile`,
      `SpecGroup`, `StatementSpec`, `BehavioralSpec`, `Relationship`.'
  - id: SR-02-002
    priority: MUST
    statement: 'Fixed vocabularies MUST be implemented as `StrEnum` subclasses: `RFC2119Priority`, `RelationType`, `SpecKind`,
      `Scope`, `SpecTag`.'
  - id: SR-02-003
    priority: MUST
    statement: '`RFC2119Priority` MUST include at minimum: `MUST`, `MUST_NOT`, `SHOULD`, `SHOULD_NOT`, `MAY`.'
  - id: SR-02-004
    priority: MUST
    statement: '`RelationType` MUST include at minimum: `implements`, `supersedes`, `extends`, `depends_on`, `conflicts`,
      `refines`, `derives_from`, `verifies`, `part_of`, `constrains`.'
  - id: SR-02-005
    priority: MUST
    statement: '`SpecKind` MUST include all five portability tiers: `general`, `pattern`, `domain`, `language`, `implementation`.'
  - id: SR-02-006
    priority: MUST
    statement: '`Scope` MUST include: `prototype`, `production`.'
  - id: SR-02-007
    priority: MUST
    statement: '`SpecTag` MUST be a controlled vocabulary StrEnum; initial values are defined in `notes/spec-registry.md`.'
  - id: SR-02-008
    priority: MUST
    statement: A `SpecIdStr` type alias MUST enforce the ID pattern `^[A-Z]{2,8}(-\d{2}(-\d{3})?)?$` via Pydantic `StringConstraints`.
  - id: SR-02-009
    priority: MUST
    statement: '`StatementSpec` MUST have fields: `id` (`SpecIdStr`), `priority` (`RFC2119Priority`), `statement` (non-empty
      str), `rationale` (non-empty str), and optional fields: `testable`, `kind`, `scope`, `tags`, `relationships`, `lint_suppress`.'
  - id: SR-02-010
    priority: MUST
    statement: '`BehavioralSpec` MUST extend `StatementSpec` with optional fields: `preconditions`, `steps`, `postconditions`.'
  - id: SR-02-011
    priority: MUST
    statement: The `lint_suppress` field on a spec MUST accept a list of `LintWarningCode` StrEnum values to suppress named
      linter warnings for that spec.
  - id: SR-02-012
    priority: MUST
    statement: '`SpecGroup` MUST have fields: `id` (`SpecIdStr`), `title`, `specs` (non-empty list), and optional `description`,
      `kind`, `scope`.'
  - id: SR-02-013
    priority: MUST
    statement: '`SpecFile` MUST have fields: `id` (str), `title`, `description`, `version` (semver str), `groups` (non-empty
      list), and optional `kind`, `scope`.'
  - id: SR-02-014
    priority: MUST
    statement: '`kind` and `scope` at `SpecFile` and `SpecGroup` level MUST serve as defaults; individual specs MAY override
      them.'
  - id: SR-02-015
    priority: SHOULD
    statement: '`Relationship` SHOULD include an optional `note` field for free-text annotation of the relationship.'
  - id: SR-02-016
    priority: SHOULD
    statement: '`BehaviorStep` SHOULD include fields: `order` (int), `actor` (str), `action` (str), and optional `expected`
      (str).'
- id: SR-03
  title: Registry Loader (MUST)
  specs:
  - id: SR-03-001
    priority: MUST
    statement: The `vultron/metadata/specs/` module MUST provide a `load_registry(spec_dir)` function that loads all `*.yaml`
      files from the given directory into a `SpecRegistry`.
  - id: SR-03-002
    priority: MUST
    statement: '`SpecRegistry` MUST maintain an index of all specs by ID and enforce global uniqueness, raising `ValueError`
      on duplicate IDs.'
  - id: SR-03-003
    priority: MUST
    statement: '`SpecRegistry` MUST provide a `get(spec_id)` method returning the `Spec` for a given ID, raising `KeyError`
      on unknown IDs.'
  - id: SR-03-004
    priority: MUST
    statement: '`SpecRegistry` MUST provide a `validate_cross_references()` method returning a list of error strings for any
      dangling relationship targets.'
  - id: SR-03-005
    priority: MUST
    statement: The loader MUST work regardless of the caller's working directory by accepting an explicit `spec_dir` path.
  - id: SR-03-006
    priority: SHOULD
    statement: '`SpecRegistry` SHOULD maintain a group index in addition to the spec index.'
  - id: SR-03-007
    priority: SHOULD
    statement: The loader SHOULD provide a `_find_repo_root()` helper (mirroring the notes loader) for callers that do not
      supply an explicit path.
- id: SR-04
  title: Linter (MUST)
  specs:
  - id: SR-04-001
    priority: MUST
    statement: The `vultron/metadata/specs/lint.py` module MUST provide a `lint(spec_dir)` function that returns exit code
      `0` (clean) or `1` (errors found).
  - id: SR-04-002
    priority: MUST
    statement: 'The linter MUST report as hard errors: duplicate spec IDs, dangling relationship targets, group-ID/file-prefix
      mismatches, and invalid YAML structure.'
  - id: SR-04-003
    priority: MUST
    statement: The linter MUST be invokable as a CLI command via the `spec-lint` console entry point (`uv run spec-lint`)
      and via `python -m vultron.metadata.specs.lint [spec_dir]`. Both invocations MUST produce identical output. When `spec_dir`
      is omitted from the module invocation, it defaults to `specs/` relative to the current working directory.
  - id: SR-04-004
    priority: MUST
    statement: The linter MUST respect `lint_suppress` fields on individual specs when checking advisory warnings.
  - id: SR-04-005
    priority: SHOULD
    statement: 'The linter SHOULD emit advisory warnings (non-blocking) for: specs with `testable: false` and no behavioral
      steps (suppressible via `lint_suppress: [testable_without_steps]`), rationale text exceeding 500 characters, and specs
      with no tags.'
  - id: SR-04-006
    priority: SHOULD
    statement: The linter SHOULD check that tag values in spec entries are members of the `SpecTag` StrEnum vocabulary.
  - id: SR-04-007
    priority: SHOULD
    statement: The linter SHOULD check that `scope` at the spec level is not broader than the containing group or file scope.
- id: SR-05
  title: Pytest Integration (MUST)
  specs:
  - id: SR-05-001
    priority: MUST
    statement: 'The project MUST register a `spec` pytest marker in `conftest.py`: `@pytest.mark.spec("SR-01-001")`.'
  - id: SR-05-002
    priority: MUST
    statement: '`pytest_collection_modifyitems` MUST validate each `spec` marker value against the loaded `SpecRegistry` and
      emit a `PytestWarning` (non-blocking) for any unknown spec ID.'
  - id: SR-05-003
    priority: SHOULD
    statement: The pytest integration SHOULD load the registry once per session (not per test) to avoid I/O overhead.
  - id: SR-05-004
    priority: SHOULD
    statement: Tests SHOULD use `@pytest.mark.spec` to assert which requirement they verify, enabling coverage reporting by
      spec ID.
- id: SR-06
  title: Pre-commit Hook (MUST)
  specs:
  - id: SR-06-001
    priority: MUST
    statement: A `spec-lint` pre-commit hook MUST be defined that fires on any staged change to a `specs/*.yaml` file.
  - id: SR-06-002
    priority: MUST
    statement: The hook MUST run `python -m vultron.metadata.specs.lint specs/` and block the commit on exit code `1`.
  - id: SR-06-003
    priority: MUST
    statement: 'The hook MUST be configured with `pass_filenames: false` so the full registry is always validated, not just
      the changed file.'
- id: SR-07
  title: Context Generation Tool (MUST)
  specs:
  - id: SR-07-001
    priority: MUST
    statement: The `vultron/metadata/specs/` module MUST provide a context generation tool that accepts a `SpecRegistry` and
      produces output for agent consumption.
  - id: SR-07-002
    priority: MUST
    statement: The tool MUST support a **markdown renderer** that regenerates a `.md` view of a spec file from its YAML source.
  - id: SR-07-003
    priority: MUST
    statement: The tool MUST support a **JSON exporter** that serializes the full registry or individual spec files to JSON.
  - id: SR-07-004
    priority: SHOULD
    statement: The markdown renderer SHOULD produce output compatible with the existing `meta-specifications.md` style guide.
  - id: SR-07-005
    priority: SHOULD
    statement: The JSON exporter SHOULD support filtering by `kind`, `scope`, `tags`, or `priority` to allow agents to request
      only relevant subsets.
- id: SR-08
  title: Migration (MUST)
  specs:
  - id: SR-08-001
    priority: MUST
    statement: All existing `specs/*.md` files MUST be migrated to `specs/*.yaml` using a lossless conversion that preserves
      all requirement text, IDs, and relationships.
  - id: SR-08-002
    priority: MUST
    statement: The migration MUST produce YAML files that pass the spec linter with zero errors.
  - id: SR-08-003
    priority: MUST
    statement: After migration, the `specs/*.md` files MUST be deleted; the YAML files are the sole source of truth.
  - id: SR-08-004
    priority: MUST
    statement: '`specs/README.md` MUST be retained as Markdown; it is documentation, not a requirement file.'
    rationale: '`specs/meta-specifications.md` has been converted to `specs/meta-specifications.yaml` (TASK-SPECMD). Only
      `specs/README.md` remains as a Markdown file.'
  - id: SR-08-005
    priority: MUST
    statement: All in-project skills, prompts, and agent instructions that reference `specs/*.md` files by path or extension
      MUST be updated to use `specs/*.yaml` paths or the context-generation tool output before the migration is considered
      complete.
  - id: SR-08-006
    priority: MUST_NOT
    statement: The original `specs/*.md` requirement files MUST NOT be deleted until the YAML files have passed the spec linter
      with zero errors and all agent/skill references have been updated to YAML paths.
  - id: SR-08-007
    priority: SHOULD
    statement: A migration script SHOULD be provided to convert a single `specs/*.md` file to the YAML format as a starting
      point; manual review and cleanup is expected.
