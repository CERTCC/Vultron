id: CP
title: CaseProposal Protocol
description: Requirements for the CaseProposal protocol flow, which separates the act of requesting case initialization from
  the act of creating the case. Covers the wire vocabulary type, the Create/Accept/Reject message flow, and the corresponding
  MessageSemantics values and received-side use cases.
version: 1.0.0
scope:
- prototype
- production
tags:
- protocol
- messaging
groups:
- id: CP-01
  title: Wire Vocabulary
  specs:
  - id: CP-01-001
    priority: MUST
    kind: protocol
    statement: The wire layer MUST define an `as_CaseProposal` object type that extends `VultronAS2Object`.
    rationale: A dedicated object type enables pattern-discriminated routing in the semantic extractor and preserves AS2 semantics
      by separating the proposal object from the eventual `VulnerabilityCase`.
  - id: CP-01-002
    priority: MUST
    kind: protocol
    statement: '`as_CaseProposal` MUST include an `id_` field containing a full URI that uniquely identifies the proposal.'
  - id: CP-01-003
    priority: MUST
    kind: protocol
    statement: '`as_CaseProposal` MUST include an `attributed_to` field identifying the vendor actor (proposer) that originated
      the proposal.'
  - id: CP-01-004
    priority: MUST
    kind: protocol
    statement: '`as_CaseProposal` MUST include an `object_` field containing a fully inline `as_VulnerabilityReport` around
      which the case is to be created. URI references to the report are NOT permitted (see AKM-03-001).'
    rationale: The case-actor service needs the vulnerability report to initialize the case. URI references are prohibited
      because the receiver may not have the referenced object and no dereferencing mechanism is currently specified (AKM-03-001).
  - id: CP-01-005
    priority: MUST
    kind: protocol
    statement: '`as_CaseProposal` MUST include a `target` field containing the URI of the prospective case-actor service to
      which the proposal is addressed.'
  - id: CP-01-006
    priority: MAY
    kind: protocol
    statement: '`as_CaseProposal` MAY include an optional `summary` field with a human-readable description of the proposal.'
- id: CP-02
  title: MessageSemantics Values
  specs:
  - id: CP-02-001
    priority: MUST
    kind: protocol
    statement: The `MessageSemantics` enum MUST include `CREATE_CASE_PROPOSAL` for the pattern `Create(as_CaseProposal)`.
  - id: CP-02-002
    priority: MUST
    kind: protocol
    statement: The `MessageSemantics` enum MUST include `ACCEPT_CASE_PROPOSAL` for the pattern `Accept(as_CaseProposal)`.
  - id: CP-02-003
    priority: MUST
    kind: protocol
    statement: The `MessageSemantics` enum MUST include `REJECT_CASE_PROPOSAL` for the pattern `Reject(as_CaseProposal)`.
- id: CP-03
  title: Extractor Patterns
  specs:
  - id: CP-03-001
    priority: MUST
    kind: protocol
    statement: '`SEMANTICS_ACTIVITY_PATTERNS` MUST contain a pattern entry for `(Create, as_CaseProposal) -> CREATE_CASE_PROPOSAL`.'
  - id: CP-03-002
    priority: MUST
    kind: protocol
    statement: '`SEMANTICS_ACTIVITY_PATTERNS` MUST contain a pattern entry for `(Accept, as_CaseProposal) -> ACCEPT_CASE_PROPOSAL`.'
  - id: CP-03-003
    priority: MUST
    kind: protocol
    statement: '`SEMANTICS_ACTIVITY_PATTERNS` MUST contain a pattern entry for `(Reject, as_CaseProposal) -> REJECT_CASE_PROPOSAL`.'
  - id: CP-03-004
    priority: MUST
    kind: protocol
    statement: All three `CaseProposal` extractor patterns MUST appear before any more-general patterns that could match the
      same activity types (e.g., generic `Accept` or `Reject` catch-all entries), to prevent misrouting (per SE-03-002).
    relationships:
    - rel_type: depends_on
      spec_id: SE-03-002
- id: CP-04
  title: Protocol Flow ŌĆö Sending
  specs:
  - id: CP-04-001
    priority: MUST
    kind: protocol
    statement: A vendor actor that wishes to request case initialization at a dedicated case-actor service MUST send `Create(as_CaseProposal)`
      to the case-actor service's inbox, with `actor` set to the vendor's own URI.
    rationale: Using `Create` with the vendor as `actor` accurately declares that the vendor created the proposal object,
      not the case itself. Sending `Create(VulnerabilityCase)` from the vendor would violate AS2 semantics because the vendor
      is not the authoritative creator of the case.
    relationships:
    - rel_type: implements
      spec_id: CP-01-001
  - id: CP-04-002
    priority: MUST
    kind: project
    statement: The BT node responsible for sending `Create(as_CaseProposal)` MUST be a distinct node (`ProposeCaseToActorNode`)
      separate from `CreateCaseActorNode`. `CreateCaseActorNode` is responsible only for registering the case-actor service
      resource; it MUST NOT send a `CaseProposal` activity.
    rationale: Conflating actor registration with proposal sending violates single responsibility and causes the proposal
      to be sent before the case-actor service is ready. See `notes/case-proposal.md` for the pitfall.
- id: CP-05
  title: Protocol Flow ŌĆö Receiving (Case-Actor Side)
  specs:
  - id: CP-05-001
    priority: MUST
    kind: protocol
    statement: A `CreateCaseProposalReceivedUseCase` MUST be implemented on the case-actor side to handle incoming `Create(as_CaseProposal)`
      activities.
  - id: CP-05-002
    priority: MUST
    kind: protocol
    statement: '`CreateCaseProposalReceivedUseCase` MUST evaluate the proposal and either accept or reject it, emitting the
      appropriate response activity.'
  - id: CP-05-003
    priority: MUST
    kind: protocol
    statement: 'When accepting a proposal, the case-actor service MUST send two activities in sequence: first `Accept(as_CaseProposal)`
      (with the `as_CaseProposal` inline as `object_`), then `Create(VulnerabilityCase)` (with `actor` set to the case-actor
      URI and `context` set to the URI of the `Accept(CaseProposal)` activity).'
    rationale: '`Accept(CaseProposal)` acknowledges the vendor''s proposal. `Create(VulnerabilityCase)` with `actor=case-actor`
      preserves AS2 "I created this" semantics: only the authoritative creator MUST be the `actor` of a `Create` activity.
      Setting `context` to the Accept URI establishes the proximate causal link.'
  - id: CP-05-004
    priority: MUST
    kind: protocol
    statement: When rejecting a proposal, the case-actor service MUST send `Reject(as_CaseProposal)` with the `as_CaseProposal`
      embedded inline as `object_`.
  - id: CP-05-005
    priority: MUST
    kind: protocol
    statement: If the case-actor service successfully sends `Accept(as_CaseProposal)` but fails to send `Create(VulnerabilityCase)`,
      it MUST retry `Create(VulnerabilityCase)` independently. The `Accept` is irrevocable once sent and MUST NOT be resent
      on retry; only `Create(VulnerabilityCase)` requires retry.
    rationale: The two-activity sequence is not atomic at the network level. Resending `Accept` on retry would cause the vendor
      to see a duplicate acceptance and potentially re-enter the initialization flow.
  - id: CP-05-006
    priority: SHOULD
    kind: protocol
    statement: 'The case-actor service SHOULD handle duplicate `Create(as_CaseProposal)` idempotently: if a proposal for the
      same report has already been accepted and a `VulnerabilityCase` created, it SHOULD respond with a new `Accept(as_CaseProposal)`
      referencing the existing `VulnerabilityCase` rather than creating a second one.'
    rationale: Network retries and at-least-once delivery semantics mean the vendor may resend the proposal. Idempotent handling
      prevents duplicate cases.
- id: CP-06
  title: Protocol Flow ŌĆö Receiving (Vendor Side)
  specs:
  - id: CP-06-001
    priority: MUST
    kind: protocol
    statement: An `AcceptCaseProposalReceivedUseCase` MUST be implemented on the vendor side to handle incoming `Accept(as_CaseProposal)`
      activities.
  - id: CP-06-002
    priority: MUST
    kind: protocol
    statement: A `RejectCaseProposalReceivedUseCase` MUST be implemented on the vendor side to handle incoming `Reject(as_CaseProposal)`
      activities.
  - id: CP-06-003
    priority: MUST
    kind: protocol
    statement: '`AcceptCaseProposalReceivedUseCase` MUST update the vendor''s local state to reflect that the case-actor service
      has accepted the proposal (e.g., record the case-actor URI and await the subsequent `Create(VulnerabilityCase)`).'
  - id: CP-06-004
    priority: MUST
    kind: protocol
    statement: '`RejectCaseProposalReceivedUseCase` MUST update the vendor''s local state to reflect the rejection (e.g.,
      mark the pending case as rejected and surface the rejection reason if present).'
- id: CP-08
  title: Case-Actor Service URL Configuration
  specs:
  - id: CP-08-001
    priority: MUST
    kind: project
    statement: >-
      Every actor that may trigger the `engage-case` BT path (i.e., any actor that
      creates a `VulnerabilityCase` on behalf of another actor) MUST supply a
      `case_actor_service_url` value in its `ActorConfig`. The field MUST be a valid
      `HttpUrl`; absence MUST produce a runtime `FAILURE` at `ResolveCaseActorUrlsNode`
      with a clear error message identifying the missing configuration, not a
      silently mis-routed proposal.
    rationale: >-
      `ResolveCaseActorUrlsNode` previously derived the CaseActor service URL by
      prepending `server_base_url` (the running container's own base URL) to a
      case slug. This hard-wires a co-location assumption: the CaseActor is assumed
      to live on the same host as the BT executor. In a multi-container topology
      (DEMOMA-01-001), the CaseActor has its own container and URL; using
      `server_base_url` routes proposals to the wrong endpoint. Actor URLs are
      opaque endpoint identifiers; whether they are host-local or host-remote is
      irrelevant to callers. The only correct source for the CaseActor service URL
      is explicit configuration. This is a TEMPORARY per-actor config field pending
      a proper actor-ID-to-endpoint resolution mechanism (see issues #1189, #1092).
    relationships:
    - rel_type: implements
      spec_id: CP-01-005
  - id: CP-08-002
    priority: MUST
    kind: project
    statement: >-
      `ResolveCaseActorUrlsNode` MUST read `case_actor_service_url` from
      `ActorConfig` (via `get_config().actor.case_actor_service_url`) to derive the
      CaseActor service URL. It MUST NOT use `server_base_url` from the blackboard
      or from the server configuration to construct `case_actor_id`. The
      `server_base_url` blackboard key MUST NOT be registered or read in
      `ResolveCaseActorUrlsNode.setup()`.
    relationships:
    - rel_type: refines
      spec_id: CP-08-001
  - id: CP-08-003
    priority: MUST
    kind: project
    statement: >-
      In all multi-container demo scenarios, every actor whose BT may run the
      `engage-case` path MUST have `VULTRON_ACTOR__CASE_ACTOR_SERVICE_URL` set
      in its Docker Compose environment block (or equivalent config mechanism).
      The value MUST be the full base URL of the dedicated CaseActor container
      (e.g., `http://case-actor:7999/api/v2`). Demo scripts MUST NOT rely on
      `server_base_url` derivation for the CaseActor identity.
    rationale: >-
      Demo containers are "omniscient" about all actor URLs in the deployment at
      boot time (in lieu of a directory service, issues #1189, #1092). The env-var
      approach mirrors the `VULTRON_SERVER__BASE_URL` pattern and requires no new
      discovery mechanism.
    relationships:
    - rel_type: refines
      spec_id: CP-08-001
- id: CP-07
  title: Testing
  specs:
  - id: CP-07-001
    priority: MUST
    kind: protocol
    statement: Unit tests MUST cover pattern matching for all three `CaseProposal` extractor patterns (`CREATE_CASE_PROPOSAL`,
      `ACCEPT_CASE_PROPOSAL`, `REJECT_CASE_PROPOSAL`).
  - id: CP-07-002
    priority: MUST
    kind: protocol
    statement: Unit tests MUST cover `CreateCaseProposalReceivedUseCase`, `AcceptCaseProposalReceivedUseCase`, and `RejectCaseProposalReceivedUseCase`
      execute() paths.
  - id: CP-07-003
    priority: MUST
    kind: protocol
    statement: Integration tests MUST cover the full `Create(CaseProposal)` ŌåÆ `Accept(CaseProposal)` + `Create(VulnerabilityCase)`
      round-trip between a vendor actor and a case-actor service.
